gui:
  theme:
    activeBorderColor:
      - '#8bc9eb'
      - bold
    inactiveBorderColor:
      - '#304860'
    optionsTextColor:
      - '#6fb8e3'
    selectedLineBgColor:
      - '#16242d'
    cherryPickedCommitBgColor:
      - '#1b2d40'
    cherryPickedCommitFgColor:
      - '#8bc9eb'
    unstagedChangesColor:
      - '#4d86b0'
    defaultFgColor:
      - '#d6e2ee'
    searchingActiveBorderColor:
      - '#6fa4c9'

  authorColors:
    '*': '#5e95bc'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
