# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#d6e2ee,bg=#16242d"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#6fb8e3"
set -g pane-border-style "fg=#4f5d66"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4f5d66,bg=default]#[fg=#d6e2ee,bg=#4f5d66] #I:#W #[fg=#4f5d66,bg=default]"

set -g window-status-current-format \
"#[fg=#6fb8e3,bg=default]#[fg=#16242d,bg=#6fb8e3] #I:#W #[fg=#6fb8e3,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#16242d,bg=#6fb8e3"
set -g message-command-style "fg=#d6e2ee,bg=#16242d"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#16242d,bg=#6fb8e3"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#8996a0,bg=#4f5d66"
set -g copy-mode-current-match-style "fg=#16242d,bg=#6fb8e3"
