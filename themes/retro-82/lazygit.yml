gui:
  theme:
    activeBorderColor:
      - '#faa968'
      - bold
    inactiveBorderColor:
      - '#4d5253'
    optionsTextColor:
      - '#8cbfb8'
    selectedLineBgColor:
      - '#293540'
    cherryPickedCommitBgColor:
      - '#05182e'
    cherryPickedCommitFgColor:
      - '#faa968'
    unstagedChangesColor:
      - '#f85525'
    defaultFgColor:
      - '#f6dcac'
    searchingActiveBorderColor:
      - '#e97b3c'
  authorColors:
    '*': '#028391'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
