[mgr]
cwd = { fg = "#f6dcac" }
find_keyword = { fg = "#f85525", bold = true, italic = true, underline = true }
find_position = { fg = "#f85525", bold = true, italic = true }
marker_copied = { fg = "#3f8f8a", bg = "#3f8f8a" }
marker_cut = { fg = "#958d79", bg = "#958d79" }
marker_marked = { fg = "#faa968", bg = "#faa968" }
marker_selected = { fg = "#028391", bg = "#028391" }
count_copied = { fg = "#05182e", bg = "#958d79" }
count_cut = { fg = "#05182e", bg = "#958d79" }
count_selected = { fg = "#05182e", bg = "#028391" }
border_symbol = " "
border_style = { fg = "#faa968" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#faa968" }
perm_read = { fg = "#f6dcac" }
perm_write = { fg = "#028391" }
perm_exec = { fg = "#3f8f8a" }
perm_sep = { fg = "#958d79" }
progress_label = { bold = true }
progress_normal = { fg = "#faa968", bg = "#293540" }
progress_error = { fg = "#3f8f8a", bg = "#293540" }

[mode]
normal_main = { bg = "#faa968", fg = "#05182e", bold = true }
normal_alt  = { bg = "#293540", fg = "#f6dcac" }
select_main = { bg = "#958d79", fg = "#05182e", bold = true }
select_alt  = { bg = "#293540", fg = "#f6dcac" }
unset_main = { bg = "#028391", fg = "#05182e", bold = true }
unset_alt  = { bg = "#293540", fg = "#f6dcac" }

[select]
border = { fg = "#faa968" }
active = { fg = "#028391", bold = true }

[input]
border = { fg = "#faa968" }
value = { fg = "#f6dcac" }

[tabs]
active = { fg = "#faa968", bold = true, bg = "#05182e" }
inactive = { fg = "#958d79", bg = "#05182e" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#faa968", bg = "#293540" }

[tasks]
border = { fg = "#faa968" }
title = {}
hovered = { fg = "#958d79", underline = true }

[which]
cols = 3
mask = { bg = "#293540" }
cand = { fg = "#faa968" }
rest = { fg = "#05182e" }
desc = { fg = "#f6dcac" }
separator = " ▶ "
separator_style = { fg = "#f6dcac" }

[help]
on = { fg = "#f6dcac" }
run = { fg = "#f6dcac" }
footer = { fg = "#05182e", bg = "#958d79" }

[notify]
title_info = { fg = "#028391" }
title_warn = { fg = "#faa968" }
title_error = { fg = "#3f8f8a" }

[filetype]
rules = [
    { mime = "image/*", fg = "#028391" },
    { mime = "{audio,video}/*", fg = "#faa968" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#958d79" },
    { mime = "application/{pdf,doc,rtf}", fg = "#f6dcac" },
    { url = "*", is = "orphan", bg = "#3f8f8a" },
    { url = "*", is = "exec", fg = "#958d79" },
    { url = "*", fg = "#f6dcac" },
    { url = "*/", fg = "#faa968" },
]
