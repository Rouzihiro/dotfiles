# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#f6dcac,bg=#05182e"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#faa968"
set -g pane-border-style "fg=#4d5253"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4d5253,bg=default]#[fg=#f6dcac,bg=#4d5253] #I:#W #[fg=#4d5253,bg=default]"

set -g window-status-current-format \
"#[fg=#faa968,bg=default]#[fg=#05182e,bg=#faa968] #I:#W #[fg=#faa968,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#05182e,bg=#faa968"
set -g message-command-style "fg=#f6dcac,bg=#05182e"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#05182e,bg=#faa968"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#958d79,bg=#4d5253"
set -g copy-mode-current-match-style "fg=#05182e,bg=#faa968"
