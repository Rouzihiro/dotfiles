gui:
  theme:
    activeBorderColor:
      - '#78824b'
      - bold
    inactiveBorderColor:
      - '#52524c'
    optionsTextColor:
      - '#c9a554'
    selectedLineBgColor:
      - '#3a3a37'
    cherryPickedCommitBgColor:
      - '#222222'
    cherryPickedCommitFgColor:
      - '#78824b'
    unstagedChangesColor:
      - '#685742'
    defaultFgColor:
      - '#c2c2b0'
    searchingActiveBorderColor:
      - '#b36d43'
  authorColors:
    '*': '#5f875f'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
