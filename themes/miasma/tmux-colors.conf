# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#c2c2b0,bg=#222222"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#78824b"
set -g pane-border-style "fg=#52524c"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#52524c,bg=default]#[fg=#c2c2b0,bg=#52524c] #I:#W #[fg=#52524c,bg=default]"

set -g window-status-current-format \
"#[fg=#78824b,bg=default]#[fg=#222222,bg=#78824b] #I:#W #[fg=#78824b,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#222222,bg=#78824b"
set -g message-command-style "fg=#c2c2b0,bg=#222222"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#222222,bg=#78824b"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#828277,bg=#52524c"
set -g copy-mode-current-match-style "fg=#222222,bg=#78824b"
