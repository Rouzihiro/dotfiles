# : Manager [[[

[mgr]
cwd = { fg = "#c2c2b0" }

# Find
find_keyword = { fg = "#685742", bold = true, italic = true, underline = true }
find_position = { fg = "#685742", bold = true, italic = true }

# Marker
marker_copied = { fg = "#5f875f", bg = "#5f875f" }
marker_cut = { fg = "#d7c483", bg = "#d7c483" }
marker_marked = { fg = "#d7c483", bg = "#d7c483" }
marker_selected = { fg = "#333333", bg = "#333333" }

# Count
count_copied = { fg = "#222222", bg = "#d7c483" }
count_cut = { fg = "#222222", bg = "#d7c483" }
count_selected = { fg = "#000000", bg = "#333333" }

# Border
border_symbol = " "
border_style = { fg = "#d7c483" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#d7c483" }
perm_read = { fg = "#c2c2b0" }
perm_write = { fg = "#333333" }
perm_exec = { fg = "#5f875f" }
perm_sep = { fg = "#d7c483" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#d7c483", bg = "#000000" }
progress_error = { fg = "#5f875f", bg = "#000000" }

[mode]
normal_main = { bg = "#d7c483", fg = "#000000", bold = true }
normal_alt  = { bg = "#000000", fg = "#c2c2b0" }

select_main = { bg = "#d7c483", fg = "#000000", bold = true }
select_alt  = { bg = "#000000", fg = "#c2c2b0" }

unset_main = { bg = "#333333", fg = "#000000", bold = true }
unset_alt  = { bg = "#000000", fg = "#c2c2b0" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#d7c483" }
active = { fg = "#333333", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#d7c483" }
value = { fg = "#c2c2b0" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#d7c483", bold = true, bg = "#222222" }
inactive = { fg = "#d7c483", bg = "#222222" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#d7c483", bg = "#666666" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#d7c483" }
title = {}
hovered = { fg = "#d7c483", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#000000" }
cand = { fg = "#d7c483" }
rest = { fg = "#000000" }
desc = { fg = "#c2c2b0" }
separator = " ▶ "
separator_style = { fg = "#c2c2b0" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#c2c2b0" }
run = { fg = "#c2c2b0" }
footer = { fg = "#000000", bg = "#d7c483" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#333333" }
title_warn = { fg = "#d7c483" }
title_error = { fg = "#5f875f" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#333333" },
    { mime = "{audio,video}/*", fg = "#d7c483" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#d7c483" },

    { mime = "application/{pdf,doc,rtf}", fg = "#c2c2b0" },

    { url = "*", is = "orphan", bg = "#5f875f" },
    { url = "*", is = "exec", fg = "#d7c483" },

    { url = "*", fg = "#c2c2b0" },
    { url = "*/", fg = "#d7c483" },
]

# : ]]]
