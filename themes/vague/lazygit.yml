gui:
  theme:
    activeBorderColor:
      - '#6e94b2'
      - bold
    inactiveBorderColor:
      - '#4b4b4c'
    optionsTextColor:
      - '#7e98e8'
    selectedLineBgColor:
      - '#2f2f30'
    cherryPickedCommitBgColor:
      - '#141415'
    cherryPickedCommitFgColor:
      - '#6e94b2'
    unstagedChangesColor:
      - '#d8647e'
    defaultFgColor:
      - '#cdcdcd'
    searchingActiveBorderColor:
      - '#f3be7c'
  authorColors:
    '*': '#7fa563'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
