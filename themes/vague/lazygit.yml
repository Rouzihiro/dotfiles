gui:
  theme:
    activeBorderColor:
      - '#bb9dbd'
      - bold
    inactiveBorderColor:
      - '#606079'
    optionsTextColor:
      - '#6e94b2'
    selectedLineBgColor:
      - '#141415'
    cherryPickedCommitBgColor:
      - '#1c1c24'
    cherryPickedCommitFgColor:
      - '#bb9dbd'
    unstagedChangesColor:
      - '#d8647e'
    defaultFgColor:
      - '#cdcdcd'
    searchingActiveBorderColor:
      - '#f3be7c'

  authorColors:
    '*': '#7fa563'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
