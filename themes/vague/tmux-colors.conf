# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#cdcdcd,bg=#141415"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#6e94b2"
set -g pane-border-style "fg=#4b4b4c"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4b4b4c,bg=default]#[fg=#cdcdcd,bg=#4b4b4c] #I:#W #[fg=#4b4b4c,bg=default]"

set -g window-status-current-format \
"#[fg=#6e94b2,bg=default]#[fg=#141415,bg=#6e94b2] #I:#W #[fg=#6e94b2,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#141415,bg=#6e94b2"
set -g message-command-style "fg=#cdcdcd,bg=#141415"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#141415,bg=#6e94b2"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#838383,bg=#4b4b4c"
set -g copy-mode-current-match-style "fg=#141415,bg=#6e94b2"
