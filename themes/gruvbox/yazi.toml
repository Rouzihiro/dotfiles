[mgr]
cwd = { fg = "#ebdbb2" }
find_keyword = { fg = "#cc241d", bold = true, italic = true, underline = true }
find_position = { fg = "#cc241d", bold = true, italic = true }
marker_copied = { fg = "#b16286", bg = "#b16286" }
marker_cut = { fg = "#9d937a", bg = "#9d937a" }
marker_marked = { fg = "#458588", bg = "#458588" }
marker_selected = { fg = "#98971a", bg = "#98971a" }
count_copied = { fg = "#282828", bg = "#9d937a" }
count_cut = { fg = "#282828", bg = "#9d937a" }
count_selected = { fg = "#282828", bg = "#98971a" }
border_symbol = " "
border_style = { fg = "#458588" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#458588" }
perm_read = { fg = "#ebdbb2" }
perm_write = { fg = "#98971a" }
perm_exec = { fg = "#b16286" }
perm_sep = { fg = "#9d937a" }
progress_label = { bold = true }
progress_normal = { fg = "#458588", bg = "#45423c" }
progress_error = { fg = "#b16286", bg = "#45423c" }

[mode]
normal_main = { bg = "#458588", fg = "#282828", bold = true }
normal_alt  = { bg = "#45423c", fg = "#ebdbb2" }
select_main = { bg = "#9d937a", fg = "#282828", bold = true }
select_alt  = { bg = "#45423c", fg = "#ebdbb2" }
unset_main = { bg = "#98971a", fg = "#282828", bold = true }
unset_alt  = { bg = "#45423c", fg = "#ebdbb2" }

[select]
border = { fg = "#458588" }
active = { fg = "#98971a", bold = true }

[input]
border = { fg = "#458588" }
value = { fg = "#ebdbb2" }

[tabs]
active = { fg = "#458588", bold = true, bg = "#282828" }
inactive = { fg = "#9d937a", bg = "#282828" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#458588", bg = "#45423c" }

[tasks]
border = { fg = "#458588" }
title = {}
hovered = { fg = "#9d937a", underline = true }

[which]
cols = 3
mask = { bg = "#45423c" }
cand = { fg = "#458588" }
rest = { fg = "#282828" }
desc = { fg = "#ebdbb2" }
separator = " ▶ "
separator_style = { fg = "#ebdbb2" }

[help]
on = { fg = "#ebdbb2" }
run = { fg = "#ebdbb2" }
footer = { fg = "#282828", bg = "#9d937a" }

[notify]
title_info = { fg = "#98971a" }
title_warn = { fg = "#458588" }
title_error = { fg = "#b16286" }

[filetype]
rules = [
    { mime = "image/*", fg = "#98971a" },
    { mime = "{audio,video}/*", fg = "#458588" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#9d937a" },
    { mime = "application/{pdf,doc,rtf}", fg = "#ebdbb2" },
    { url = "*", is = "orphan", bg = "#b16286" },
    { url = "*", is = "exec", fg = "#9d937a" },
    { url = "*", fg = "#ebdbb2" },
    { url = "*/", fg = "#458588" },
]
