gui:
  theme:
    activeBorderColor:
      - '#b16286'
      - bold
    inactiveBorderColor:
      - '#928374'
    optionsTextColor:
      - '#458588'
    selectedLineBgColor:
      - '#282828'
    cherryPickedCommitBgColor:
      - '#3c3836'
    cherryPickedCommitFgColor:
      - '#b16286'
    unstagedChangesColor:
      - '#cc241d'
    defaultFgColor:
      - '#ebdbb2'
    searchingActiveBorderColor:
      - '#d79921'

  authorColors:
    '*': '#98971a'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
