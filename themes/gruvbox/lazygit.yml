gui:
  theme:
    activeBorderColor:
      - '#458588'
      - bold
    inactiveBorderColor:
      - '#625d51'
    optionsTextColor:
      - '#689d6a'
    selectedLineBgColor:
      - '#45423c'
    cherryPickedCommitBgColor:
      - '#282828'
    cherryPickedCommitFgColor:
      - '#458588'
    unstagedChangesColor:
      - '#cc241d'
    defaultFgColor:
      - '#ebdbb2'
    searchingActiveBorderColor:
      - '#d79921'
  authorColors:
    '*': '#98971a'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
