gui:
  theme:
    activeBorderColor:
      - '#9ccfd8'
      - bold
    inactiveBorderColor:
      - '#545262'
    optionsTextColor:
      - '#ebbcba'
    selectedLineBgColor:
      - '#363443'
    cherryPickedCommitBgColor:
      - '#191724'
    cherryPickedCommitFgColor:
      - '#9ccfd8'
    unstagedChangesColor:
      - '#eb6f92'
    defaultFgColor:
      - '#e0def4'
    searchingActiveBorderColor:
      - '#f6c177'
  authorColors:
    '*': '#31748f'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
