gui:
  theme:
    activeBorderColor:
      - '#c4a7e7'
      - bold
    inactiveBorderColor:
      - '#6e6a86'
    optionsTextColor:
      - '#9ccfd8'
    selectedLineBgColor:
      - '#191724'
    cherryPickedCommitBgColor:
      - '#26233a'
    cherryPickedCommitFgColor:
      - '#c4a7e7'
    unstagedChangesColor:
      - '#eb6f92'
    defaultFgColor:
      - '#e0def4'
    searchingActiveBorderColor:
      - '#f6c177'

  authorColors:
    '*': '#31748f'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
