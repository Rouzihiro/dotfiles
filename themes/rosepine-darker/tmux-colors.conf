# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#e0def4,bg=#191724"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#9ccfd8"
set -g pane-border-style "fg=#545262"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#545262,bg=default]#[fg=#e0def4,bg=#545262] #I:#W #[fg=#545262,bg=default]"

set -g window-status-current-format \
"#[fg=#9ccfd8,bg=default]#[fg=#191724,bg=#9ccfd8] #I:#W #[fg=#9ccfd8,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#191724,bg=#9ccfd8"
set -g message-command-style "fg=#e0def4,bg=#191724"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#191724,bg=#9ccfd8"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#908ea0,bg=#545262"
set -g copy-mode-current-match-style "fg=#191724,bg=#9ccfd8"
