[mgr]
cwd = { fg = "#e6d9db" }
find_keyword = { fg = "#fd6883", bold = true, italic = true, underline = true }
find_position = { fg = "#fd6883", bold = true, italic = true }
marker_copied = { fg = "#a8a9eb", bg = "#a8a9eb" }
marker_cut = { fg = "#9b9192", bg = "#9b9192" }
marker_marked = { fg = "#f38d70", bg = "#f38d70" }
marker_selected = { fg = "#adda78", bg = "#adda78" }
count_copied = { fg = "#2c2525", bg = "#9b9192" }
count_cut = { fg = "#2c2525", bg = "#9b9192" }
count_selected = { fg = "#2c2525", bg = "#adda78" }
border_symbol = " "
border_style = { fg = "#f38d70" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#f38d70" }
perm_read = { fg = "#e6d9db" }
perm_write = { fg = "#adda78" }
perm_exec = { fg = "#a8a9eb" }
perm_sep = { fg = "#9b9192" }
progress_label = { bold = true }
progress_normal = { fg = "#f38d70", bg = "#474040" }
progress_error = { fg = "#a8a9eb", bg = "#474040" }

[mode]
normal_main = { bg = "#f38d70", fg = "#2c2525", bold = true }
normal_alt  = { bg = "#474040", fg = "#e6d9db" }
select_main = { bg = "#9b9192", fg = "#2c2525", bold = true }
select_alt  = { bg = "#474040", fg = "#e6d9db" }
unset_main = { bg = "#adda78", fg = "#2c2525", bold = true }
unset_alt  = { bg = "#474040", fg = "#e6d9db" }

[select]
border = { fg = "#f38d70" }
active = { fg = "#adda78", bold = true }

[input]
border = { fg = "#f38d70" }
value = { fg = "#e6d9db" }

[tabs]
active = { fg = "#f38d70", bold = true, bg = "#2c2525" }
inactive = { fg = "#9b9192", bg = "#2c2525" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#f38d70", bg = "#474040" }

[tasks]
border = { fg = "#f38d70" }
title = {}
hovered = { fg = "#9b9192", underline = true }

[which]
cols = 3
mask = { bg = "#474040" }
cand = { fg = "#f38d70" }
rest = { fg = "#2c2525" }
desc = { fg = "#e6d9db" }
separator = " ▶ "
separator_style = { fg = "#e6d9db" }

[help]
on = { fg = "#e6d9db" }
run = { fg = "#e6d9db" }
footer = { fg = "#2c2525", bg = "#9b9192" }

[notify]
title_info = { fg = "#adda78" }
title_warn = { fg = "#f38d70" }
title_error = { fg = "#a8a9eb" }

[filetype]
rules = [
    { mime = "image/*", fg = "#adda78" },
    { mime = "{audio,video}/*", fg = "#f38d70" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#9b9192" },
    { mime = "application/{pdf,doc,rtf}", fg = "#e6d9db" },
    { url = "*", is = "orphan", bg = "#a8a9eb" },
    { url = "*", is = "exec", fg = "#9b9192" },
    { url = "*", fg = "#e6d9db" },
    { url = "*/", fg = "#f38d70" },
]
