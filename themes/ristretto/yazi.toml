# : Manager [[[

[mgr]
cwd = { fg = "#e6d9db" }

# Find
find_keyword = { fg = "#fd6883", bold = true, italic = true, underline = true }
find_position = { fg = "#fd6883", bold = true, italic = true }

# Marker
marker_copied = { fg = "#c8e292", bg = "#c8e292" }
marker_cut = { fg = "#f1e5e7", bg = "#f1e5e7" }
marker_marked = { fg = "#fd6883", bg = "#fd6883" }
marker_selected = { fg = "#8e8787", bg = "#8e8787" }

# Count
count_copied = { fg = "#2c2525", bg = "#f1e5e7" }
count_cut = { fg = "#2c2525", bg = "#f1e5e7" }
count_selected = { fg = "#72696a", bg = "#8e8787" }

# Border
border_symbol = " "
border_style = { fg = "#fd6883" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#fd6883" }
perm_read = { fg = "#e6d9db" }
perm_write = { fg = "#8e8787" }
perm_exec = { fg = "#c8e292" }
perm_sep = { fg = "#f1e5e7" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#fd6883", bg = "#72696a" }
progress_error = { fg = "#c8e292", bg = "#72696a" }

[mode]
normal_main = { bg = "#fd6883", fg = "#72696a", bold = true }
normal_alt  = { bg = "#72696a", fg = "#e6d9db" }

select_main = { bg = "#f1e5e7", fg = "#72696a", bold = true }
select_alt  = { bg = "#72696a", fg = "#e6d9db" }

unset_main = { bg = "#8e8787", fg = "#72696a", bold = true }
unset_alt  = { bg = "#72696a", fg = "#e6d9db" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#fd6883" }
active = { fg = "#8e8787", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#fd6883" }
value = { fg = "#e6d9db" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#fd6883", bold = true, bg = "#2c2525" }
inactive = { fg = "#f1e5e7", bg = "#2c2525" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#fd6883", bg = "#948a8b" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#fd6883" }
title = {}
hovered = { fg = "#f1e5e7", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#72696a" }
cand = { fg = "#fd6883" }
rest = { fg = "#72696a" }
desc = { fg = "#e6d9db" }
separator = " ▶ "
separator_style = { fg = "#e6d9db" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e6d9db" }
run = { fg = "#e6d9db" }
footer = { fg = "#72696a", bg = "#f1e5e7" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#8e8787" }
title_warn = { fg = "#fd6883" }
title_error = { fg = "#c8e292" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#8e8787" },
    { mime = "{audio,video}/*", fg = "#fd6883" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f1e5e7" },

    { mime = "application/{pdf,doc,rtf}", fg = "#e6d9db" },

    { url = "*", is = "orphan", bg = "#c8e292" },
    { url = "*", is = "exec", fg = "#f1e5e7" },

    { url = "*", fg = "#e6d9db" },
    { url = "*/", fg = "#fd6883" },
]

# : ]]]
