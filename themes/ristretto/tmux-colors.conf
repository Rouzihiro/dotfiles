# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#e6d9db,bg=#2c2525"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#f38d70"
set -g pane-border-style "fg=#635b5b"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#635b5b,bg=default]#[fg=#e6d9db,bg=#635b5b] #I:#W #[fg=#635b5b,bg=default]"

set -g window-status-current-format \
"#[fg=#f38d70,bg=default]#[fg=#2c2525,bg=#f38d70] #I:#W #[fg=#f38d70,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#2c2525,bg=#f38d70"
set -g message-command-style "fg=#e6d9db,bg=#2c2525"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#2c2525,bg=#f38d70"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#9b9192,bg=#635b5b"
set -g copy-mode-current-match-style "fg=#2c2525,bg=#f38d70"
