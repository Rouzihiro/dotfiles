gui:
  theme:
    activeBorderColor:
      - '#a8a9eb'
      - bold
    inactiveBorderColor:
      - '#948a8b'
    optionsTextColor:
      - '#f38d70'
    selectedLineBgColor:
      - '#2c2525'
    cherryPickedCommitBgColor:
      - '#72696a'
    cherryPickedCommitFgColor:
      - '#a8a9eb'
    unstagedChangesColor:
      - '#fd6883'
    defaultFgColor:
      - '#e6d9db'
    searchingActiveBorderColor:
      - '#f9cc6c'

  authorColors:
    '*': '#adda78'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
