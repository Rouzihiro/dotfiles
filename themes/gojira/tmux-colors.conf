# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#b4d0dd,bg=#090d15"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#97a6bb"
set -g pane-border-style "fg=#3c4751"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#3c4751,bg=default]#[fg=#b4d0dd,bg=#3c4751] #I:#W #[fg=#3c4751,bg=default]"

set -g window-status-current-format \
"#[fg=#97a6bb,bg=default]#[fg=#090d15,bg=#97a6bb] #I:#W #[fg=#97a6bb,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#090d15,bg=#97a6bb"
set -g message-command-style "fg=#b4d0dd,bg=#090d15"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#090d15,bg=#97a6bb"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#6f828d,bg=#3c4751"
set -g copy-mode-current-match-style "fg=#090d15,bg=#97a6bb"
