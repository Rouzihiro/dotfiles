gui:
  theme:
    activeBorderColor:
      - '#97a6bb'
      - bold
    inactiveBorderColor:
      - '#3c4751'
    optionsTextColor:
      - '#86a0ad'
    selectedLineBgColor:
      - '#222a33'
    cherryPickedCommitBgColor:
      - '#090d15'
    cherryPickedCommitFgColor:
      - '#97a6bb'
    unstagedChangesColor:
      - '#6e7b91'
    defaultFgColor:
      - '#b4d0dd'
    searchingActiveBorderColor:
      - '#7e96a5'
  authorColors:
    '*': '#667e8c'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
