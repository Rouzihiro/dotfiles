# Generated by thememenu - see ~/.config/sway/themes/<theme>/theme.conf for palette

#:schema https://yazi-rs.github.io/schemas/theme.json
# vim:fileencoding=utf-8:foldmethod=marker


# : Flavor {{{

[flavor]
dark  = ""
light = ""

# : }}}


# : App {{{

[app]
overall = {}

# : }}}


# : Manager {{{

[mgr]
cwd = { fg = "#ae9513" }

# Find
find_keyword  = { fg = "#ae9513", bold = true }
find_position = { fg = "#60ac39", bold = true }

# Symlink
symlink_target = { italic = true }

# Marker
marker_copied   = { fg = "#60ac39", bg = "#60ac39" }
marker_cut      = { fg = "#d73737", bg = "#d73737" }
marker_marked   = { fg = "#ae9513", bg = "#ae9513" }
marker_selected = { fg = "#a6a28c", bg = "#a6a28c" }
marker_symbol   = "│"

# Count
count_copied   = { fg = "#20201d", bg = "#60ac39" }
count_cut      = { fg = "#20201d", bg = "#d73737" }
count_selected = { fg = "#20201d", bg = "#a6a28c" }

# Border
border_symbol = "│"
border_style  = { fg = "#a6a28c" }

# Highlighting
syntect_theme = ""

# : }}}


# : Tabs {{{

[tabs]
active   = { bg = "#ae9513", bold = true }
inactive = { fg = "#ae9513", bg = "#7d7a68" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { bg = "#ae9513", bold = true }
normal_alt  = { fg = "#ae9513", bg = "#7d7a68" }

# Select mode
select_main = { bg = "#60ac39", bold = true }
select_alt  = { fg = "#60ac39", bg = "#7d7a68" }

# Unset mode
unset_main = { bg = "#d73737", bold = true }
unset_alt  = { fg = "#d73737", bg = "#7d7a68" }

# : }}}


# : Indicator of hovered file {{{

[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "", close = "" }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep   = { fg = "#a6a28c" }
perm_type  = { fg = "#60ac39" }
perm_read  = { fg = "#a6a28c" }
perm_write = { fg = "#d73737" }
perm_exec  = { fg = "#ae9513" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#60ac39", bg = "#7d7a68" }
progress_error  = { fg = "#d73737", bg = "#7d7a68" }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#7d7a68" }
cand            = { fg = "#60ac39" }
rest            = { fg = "#a6a28c" }
desc            = { fg = "#ae9513" }
separator       = "  "
separator_style = { fg = "#a6a28c" }

# : }}}


# : Confirmation {{{

[confirm]
border     = { fg = "#ae9513" }
title      = { fg = "#ae9513" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "#ae9513" }
title  = { fg = "#ae9513" }

# Table
tbl_col  = { fg = "#ae9513" }
tbl_cell = { fg = "#ae9513", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#60ac39" }
title_warn  = { fg = "#ae9513" }
title_error = { fg = "#d73737" }

# Icons
icon_info  = ""
icon_warn  = ""
icon_error = ""

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#ae9513" }
active   = { fg = "#60ac39", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#ae9513" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#ae9513" }
active   = { reversed = true }
inactive = {}

# Icons
icon_file    = ""
icon_folder  = ""
icon_command = ""

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#ae9513" }
title   = {}
hovered = { fg = "#60ac39", bold = true }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#ae9513" }
run     = { fg = "#60ac39" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#20201d", bg = "#a6a28c" }

# : }}}


# : File-specific styles {{{

[filetype]
rules = [
	# Directories
	{ mime = "inode/directory", fg = "#ae9513" },
	# Images
	{ mime = "image/*", fg = "#60ac39" },
	# Media (audio/video)
	{ mime = "{audio,video}/*", fg = "#60ac39" },
	# Archives
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#d73737" },
	# Documents
	{ mime = "application/{pdf,doc,rtf,odt,ods,odp,odg}", fg = "#fefbec" },
	# Code/Text
	{ mime = "text/*", fg = "#fefbec" },
	# Executables
	{ url = "*", is = "exec", fg = "#d73737" },
	# Broken symlinks / special files
	{ url = "*", is = "orphan", bg = "#d73737", fg = "#20201d" },
	# Fallback for directories
	{ url = "*/", fg = "#ae9513" },
]

# : }}}


# : Icons - simplified for your palette {{{

[icon]
globs = []
dirs = [
	{ name = ".config", text = "", fg = "#60ac39" },
	{ name = ".git", text = "", fg = "#d73737" },
	{ name = "Desktop", text = "", fg = "#60ac39" },
	{ name = "Documents", text = "", fg = "#60ac39" },
	{ name = "Downloads", text = "", fg = "#60ac39" },
	{ name = "Music", text = "", fg = "#60ac39" },
	{ name = "Pictures", text = "", fg = "#60ac39" },
	{ name = "Videos", text = "", fg = "#60ac39" },
]
files = [
	{ name = ".bashrc", text = "", fg = "#60ac39" },
	{ name = ".gitignore", text = "", fg = "#d73737" },
	{ name = "Dockerfile", text = "󰡨", fg = "#ae9513" },
	{ name = "Makefile", text = "", fg = "#ae9513" },
	{ name = "README.md", text = "󰂺", fg = "#60ac39" },
]
exts = [
	{ name = "rs", text = "", fg = "#ae9513" },
	{ name = "go", text = "", fg = "#ae9513" },
	{ name = "py", text = "", fg = "#ae9513" },
	{ name = "js", text = "", fg = "#ae9513" },
	{ name = "ts", text = "", fg = "#ae9513" },
	{ name = "json", text = "", fg = "#a6a28c" },
	{ name = "toml", text = "", fg = "#a6a28c" },
	{ name = "yaml", text = "", fg = "#a6a28c" },
	{ name = "yml", text = "", fg = "#a6a28c" },
	{ name = "md", text = "", fg = "#fefbec" },
	{ name = "txt", text = "󰈙", fg = "#fefbec" },
	{ name = "pdf", text = "", fg = "#d73737" },
	{ name = "png", text = "", fg = "#60ac39" },
	{ name = "jpg", text = "", fg = "#60ac39" },
	{ name = "jpeg", text = "", fg = "#60ac39" },
	{ name = "gif", text = "", fg = "#60ac39" },
	{ name = "svg", text = "󰜡", fg = "#60ac39" },
	{ name = "mp3", text = "", fg = "#60ac39" },
	{ name = "mp4", text = "", fg = "#60ac39" },
	{ name = "zip", text = "", fg = "#d73737" },
	{ name = "tar", text = "", fg = "#d73737" },
	{ name = "gz", text = "", fg = "#d73737" },
	{ name = "xz", text = "", fg = "#d73737" },
	{ name = "7z", text = "", fg = "#d73737" },
	{ name = "rar", text = "", fg = "#d73737" },
]
conds = [
	{ if = "orphan", text = "", fg = "#d73737" },
