# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#d0c8b6,bg=#1b1a17"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#6f8fa3"
set -g pane-border-style "fg=#514e46"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#514e46,bg=default]#[fg=#d0c8b6,bg=#514e46] #I:#W #[fg=#514e46,bg=default]"

set -g window-status-current-format \
"#[fg=#6f8fa3,bg=default]#[fg=#1b1a17,bg=#6f8fa3] #I:#W #[fg=#6f8fa3,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#1b1a17,bg=#6f8fa3"
set -g message-command-style "fg=#d0c8b6,bg=#1b1a17"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#1b1a17,bg=#6f8fa3"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#878276,bg=#514e46"
set -g copy-mode-current-match-style "fg=#1b1a17,bg=#6f8fa3"
