# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#cacccc,bg=#101315"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#798186"
set -g pane-border-style "fg=#474a4b"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#474a4b,bg=default]#[fg=#cacccc,bg=#474a4b] #I:#W #[fg=#474a4b,bg=default]"

set -g window-status-current-format \
"#[fg=#798186,bg=default]#[fg=#101315,bg=#798186] #I:#W #[fg=#798186,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#101315,bg=#798186"
set -g message-command-style "fg=#cacccc,bg=#101315"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#101315,bg=#798186"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#7f8282,bg=#474a4b"
set -g copy-mode-current-match-style "fg=#101315,bg=#798186"
