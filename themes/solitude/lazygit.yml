gui:
  theme:
    activeBorderColor:
      - '#798186'
      - bold
    inactiveBorderColor:
      - '#474a4b'
    optionsTextColor:
      - '#707070'
    selectedLineBgColor:
      - '#2b2e30'
    cherryPickedCommitBgColor:
      - '#101315'
    cherryPickedCommitFgColor:
      - '#798186'
    unstagedChangesColor:
      - '#565d60'
    defaultFgColor:
      - '#cacccc'
    searchingActiveBorderColor:
      - '#d9dbdc'
  authorColors:
    '*': '#9fa5a9'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
