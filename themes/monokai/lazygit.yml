gui:
  theme:
    activeBorderColor:
      - '#9d65ff'
      - bold
    inactiveBorderColor:
      - '#494949'
    optionsTextColor:
      - '#58d1eb'
    selectedLineBgColor:
      - '#2a2a2a'
    cherryPickedCommitBgColor:
      - '#0c0c0c'
    cherryPickedCommitFgColor:
      - '#9d65ff'
    unstagedChangesColor:
      - '#f4005f'
    defaultFgColor:
      - '#d9d9d9'
    searchingActiveBorderColor:
      - '#fd971f'
  authorColors:
    '*': '#98e024'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
