# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#d9d9d9,bg=#0c0c0c"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#9d65ff"
set -g pane-border-style "fg=#494949"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#494949,bg=default]#[fg=#d9d9d9,bg=#494949] #I:#W #[fg=#494949,bg=default]"

set -g window-status-current-format \
"#[fg=#9d65ff,bg=default]#[fg=#0c0c0c,bg=#9d65ff] #I:#W #[fg=#9d65ff,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#0c0c0c,bg=#9d65ff"
set -g message-command-style "fg=#d9d9d9,bg=#0c0c0c"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#0c0c0c,bg=#9d65ff"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#878787,bg=#494949"
set -g copy-mode-current-match-style "fg=#0c0c0c,bg=#9d65ff"
