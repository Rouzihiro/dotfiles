[mgr]
cwd = { fg = "#c0caf5" }
find_keyword = { fg = "#f7768e", bold = true, italic = true, underline = true }
find_position = { fg = "#f7768e", bold = true, italic = true }
marker_copied = { fg = "#bb9af7", bg = "#bb9af7" }
marker_cut = { fg = "#7d84a2", bg = "#7d84a2" }
marker_marked = { fg = "#7aa2f7", bg = "#7aa2f7" }
marker_selected = { fg = "#9ece6a", bg = "#9ece6a" }
count_copied = { fg = "#1a1b26", bg = "#7d84a2" }
count_cut = { fg = "#1a1b26", bg = "#7d84a2" }
count_selected = { fg = "#1a1b26", bg = "#9ece6a" }
border_symbol = " "
border_style = { fg = "#7aa2f7" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#7aa2f7" }
perm_read = { fg = "#c0caf5" }
perm_write = { fg = "#9ece6a" }
perm_exec = { fg = "#bb9af7" }
perm_sep = { fg = "#7d84a2" }
progress_label = { bold = true }
progress_normal = { fg = "#7aa2f7", bg = "#323545" }
progress_error = { fg = "#bb9af7", bg = "#323545" }

[mode]
normal_main = { bg = "#7aa2f7", fg = "#1a1b26", bold = true }
normal_alt  = { bg = "#323545", fg = "#c0caf5" }
select_main = { bg = "#7d84a2", fg = "#1a1b26", bold = true }
select_alt  = { bg = "#323545", fg = "#c0caf5" }
unset_main = { bg = "#9ece6a", fg = "#1a1b26", bold = true }
unset_alt  = { bg = "#323545", fg = "#c0caf5" }

[select]
border = { fg = "#7aa2f7" }
active = { fg = "#9ece6a", bold = true }

[input]
border = { fg = "#7aa2f7" }
value = { fg = "#c0caf5" }

[tabs]
active = { fg = "#7aa2f7", bold = true, bg = "#1a1b26" }
inactive = { fg = "#7d84a2", bg = "#1a1b26" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#7aa2f7", bg = "#323545" }

[tasks]
border = { fg = "#7aa2f7" }
title = {}
hovered = { fg = "#7d84a2", underline = true }

[which]
cols = 3
mask = { bg = "#323545" }
cand = { fg = "#7aa2f7" }
rest = { fg = "#1a1b26" }
desc = { fg = "#c0caf5" }
separator = " ▶ "
separator_style = { fg = "#c0caf5" }

[help]
on = { fg = "#c0caf5" }
run = { fg = "#c0caf5" }
footer = { fg = "#1a1b26", bg = "#7d84a2" }

[notify]
title_info = { fg = "#9ece6a" }
title_warn = { fg = "#7aa2f7" }
title_error = { fg = "#bb9af7" }

[filetype]
rules = [
    { mime = "image/*", fg = "#9ece6a" },
    { mime = "{audio,video}/*", fg = "#7aa2f7" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#7d84a2" },
    { mime = "application/{pdf,doc,rtf}", fg = "#c0caf5" },
    { url = "*", is = "orphan", bg = "#bb9af7" },
    { url = "*", is = "exec", fg = "#7d84a2" },
    { url = "*", fg = "#c0caf5" },
    { url = "*/", fg = "#7aa2f7" },
]
