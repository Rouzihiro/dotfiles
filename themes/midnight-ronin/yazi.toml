# : Manager [[[

[mgr]
cwd = { fg = "#c0caf5" }

# Find
find_keyword = { fg = "#f7768e", bold = true, italic = true, underline = true }
find_position = { fg = "#f7768e", bold = true, italic = true }

# Marker
marker_copied = { fg = "#bb9af7", bg = "#bb9af7" }
marker_cut = { fg = "#c0caf5", bg = "#c0caf5" }
marker_marked = { fg = "#7aa2f7", bg = "#7aa2f7" }
marker_selected = { fg = "#676c86", bg = "#676c86" }

# Count
count_copied = { fg = "#1a1b26", bg = "#c0caf5" }
count_cut = { fg = "#1a1b26", bg = "#c0caf5" }
count_selected = { fg = "#15161e", bg = "#676c86" }

# Border
border_symbol = " "
border_style = { fg = "#7aa2f7" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#7aa2f7" }
perm_read = { fg = "#c0caf5" }
perm_write = { fg = "#676c86" }
perm_exec = { fg = "#bb9af7" }
perm_sep = { fg = "#c0caf5" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#7aa2f7", bg = "#414868" }
progress_error = { fg = "#bb9af7", bg = "#414868" }

[mode]
normal_main = { bg = "#7aa2f7", fg = "#15161e", bold = true }
normal_alt  = { bg = "#414868", fg = "#c0caf5" }

select_main = { bg = "#c0caf5", fg = "#15161e", bold = true }
select_alt  = { bg = "#414868", fg = "#c0caf5" }

unset_main = { bg = "#676c86", fg = "#15161e", bold = true }
unset_alt  = { bg = "#414868", fg = "#c0caf5" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#7aa2f7" }
active = { fg = "#676c86", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#7aa2f7" }
value = { fg = "#c0caf5" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#7aa2f7", bold = true, bg = "#1a1b26" }
inactive = { fg = "#c0caf5", bg = "#1a1b26" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#7aa2f7", bg = "#414868" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#7aa2f7" }
title = {}
hovered = { fg = "#c0caf5", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#414868" }
cand = { fg = "#7aa2f7" }
rest = { fg = "#15161e" }
desc = { fg = "#c0caf5" }
separator = " ▶ "
separator_style = { fg = "#c0caf5" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#c0caf5" }
run = { fg = "#c0caf5" }
footer = { fg = "#15161e", bg = "#c0caf5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#676c86" }
title_warn = { fg = "#7aa2f7" }
title_error = { fg = "#bb9af7" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#676c86" },
    { mime = "{audio,video}/*", fg = "#7aa2f7" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c0caf5" },

    { mime = "application/{pdf,doc,rtf}", fg = "#c0caf5" },

    { url = "*", is = "orphan", bg = "#bb9af7" },
    { url = "*", is = "exec", fg = "#c0caf5" },

    { url = "*", fg = "#c0caf5" },
    { url = "*/", fg = "#7aa2f7" },
]

# : ]]]
