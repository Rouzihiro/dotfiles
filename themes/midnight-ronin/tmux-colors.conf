# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#c0caf5,bg=#1a1b26"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-style "fg=#4b4f64"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4b4f64,bg=default]#[fg=#c0caf5,bg=#4b4f64] #I:#W #[fg=#4b4f64,bg=default]"

set -g window-status-current-format \
"#[fg=#7aa2f7,bg=default]#[fg=#1a1b26,bg=#7aa2f7] #I:#W #[fg=#7aa2f7,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#1a1b26,bg=#7aa2f7"
set -g message-command-style "fg=#c0caf5,bg=#1a1b26"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#1a1b26,bg=#7aa2f7"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#7d84a2,bg=#4b4f64"
set -g copy-mode-current-match-style "fg=#1a1b26,bg=#7aa2f7"
