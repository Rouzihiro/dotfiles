# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#d3c6aa,bg=#272e33"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#7fbbb3"
set -g pane-border-style "fg=#5a5b56"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#5a5b56,bg=default]#[fg=#d3c6aa,bg=#5a5b56] #I:#W #[fg=#5a5b56,bg=default]"

set -g window-status-current-format \
"#[fg=#7fbbb3,bg=default]#[fg=#272e33,bg=#7fbbb3] #I:#W #[fg=#7fbbb3,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#272e33,bg=#7fbbb3"
set -g message-command-style "fg=#d3c6aa,bg=#272e33"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#272e33,bg=#7fbbb3"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#8e897a,bg=#5a5b56"
set -g copy-mode-current-match-style "fg=#272e33,bg=#7fbbb3"
