gui:
  theme:
    activeBorderColor:
      - '#7fbbb3'
      - bold
    inactiveBorderColor:
      - '#5a5b56'
    optionsTextColor:
      - '#83c092'
    selectedLineBgColor:
      - '#404444'
    cherryPickedCommitBgColor:
      - '#272e33'
    cherryPickedCommitFgColor:
      - '#7fbbb3'
    unstagedChangesColor:
      - '#e67e80'
    defaultFgColor:
      - '#d3c6aa'
    searchingActiveBorderColor:
      - '#dbbc7f'
  authorColors:
    '*': '#a7c080'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
