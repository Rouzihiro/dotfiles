# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#839496,bg=#002B36"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#268BD2"
set -g pane-border-style "fg=#274a52"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#274a52,bg=default]#[fg=#839496,bg=#274a52] #I:#W #[fg=#274a52,bg=default]"

set -g window-status-current-format \
"#[fg=#268BD2,bg=default]#[fg=#002B36,bg=#268BD2] #I:#W #[fg=#268BD2,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#002B36,bg=#268BD2"
set -g message-command-style "fg=#839496,bg=#002B36"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#002B36,bg=#268BD2"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#4e6a6f,bg=#274a52"
set -g copy-mode-current-match-style "fg=#002B36,bg=#268BD2"
