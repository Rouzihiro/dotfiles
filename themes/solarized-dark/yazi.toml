# : Manager [[[

[mgr]
cwd = { fg = "#839496" }

# Find
find_keyword = { fg = "#DC322F", bold = true, italic = true, underline = true }
find_position = { fg = "#DC322F", bold = true, italic = true }

# Marker
marker_copied = { fg = "#859900", bg = "#859900" }
marker_cut = { fg = "#fdf6e3", bg = "#fdf6e3" }
marker_marked = { fg = "#DC322F", bg = "#DC322F" }
marker_selected = { fg = "#33525a", bg = "#33525a" }

# Count
count_copied = { fg = "#002B36", bg = "#fdf6e3" }
count_cut = { fg = "#002B36", bg = "#fdf6e3" }
count_selected = { fg = "#fdf6e3", bg = "#33525a" }

# Border
border_symbol = " "
border_style = { fg = "#DC322F" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#DC322F" }
perm_read = { fg = "#839496" }
perm_write = { fg = "#33525a" }
perm_exec = { fg = "#859900" }
perm_sep = { fg = "#fdf6e3" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#DC322F", bg = "#002731" }
progress_error = { fg = "#859900", bg = "#002731" }

[mode]
normal_main = { bg = "#DC322F", fg = "#fdf6e3", bold = true }
normal_alt  = { bg = "#002731", fg = "#839496" }

select_main = { bg = "#fdf6e3", fg = "#073642", bold = true }
select_alt  = { bg = "#002731", fg = "#839496" }

unset_main = { bg = "#33525a", fg = "#073642", bold = true }
unset_alt  = { bg = "#002731", fg = "#839496" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#DC322F" }
active = { fg = "#33525a", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#DC322F" }
value = { fg = "#839496" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#DC322F", bold = true, bg = "#002B36" }
inactive = { fg = "#fdf6e3", bg = "#002B36" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#DC322F", bg = "#002731" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#DC322F" }
title = {}
hovered = { fg = "#fdf6e3", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#002731" }
cand = { fg = "#DC322F" }
rest = { fg = "#fdf6e3" }
desc = { fg = "#839496" }
separator = " ▶ "
separator_style = { fg = "#839496" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#839496" }
run = { fg = "#839496" }
footer = { fg = "#073642", bg = "#fdf6e3" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#33525a" }
title_warn = { fg = "#DC322F" }
title_error = { fg = "#859900" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#33525a" },
    { mime = "{audio,video}/*", fg = "#DC322F" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#fdf6e3" },

    { mime = "application/{pdf,doc,rtf}", fg = "#839496" },

    { url = "*", is = "orphan", bg = "#859900" },
    { url = "*", is = "exec", fg = "#fdf6e3" },

    { url = "*", fg = "#839496" },
    { url = "*/", fg = "#DC322F" },
]

# : ]]]
