gui:
  theme:
    activeBorderColor:
      - '#268BD2'
      - bold
    inactiveBorderColor:
      - '#274a52'
    optionsTextColor:
      - '#2AA198'
    selectedLineBgColor:
      - '#133a44'
    cherryPickedCommitBgColor:
      - '#002B36'
    cherryPickedCommitFgColor:
      - '#268BD2'
    unstagedChangesColor:
      - '#DC322F'
    defaultFgColor:
      - '#839496'
    searchingActiveBorderColor:
      - '#B58900'
  authorColors:
    '*': '#859900'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
