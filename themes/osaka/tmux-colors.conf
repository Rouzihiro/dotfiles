# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#C1C497,bg=#111C18"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#509475"
set -g pane-border-style "fg=#454e3e"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#454e3e,bg=default]#[fg=#C1C497,bg=#454e3e] #I:#W #[fg=#454e3e,bg=default]"

set -g window-status-current-format \
"#[fg=#509475,bg=default]#[fg=#111C18,bg=#509475] #I:#W #[fg=#509475,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#111C18,bg=#509475"
set -g message-command-style "fg=#C1C497,bg=#111C18"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#111C18,bg=#509475"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#7a8064,bg=#454e3e"
set -g copy-mode-current-match-style "fg=#111C18,bg=#509475"
