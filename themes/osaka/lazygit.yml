gui:
  theme:
    activeBorderColor:
      - '#509475'
      - bold
    inactiveBorderColor:
      - '#454e3e'
    optionsTextColor:
      - '#2DD5B7'
    selectedLineBgColor:
      - '#2b352b'
    cherryPickedCommitBgColor:
      - '#111C18'
    cherryPickedCommitFgColor:
      - '#509475'
    unstagedChangesColor:
      - '#FF5345'
    defaultFgColor:
      - '#C1C497'
    searchingActiveBorderColor:
      - '#459451'
  authorColors:
    '*': '#549E6A'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
