# : Manager [[[

[mgr]
cwd = { fg = "#575279" }

# Tab
tab_active = { fg = "#f2e9e1", bg = "#b4637a", bold = true }
tab_inactive = { fg = "#575279", bg = "#9893a5" }
tab_width = 1

# Find
find_keyword = { fg = "#b4637a", bold = true, italic = true, underline = true }
find_position = { fg = "#b4637a", bold = true, italic = true }

# Marker
marker_copied = { fg = "#286983", bg = "#286983" }
marker_cut = { fg = "#f2e9e1", bg = "#f2e9e1" }
marker_marked = { fg = "#b4637a", bg = "#b4637a" }
marker_selected = { fg = "#aca8b7", bg = "#aca8b7" }

# Count
count_copied = { fg = "#faf4ed", bg = "#f2e9e1" }
count_cut = { fg = "#faf4ed", bg = "#f2e9e1" }
count_selected = { fg = "#f2e9e1", bg = "#aca8b7" }

# Border
border_symbol = " "
border_style  = { fg = "#b4637a" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#9893a5", fg = "#b4637a" }

[mode]
# Mode
normal_main = { bg = "#b4637a", fg = "#f2e9e1", bold = true }
normal_alt  = { bg = "#9893a5", fg = "#575279" }

# Select mode
select_main = { bg = "#f2e9e1", fg = "#575279", bold = true }
select_alt  = { bg = "#9893a5", fg = "#575279" }

# Unset mode
unset_main = { bg = "#aca8b7", fg = "#575279", bold = true }
unset_alt  = { bg = "#9893a5", fg = "#575279" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#b4637a", bg = "#9893a5" }
progress_error = { fg = "#286983", bg = "#9893a5" }

# Permissions
permissions_t = { fg = "#b4637a" }
permissions_w = { fg = "#aca8b7" }
permissions_x = { fg = "#286983" }
permissions_r = { fg = "#575279" }
permissions_s = { fg = "#f2e9e1" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#b4637a" }
active = { fg = "#aca8b7", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#b4637a" }
value = { fg = "#575279" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#b4637a", bold = true, bg = "#faf4ed" }
inactive = { fg = "#f2e9e1", bg = "#faf4ed" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#b4637a", bg = "#9893a5" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#b4637a" }
title = {}
hovered = { fg = "#f2e9e1", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#9893a5" }
cand = { fg = "#b4637a" }
rest = { fg = "#f2e9e1" }
desc = { fg = "#575279" }
separator = " ▶ "
separator_style = { fg = "#575279" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#575279" }
run = { fg = "#575279" }
footer = { fg = "#575279", bg = "#f2e9e1" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#aca8b7" }
title_warn = { fg = "#b4637a" }
title_error = { fg = "#286983" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#aca8b7" },

    # Media
    { mime = "{audio,video}/*", fg = "#b4637a" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f2e9e1" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#575279" },

    # Special files
    { name = "*", is = "orphan", bg = "#286983" },
    { name = "*", is = "exec", fg = "#f2e9e1" },

    # Fallback
    { name = "*", fg = "#575279" },
    { name = "*/", fg = "#b4637a" },
]

# : ]]]
