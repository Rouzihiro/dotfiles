[mgr]
cwd = { fg = "#575279" }
find_keyword = { fg = "#b4637a", bold = true, italic = true, underline = true }
find_position = { fg = "#b4637a", bold = true, italic = true }
marker_copied = { fg = "#907aa9", bg = "#907aa9" }
marker_cut = { fg = "#9892a7", bg = "#9892a7" }
marker_marked = { fg = "#56949f", bg = "#56949f" }
marker_selected = { fg = "#286983", bg = "#286983" }
count_copied = { fg = "#faf4ed", bg = "#9892a7" }
count_cut = { fg = "#faf4ed", bg = "#9892a7" }
count_selected = { fg = "#faf4ed", bg = "#286983" }
border_symbol = " "
border_style = { fg = "#56949f" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#56949f" }
perm_read = { fg = "#575279" }
perm_write = { fg = "#286983" }
perm_exec = { fg = "#907aa9" }
perm_sep = { fg = "#9892a7" }
progress_label = { bold = true }
progress_normal = { fg = "#56949f", bg = "#e1dbdb" }
progress_error = { fg = "#907aa9", bg = "#e1dbdb" }

[mode]
normal_main = { bg = "#56949f", fg = "#faf4ed", bold = true }
normal_alt  = { bg = "#e1dbdb", fg = "#575279" }
select_main = { bg = "#9892a7", fg = "#faf4ed", bold = true }
select_alt  = { bg = "#e1dbdb", fg = "#575279" }
unset_main = { bg = "#286983", fg = "#faf4ed", bold = true }
unset_alt  = { bg = "#e1dbdb", fg = "#575279" }

[select]
border = { fg = "#56949f" }
active = { fg = "#286983", bold = true }

[input]
border = { fg = "#56949f" }
value = { fg = "#575279" }

[tabs]
active = { fg = "#56949f", bold = true, bg = "#faf4ed" }
inactive = { fg = "#9892a7", bg = "#faf4ed" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#56949f", bg = "#e1dbdb" }

[tasks]
border = { fg = "#56949f" }
title = {}
hovered = { fg = "#9892a7", underline = true }

[which]
cols = 3
mask = { bg = "#e1dbdb" }
cand = { fg = "#56949f" }
rest = { fg = "#faf4ed" }
desc = { fg = "#575279" }
separator = " ▶ "
separator_style = { fg = "#575279" }

[help]
on = { fg = "#575279" }
run = { fg = "#575279" }
footer = { fg = "#faf4ed", bg = "#9892a7" }

[notify]
title_info = { fg = "#286983" }
title_warn = { fg = "#56949f" }
title_error = { fg = "#907aa9" }

[filetype]
rules = [
    { mime = "image/*", fg = "#286983" },
    { mime = "{audio,video}/*", fg = "#56949f" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#9892a7" },
    { mime = "application/{pdf,doc,rtf}", fg = "#575279" },
    { url = "*", is = "orphan", bg = "#907aa9" },
    { url = "*", is = "exec", fg = "#9892a7" },
    { url = "*", fg = "#575279" },
    { url = "*/", fg = "#56949f" },
]
