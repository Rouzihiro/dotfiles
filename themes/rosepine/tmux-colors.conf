# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#575279,bg=#faf4ed"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#56949f"
set -g pane-border-style "fg=#c9c3ca"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#c9c3ca,bg=default]#[fg=#575279,bg=#c9c3ca] #I:#W #[fg=#c9c3ca,bg=default]"

set -g window-status-current-format \
"#[fg=#56949f,bg=default]#[fg=#faf4ed,bg=#56949f] #I:#W #[fg=#56949f,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#faf4ed,bg=#56949f"
set -g message-command-style "fg=#575279,bg=#faf4ed"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#faf4ed,bg=#56949f"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#9892a7,bg=#c9c3ca"
set -g copy-mode-current-match-style "fg=#faf4ed,bg=#56949f"
