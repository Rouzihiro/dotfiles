gui:
  theme:
    activeBorderColor:
      - '#56949f'
      - bold
    inactiveBorderColor:
      - '#c9c3ca'
    optionsTextColor:
      - '#d7827e'
    selectedLineBgColor:
      - '#e1dbdb'
    cherryPickedCommitBgColor:
      - '#faf4ed'
    cherryPickedCommitFgColor:
      - '#56949f'
    unstagedChangesColor:
      - '#b4637a'
    defaultFgColor:
      - '#575279'
    searchingActiveBorderColor:
      - '#ea9d34'
  authorColors:
    '*': '#286983'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
