gui:
  theme:
    activeBorderColor:
      - '#907aa9'
      - bold
    inactiveBorderColor:
      - '#9893a5'
    optionsTextColor:
      - '#56949f'
    selectedLineBgColor:
      - '#faf4ed'
    cherryPickedCommitBgColor:
      - '#f2e9e1'
    cherryPickedCommitFgColor:
      - '#907aa9'
    unstagedChangesColor:
      - '#b4637a'
    defaultFgColor:
      - '#575279'
    searchingActiveBorderColor:
      - '#ea9d34'

  authorColors:
    '*': '#286983'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
