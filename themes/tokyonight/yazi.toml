# : Manager [[[

[mgr]
cwd = { fg = "#c0caf5" }

# Tab
tab_active = { fg = "#15161e", bg = "#f7768e", bold = true }
tab_inactive = { fg = "#c0caf5", bg = "#414868" }
tab_width = 1

# Find
find_keyword = { fg = "#f7768e", bold = true, italic = true, underline = true }
find_position = { fg = "#f7768e", bold = true, italic = true }

# Marker
marker_copied = { fg = "#7dcfff", bg = "#7dcfff" }
marker_cut = { fg = "#c0caf5", bg = "#c0caf5" }
marker_marked = { fg = "#f7768e", bg = "#f7768e" }
marker_selected = { fg = "#676c86", bg = "#676c86" }

# Count
count_copied = { fg = "#1a1b26", bg = "#c0caf5" }
count_cut = { fg = "#1a1b26", bg = "#c0caf5" }
count_selected = { fg = "#15161e", bg = "#676c86" }

# Border
border_symbol = " "
border_style  = { fg = "#f7768e" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#414868", fg = "#f7768e" }

[mode]
# Mode
normal_main = { bg = "#f7768e", fg = "#15161e", bold = true }
normal_alt  = { bg = "#414868", fg = "#c0caf5" }

# Select mode
select_main = { bg = "#c0caf5", fg = "#15161e", bold = true }
select_alt  = { bg = "#414868", fg = "#c0caf5" }

# Unset mode
unset_main = { bg = "#676c86", fg = "#15161e", bold = true }
unset_alt  = { bg = "#414868", fg = "#c0caf5" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#f7768e", bg = "#414868" }
progress_error = { fg = "#7dcfff", bg = "#414868" }

# Permissions
permissions_t = { fg = "#f7768e" }
permissions_w = { fg = "#676c86" }
permissions_x = { fg = "#7dcfff" }
permissions_r = { fg = "#c0caf5" }
permissions_s = { fg = "#c0caf5" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#f7768e" }
active = { fg = "#676c86", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#f7768e" }
value = { fg = "#c0caf5" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#f7768e", bold = true, bg = "#1a1b26" }
inactive = { fg = "#c0caf5", bg = "#1a1b26" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#f7768e", bg = "#414868" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#f7768e" }
title = {}
hovered = { fg = "#c0caf5", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#414868" }
cand = { fg = "#f7768e" }
rest = { fg = "#15161e" }
desc = { fg = "#c0caf5" }
separator = " ▶ "
separator_style = { fg = "#c0caf5" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#c0caf5" }
run = { fg = "#c0caf5" }
footer = { fg = "#15161e", bg = "#c0caf5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#676c86" }
title_warn = { fg = "#f7768e" }
title_error = { fg = "#7dcfff" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#676c86" },

    # Media
    { mime = "{audio,video}/*", fg = "#f7768e" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c0caf5" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#c0caf5" },

    # Special files
    { name = "*", is = "orphan", bg = "#7dcfff" },
    { name = "*", is = "exec", fg = "#c0caf5" },

    # Fallback
    { name = "*", fg = "#c0caf5" },
    { name = "*/", fg = "#f7768e" },
]

# : ]]]
