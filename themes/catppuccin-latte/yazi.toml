# : Manager [[[

[mgr]
cwd = { fg = "#4C4F69" }

# Find
find_keyword = { fg = "#D20F39", bold = true, italic = true, underline = true }
find_position = { fg = "#D20F39", bold = true, italic = true }

# Marker
marker_copied = { fg = "#40A02B", bg = "#40A02B" }
marker_cut = { fg = "#282828", bg = "#282828" }
marker_marked = { fg = "#4C4F69", bg = "#4C4F69" }
marker_selected = { fg = "#bcbfcb", bg = "#bcbfcb" }

# Count
count_copied = { fg = "#EFF1F5", bg = "#282828" }
count_cut = { fg = "#EFF1F5", bg = "#282828" }
count_selected = { fg = "#fbf1c7", bg = "#bcbfcb" }

# Border
border_symbol = " "
border_style = { fg = "#4C4F69" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#4C4F69" }
perm_read = { fg = "#4C4F69" }
perm_write = { fg = "#bcbfcb" }
perm_exec = { fg = "#40A02B" }
perm_sep = { fg = "#282828" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#4C4F69", bg = "#ACB0BE" }
progress_error = { fg = "#40A02B", bg = "#ACB0BE" }

[mode]
normal_main = { bg = "#4C4F69", fg = "#fbf1c7", bold = true }
normal_alt  = { bg = "#ACB0BE", fg = "#4C4F69" }

select_main = { bg = "#282828", fg = "#282828", bold = true }
select_alt  = { bg = "#ACB0BE", fg = "#4C4F69" }

unset_main = { bg = "#bcbfcb", fg = "#282828", bold = true }
unset_alt  = { bg = "#ACB0BE", fg = "#4C4F69" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#4C4F69" }
active = { fg = "#bcbfcb", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#4C4F69" }
value = { fg = "#4C4F69" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#4C4F69", bold = true, bg = "#EFF1F5" }
inactive = { fg = "#282828", bg = "#EFF1F5" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#4C4F69", bg = "#6C6F85" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#4C4F69" }
title = {}
hovered = { fg = "#282828", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#ACB0BE" }
cand = { fg = "#4C4F69" }
rest = { fg = "#fbf1c7" }
desc = { fg = "#4C4F69" }
separator = " ▶ "
separator_style = { fg = "#4C4F69" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#4C4F69" }
run = { fg = "#4C4F69" }
footer = { fg = "#282828", bg = "#282828" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#bcbfcb" }
title_warn = { fg = "#4C4F69" }
title_error = { fg = "#40A02B" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#bcbfcb" },
    { mime = "{audio,video}/*", fg = "#4C4F69" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#282828" },

    { mime = "application/{pdf,doc,rtf}", fg = "#4C4F69" },

    { url = "*", is = "orphan", bg = "#40A02B" },
    { url = "*", is = "exec", fg = "#282828" },

    { url = "*", fg = "#4C4F69" },
    { url = "*/", fg = "#4C4F69" },
]

# : ]]]
