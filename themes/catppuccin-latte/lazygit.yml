gui:
  theme:
    activeBorderColor:
      - '#1E66F5'
      - bold
    inactiveBorderColor:
      - '#bec0cb'
    optionsTextColor:
      - '#179299'
    selectedLineBgColor:
      - '#d6d8e0'
    cherryPickedCommitBgColor:
      - '#EFF1F5'
    cherryPickedCommitFgColor:
      - '#1E66F5'
    unstagedChangesColor:
      - '#D20F39'
    defaultFgColor:
      - '#4C4F69'
    searchingActiveBorderColor:
      - '#DF8E1D'
  authorColors:
    '*': '#40A02B'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
