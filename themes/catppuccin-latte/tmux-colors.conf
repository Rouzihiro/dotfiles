# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#4C4F69,bg=#EFF1F5"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#1E66F5"
set -g pane-border-style "fg=#bec0cb"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#bec0cb,bg=default]#[fg=#4C4F69,bg=#bec0cb] #I:#W #[fg=#bec0cb,bg=default]"

set -g window-status-current-format \
"#[fg=#1E66F5,bg=default]#[fg=#EFF1F5,bg=#1E66F5] #I:#W #[fg=#1E66F5,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#EFF1F5,bg=#1E66F5"
set -g message-command-style "fg=#4C4F69,bg=#EFF1F5"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#EFF1F5,bg=#1E66F5"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#8d8fa1,bg=#bec0cb"
set -g copy-mode-current-match-style "fg=#EFF1F5,bg=#1E66F5"
