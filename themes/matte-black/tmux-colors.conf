# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#e0e0e0,bg=#121212"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#7ab0df"
set -g pane-border-style "fg=#4f4f4f"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4f4f4f,bg=default]#[fg=#e0e0e0,bg=#4f4f4f] #I:#W #[fg=#4f4f4f,bg=default]"

set -g window-status-current-format \
"#[fg=#7ab0df,bg=default]#[fg=#121212,bg=#7ab0df] #I:#W #[fg=#7ab0df,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#121212,bg=#7ab0df"
set -g message-command-style "fg=#e0e0e0,bg=#121212"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#121212,bg=#7ab0df"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#8d8d8d,bg=#4f4f4f"
set -g copy-mode-current-match-style "fg=#121212,bg=#7ab0df"
