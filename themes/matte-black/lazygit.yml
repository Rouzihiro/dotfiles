gui:
  theme:
    activeBorderColor:
      - '#ae81ff'
      - bold
    inactiveBorderColor:
      - '#4d4d4d'
    optionsTextColor:
      - '#7ab0df'
    selectedLineBgColor:
      - '#121212'
    cherryPickedCommitBgColor:
      - '#080808'
    cherryPickedCommitFgColor:
      - '#ae81ff'
    unstagedChangesColor:
      - '#f87070'
    defaultFgColor:
      - '#e0e0e0'
    searchingActiveBorderColor:
      - '#ffe16b'

  authorColors:
    '*': '#79dcaa'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
