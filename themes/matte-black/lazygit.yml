gui:
  theme:
    activeBorderColor:
      - '#7ab0df'
      - bold
    inactiveBorderColor:
      - '#4f4f4f'
    optionsTextColor:
      - '#70c0ba'
    selectedLineBgColor:
      - '#303030'
    cherryPickedCommitBgColor:
      - '#121212'
    cherryPickedCommitFgColor:
      - '#7ab0df'
    unstagedChangesColor:
      - '#f87070'
    defaultFgColor:
      - '#e0e0e0'
    searchingActiveBorderColor:
      - '#ffe16b'
  authorColors:
    '*': '#79dcaa'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
