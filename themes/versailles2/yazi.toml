# : Manager [[[

[mgr]
cwd = { fg = "#d7ccc8" }

# Find
find_keyword = { fg = "#bcaaa4", bold = true, italic = true, underline = true }
find_position = { fg = "#bcaaa4", bold = true, italic = true }

# Marker
marker_copied = { fg = "#8d6e63", bg = "#8d6e63" }
marker_cut = { fg = "#d7ccc8", bg = "#d7ccc8" }
marker_marked = { fg = "#bcaaa4", bg = "#bcaaa4" }
marker_selected = { fg = "#64524f", bg = "#64524f" }

# Count
count_copied = { fg = "#3e2723", bg = "#d7ccc8" }
count_cut = { fg = "#3e2723", bg = "#d7ccc8" }
count_selected = { fg = "#3e2723", bg = "#64524f" }

# Border
border_symbol = " "
border_style = { fg = "#bcaaa4" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#bcaaa4" }
perm_read = { fg = "#d7ccc8" }
perm_write = { fg = "#64524f" }
perm_exec = { fg = "#8d6e63" }
perm_sep = { fg = "#d7ccc8" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#bcaaa4", bg = "#3e2723" }
progress_error = { fg = "#8d6e63", bg = "#3e2723" }

[mode]
normal_main = { bg = "#bcaaa4", fg = "#3e2723", bold = true }
normal_alt  = { bg = "#3e2723", fg = "#d7ccc8" }

select_main = { bg = "#d7ccc8", fg = "#d7ccc8", bold = true }
select_alt  = { bg = "#3e2723", fg = "#d7ccc8" }

unset_main = { bg = "#64524f", fg = "#d7ccc8", bold = true }
unset_alt  = { bg = "#3e2723", fg = "#d7ccc8" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#bcaaa4" }
active = { fg = "#64524f", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#bcaaa4" }
value = { fg = "#d7ccc8" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#bcaaa4", bold = true, bg = "#3e2723" }
inactive = { fg = "#d7ccc8", bg = "#3e2723" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#bcaaa4", bg = "#3e2723" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#bcaaa4" }
title = {}
hovered = { fg = "#d7ccc8", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#3e2723" }
cand = { fg = "#bcaaa4" }
rest = { fg = "#3e2723" }
desc = { fg = "#d7ccc8" }
separator = " ▶ "
separator_style = { fg = "#d7ccc8" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#d7ccc8" }
run = { fg = "#d7ccc8" }
footer = { fg = "#d7ccc8", bg = "#d7ccc8" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#64524f" }
title_warn = { fg = "#bcaaa4" }
title_error = { fg = "#8d6e63" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#64524f" },
    { mime = "{audio,video}/*", fg = "#bcaaa4" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#d7ccc8" },

    { mime = "application/{pdf,doc,rtf}", fg = "#d7ccc8" },

    { url = "*", is = "orphan", bg = "#8d6e63" },
    { url = "*", is = "exec", fg = "#d7ccc8" },

    { url = "*", fg = "#d7ccc8" },
    { url = "*/", fg = "#bcaaa4" },
]

# : ]]]
