# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#cdd6f4,bg=#11111b"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#494c5c"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#494c5c,bg=default]#[fg=#cdd6f4,bg=#494c5c] #I:#W #[fg=#494c5c,bg=default]"

set -g window-status-current-format \
"#[fg=#89b4fa,bg=default]#[fg=#11111b,bg=#89b4fa] #I:#W #[fg=#89b4fa,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#11111b,bg=#89b4fa"
set -g message-command-style "fg=#cdd6f4,bg=#11111b"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#11111b,bg=#89b4fa"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#81879d,bg=#494c5c"
set -g copy-mode-current-match-style "fg=#11111b,bg=#89b4fa"
