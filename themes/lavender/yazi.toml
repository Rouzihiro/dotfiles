# : Manager [[[

[mgr]
cwd = { fg = "#cdd6f4" }

# Find
find_keyword = { fg = "#f38ba8", bold = true, italic = true, underline = true }
find_position = { fg = "#f38ba8", bold = true, italic = true }

# Marker
marker_copied = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut = { fg = "#a6adc8", bg = "#a6adc8" }
marker_marked = { fg = "#cba6f7", bg = "#cba6f7" }
marker_selected = { fg = "#797b8c", bg = "#797b8c" }

# Count
count_copied = { fg = "#11111b", bg = "#a6adc8" }
count_cut = { fg = "#11111b", bg = "#a6adc8" }
count_selected = { fg = "#1e1e2e", bg = "#797b8c" }

# Border
border_symbol = " "
border_style = { fg = "#cba6f7" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#cba6f7" }
perm_read = { fg = "#cdd6f4" }
perm_write = { fg = "#797b8c" }
perm_exec = { fg = "#a6e3a1" }
perm_sep = { fg = "#a6adc8" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#cba6f7", bg = "#585b70" }
progress_error = { fg = "#a6e3a1", bg = "#585b70" }

[mode]
normal_main = { bg = "#cba6f7", fg = "#1e1e2e", bold = true }
normal_alt  = { bg = "#585b70", fg = "#cdd6f4" }

select_main = { bg = "#a6adc8", fg = "#1e1e2e", bold = true }
select_alt  = { bg = "#585b70", fg = "#cdd6f4" }

unset_main = { bg = "#797b8c", fg = "#1e1e2e", bold = true }
unset_alt  = { bg = "#585b70", fg = "#cdd6f4" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#cba6f7" }
active = { fg = "#797b8c", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#cba6f7" }
value = { fg = "#cdd6f4" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#cba6f7", bold = true, bg = "#11111b" }
inactive = { fg = "#a6adc8", bg = "#11111b" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#cba6f7", bg = "#585b70" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#cba6f7" }
title = {}
hovered = { fg = "#a6adc8", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#585b70" }
cand = { fg = "#cba6f7" }
rest = { fg = "#1e1e2e" }
desc = { fg = "#cdd6f4" }
separator = " ▶ "
separator_style = { fg = "#cdd6f4" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#cdd6f4" }
run = { fg = "#cdd6f4" }
footer = { fg = "#1e1e2e", bg = "#a6adc8" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#797b8c" }
title_warn = { fg = "#cba6f7" }
title_error = { fg = "#a6e3a1" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#797b8c" },
    { mime = "{audio,video}/*", fg = "#cba6f7" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#a6adc8" },

    { mime = "application/{pdf,doc,rtf}", fg = "#cdd6f4" },

    { url = "*", is = "orphan", bg = "#a6e3a1" },
    { url = "*", is = "exec", fg = "#a6adc8" },

    { url = "*", fg = "#cdd6f4" },
    { url = "*/", fg = "#cba6f7" },
]

# : ]]]
