[mgr]
cwd = { fg = "#cdd6f4" }
find_keyword = { fg = "#f38ba8", bold = true, italic = true, underline = true }
find_position = { fg = "#f38ba8", bold = true, italic = true }
marker_copied = { fg = "#cba6f7", bg = "#cba6f7" }
marker_cut = { fg = "#81879d", bg = "#81879d" }
marker_marked = { fg = "#89b4fa", bg = "#89b4fa" }
marker_selected = { fg = "#a6e3a1", bg = "#a6e3a1" }
count_copied = { fg = "#11111b", bg = "#81879d" }
count_cut = { fg = "#11111b", bg = "#81879d" }
count_selected = { fg = "#11111b", bg = "#a6e3a1" }
border_symbol = " "
border_style = { fg = "#89b4fa" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#89b4fa" }
perm_read = { fg = "#cdd6f4" }
perm_write = { fg = "#a6e3a1" }
perm_exec = { fg = "#cba6f7" }
perm_sep = { fg = "#81879d" }
progress_label = { bold = true }
progress_normal = { fg = "#89b4fa", bg = "#2d2e3b" }
progress_error = { fg = "#cba6f7", bg = "#2d2e3b" }

[mode]
normal_main = { bg = "#89b4fa", fg = "#11111b", bold = true }
normal_alt  = { bg = "#2d2e3b", fg = "#cdd6f4" }
select_main = { bg = "#81879d", fg = "#11111b", bold = true }
select_alt  = { bg = "#2d2e3b", fg = "#cdd6f4" }
unset_main = { bg = "#a6e3a1", fg = "#11111b", bold = true }
unset_alt  = { bg = "#2d2e3b", fg = "#cdd6f4" }

[select]
border = { fg = "#89b4fa" }
active = { fg = "#a6e3a1", bold = true }

[input]
border = { fg = "#89b4fa" }
value = { fg = "#cdd6f4" }

[tabs]
active = { fg = "#89b4fa", bold = true, bg = "#11111b" }
inactive = { fg = "#81879d", bg = "#11111b" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#89b4fa", bg = "#2d2e3b" }

[tasks]
border = { fg = "#89b4fa" }
title = {}
hovered = { fg = "#81879d", underline = true }

[which]
cols = 3
mask = { bg = "#2d2e3b" }
cand = { fg = "#89b4fa" }
rest = { fg = "#11111b" }
desc = { fg = "#cdd6f4" }
separator = " ▶ "
separator_style = { fg = "#cdd6f4" }

[help]
on = { fg = "#cdd6f4" }
run = { fg = "#cdd6f4" }
footer = { fg = "#11111b", bg = "#81879d" }

[notify]
title_info = { fg = "#a6e3a1" }
title_warn = { fg = "#89b4fa" }
title_error = { fg = "#cba6f7" }

[filetype]
rules = [
    { mime = "image/*", fg = "#a6e3a1" },
    { mime = "{audio,video}/*", fg = "#89b4fa" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#81879d" },
    { mime = "application/{pdf,doc,rtf}", fg = "#cdd6f4" },
    { url = "*", is = "orphan", bg = "#cba6f7" },
    { url = "*", is = "exec", fg = "#81879d" },
    { url = "*", fg = "#cdd6f4" },
    { url = "*/", fg = "#89b4fa" },
]
