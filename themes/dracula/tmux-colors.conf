# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#f8f8f2,bg=#282a36"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#bd93f9"
set -g pane-border-style "fg=#66676e"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#66676e,bg=default]#[fg=#f8f8f2,bg=#66676e] #I:#W #[fg=#66676e,bg=default]"

set -g window-status-current-format \
"#[fg=#bd93f9,bg=default]#[fg=#282a36,bg=#bd93f9] #I:#W #[fg=#bd93f9,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#282a36,bg=#bd93f9"
set -g message-command-style "fg=#f8f8f2,bg=#282a36"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#282a36,bg=#bd93f9"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#a4a5a6,bg=#66676e"
set -g copy-mode-current-match-style "fg=#282a36,bg=#bd93f9"
