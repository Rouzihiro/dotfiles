# Color definitions extracted from rofi.rasi
# Base colors
base="#282a36"
text="#f8f8f2"
crust="#6272a4"

# Signature colors
sig1="#ff5555"
sig2="#50fa7b"
on_sig1="#21222c"
on_sig2="#21222c"
on_sigbg="#ffffff"
sig_bg="#6272a4"
sig_surface_high="#818eb6"

# Color palette (from Rofi colors)
red="#ff5555"
green="#50fa7b"
yellow="#f1fa8c"
blue="#bd93f9"
magenta="#ff79c6"
cyan="#8be9fd"
white="#f8f8f2"
black="#21222c"

# Bright colors
bright_black="#6272a4"
bright_red="#ff6e6e"
bright_green="#69ff94"
bright_yellow="#ffffa5"
bright_blue="#d6acff"
bright_magenta="#ff92df"
bright_cyan="#a4ffff"
bright_white="#ffffff"



# Basic setup
set -g status-position top
set -g status-style "fg=$text,bg=$base"
set -g base-index 1
set -g renumber-windows on

# Pane borders - using sig1 for active, sig_surface_high for inactive
set -g pane-active-border-style "fg=$sig1"
set -g pane-border-style "fg=$sig_surface_high"

# Simplified status bar
set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

##### Window Tabs - using sig_surface_high for inactive, sig1 for active
set -g window-status-separator " "

set -g window-status-format \
	"#[fg=$sig_bg,bg=default]î‚¶#[fg=$on_sigbg,bg=$sig_bg] #I:#W #[fg=$sig_bg,bg=default]î‚´"

set -g window-status-current-format \
	"#[fg=$sig1,bg=default]î‚¶#[fg=$on_sig1,bg=$sig1] #I:#W #[fg=$sig1,bg=default]î‚´"

##### Message Styling - using sig1 for highlights (like window border)
set -g message-style "fg=$on_sig1,bg=$sig1"
set -g message-command-style "fg=$text,bg=$base"

# Additional tmux elements that match starship
set -g mode-style "fg=$on_sig1,bg=$sig1"
set -g status-justify left

# Optional: Set selection colors to match Rofi relationships
set -g copy-mode-match-style "fg=$on_sigbg,bg=$sig_surface_high"
set -g copy-mode-current-match-style "fg=$on_sig2,bg=$sig2"
