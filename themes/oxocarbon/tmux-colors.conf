# Color definitions extracted from rofi.rasi
# Base colors
base="#161616"
text="#f2f4f8"
crust="#393939"

# Signature colors
sig1="#33b1ff"
sig2="#3ddbd9"
on_sig1="#262626"
on_sig2="#262626"
on_sigbg="#ffffff"
sig_bg="#262626"
sig_surface_high="#515151"

# Color palette (from Rofi colors)
red="#ee5396"
green="#42be65"
yellow="#82cfff"
blue="#33b1ff"
magenta="#ff7eb6"
cyan="#3ddbd9"
white="#dde1e6"
black="#262626"

# Bright colors
bright_black="#393939"
bright_red="#ee5396"
bright_green="#42be65"
bright_yellow="#82cfff"
bright_blue="#33b1ff"
bright_magenta="#ff7eb6"
bright_cyan="#3ddbd9"
bright_white="#ffffff"



# Basic setup
set -g status-position top
set -g status-style "fg=$text,bg=$base"
set -g base-index 1
set -g renumber-windows on

# Pane borders - using sig1 for active, sig_surface_high for inactive
set -g pane-active-border-style "fg=$sig1"
set -g pane-border-style "fg=$sig_surface_high"

# Simplified status bar
set -g status-left ""
set -g status-right ""

##### Window Tabs - using sig_surface_high for inactive, sig1 for active
set -g window-status-separator " "

set -g window-status-format \
	"#[fg=$sig_bg,bg=default]о‚¶#[fg=$on_sigbg,bg=$sig_bg] #I:#W #[fg=$sig_bg,bg=default]о‚ґ"


set -g window-status-current-format \
	"#[fg=$sig1,bg=default]о‚¶#[fg=$on_sig1,bg=$sig1] #I:#W #[fg=$sig1,bg=default]о‚ґ"

set -g status-right "\
#[fg=$sig1,bg=default]о‚¶\
#[fg=$on_sig1,bg=$sig1] пЃј #(echo \"#{pane_current_path}\" | awk -F/ '{ if (NF<=2) print \$NF; else print \$(NF-1)\"/\"\$NF; }') \
#[fg=$sig1,bg=$sig_surface_high]о‚°#[fg=$crust,bg=$sig_surface_high] #(timew | awk '/^ *Total/ {print \$NF}') \
#[fg=$sig_surface_high,bg=default]о‚ґ"

##### Message Styling - using sig1 for highlights (like window border)
set -g message-style "fg=$on_sig1,bg=$sig1"
set -g message-command-style "fg=$text,bg=$base"

# Additional tmux elements that match starship
set -g mode-style "fg=$on_sig1,bg=$sig1"
set -g status-justify left

# Optional: Set selection colors to match Rofi relationships
set -g copy-mode-match-style "fg=$on_sigbg,bg=$sig_surface_high"
set -g copy-mode-current-match-style "fg=$on_sig2,bg=$sig2"
