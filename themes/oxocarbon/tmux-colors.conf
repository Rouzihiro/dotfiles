# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#f2f4f8,bg=#161616"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#33b1ff"
set -g pane-border-style "fg=#585859"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#585859,bg=default]#[fg=#f2f4f8,bg=#585859] #I:#W #[fg=#585859,bg=default]"

set -g window-status-current-format \
"#[fg=#33b1ff,bg=default]#[fg=#161616,bg=#33b1ff] #I:#W #[fg=#33b1ff,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#161616,bg=#33b1ff"
set -g message-command-style "fg=#f2f4f8,bg=#161616"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#161616,bg=#33b1ff"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#9a9b9d,bg=#585859"
set -g copy-mode-current-match-style "fg=#161616,bg=#33b1ff"
