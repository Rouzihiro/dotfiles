[mgr]
cwd = { fg = "#f2f4f8" }
find_keyword = { fg = "#ee5396", bold = true, italic = true, underline = true }
find_position = { fg = "#ee5396", bold = true, italic = true }
marker_copied = { fg = "#ff7eb6", bg = "#ff7eb6" }
marker_cut = { fg = "#9a9b9d", bg = "#9a9b9d" }
marker_marked = { fg = "#33b1ff", bg = "#33b1ff" }
marker_selected = { fg = "#42be65", bg = "#42be65" }
count_copied = { fg = "#161616", bg = "#9a9b9d" }
count_cut = { fg = "#161616", bg = "#9a9b9d" }
count_selected = { fg = "#161616", bg = "#42be65" }
border_symbol = " "
border_style = { fg = "#33b1ff" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#33b1ff" }
perm_read = { fg = "#f2f4f8" }
perm_write = { fg = "#42be65" }
perm_exec = { fg = "#ff7eb6" }
perm_sep = { fg = "#9a9b9d" }
progress_label = { bold = true }
progress_normal = { fg = "#33b1ff", bg = "#373737" }
progress_error = { fg = "#ff7eb6", bg = "#373737" }

[mode]
normal_main = { bg = "#33b1ff", fg = "#161616", bold = true }
normal_alt  = { bg = "#373737", fg = "#f2f4f8" }
select_main = { bg = "#9a9b9d", fg = "#161616", bold = true }
select_alt  = { bg = "#373737", fg = "#f2f4f8" }
unset_main = { bg = "#42be65", fg = "#161616", bold = true }
unset_alt  = { bg = "#373737", fg = "#f2f4f8" }

[select]
border = { fg = "#33b1ff" }
active = { fg = "#42be65", bold = true }

[input]
border = { fg = "#33b1ff" }
value = { fg = "#f2f4f8" }

[tabs]
active = { fg = "#33b1ff", bold = true, bg = "#161616" }
inactive = { fg = "#9a9b9d", bg = "#161616" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#33b1ff", bg = "#373737" }

[tasks]
border = { fg = "#33b1ff" }
title = {}
hovered = { fg = "#9a9b9d", underline = true }

[which]
cols = 3
mask = { bg = "#373737" }
cand = { fg = "#33b1ff" }
rest = { fg = "#161616" }
desc = { fg = "#f2f4f8" }
separator = " ▶ "
separator_style = { fg = "#f2f4f8" }

[help]
on = { fg = "#f2f4f8" }
run = { fg = "#f2f4f8" }
footer = { fg = "#161616", bg = "#9a9b9d" }

[notify]
title_info = { fg = "#42be65" }
title_warn = { fg = "#33b1ff" }
title_error = { fg = "#ff7eb6" }

[filetype]
rules = [
    { mime = "image/*", fg = "#42be65" },
    { mime = "{audio,video}/*", fg = "#33b1ff" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#9a9b9d" },
    { mime = "application/{pdf,doc,rtf}", fg = "#f2f4f8" },
    { url = "*", is = "orphan", bg = "#ff7eb6" },
    { url = "*", is = "exec", fg = "#9a9b9d" },
    { url = "*", fg = "#f2f4f8" },
    { url = "*/", fg = "#33b1ff" },
]
