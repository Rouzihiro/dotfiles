gui:
  theme:
    activeBorderColor:
      - '#33b1ff'
      - bold
    inactiveBorderColor:
      - '#585859'
    optionsTextColor:
      - '#3ddbd9'
    selectedLineBgColor:
      - '#373737'
    cherryPickedCommitBgColor:
      - '#161616'
    cherryPickedCommitFgColor:
      - '#33b1ff'
    unstagedChangesColor:
      - '#ee5396'
    defaultFgColor:
      - '#f2f4f8'
    searchingActiveBorderColor:
      - '#82cfff'
  authorColors:
    '*': '#42be65'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
