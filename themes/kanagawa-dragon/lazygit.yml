gui:
  theme:
    activeBorderColor:
      - '#8ba4b0'
      - bold
    inactiveBorderColor:
      - '#4b4b4a'
    optionsTextColor:
      - '#8ea4a2'
    selectedLineBgColor:
      - '#313030'
    cherryPickedCommitBgColor:
      - '#181616'
    cherryPickedCommitFgColor:
      - '#8ba4b0'
    unstagedChangesColor:
      - '#c4746e'
    defaultFgColor:
      - '#c5c9c5'
    searchingActiveBorderColor:
      - '#c4b28a'
  authorColors:
    '*': '#8a9a7b'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
