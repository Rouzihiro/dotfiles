# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#c5c9c5,bg=#181616"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#8ba4b0"
set -g pane-border-style "fg=#4b4b4a"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4b4b4a,bg=default]#[fg=#c5c9c5,bg=#4b4b4a] #I:#W #[fg=#4b4b4a,bg=default]"

set -g window-status-current-format \
"#[fg=#8ba4b0,bg=default]#[fg=#181616,bg=#8ba4b0] #I:#W #[fg=#8ba4b0,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#181616,bg=#8ba4b0"
set -g message-command-style "fg=#c5c9c5,bg=#181616"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#181616,bg=#8ba4b0"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#7f817e,bg=#4b4b4a"
set -g copy-mode-current-match-style "fg=#181616,bg=#8ba4b0"
