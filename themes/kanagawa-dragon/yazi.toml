# : Manager [[[

[mgr]
cwd = { fg = "#c5c9c5" }

# Find
find_keyword = { fg = "#c4746e", bold = true, italic = true, underline = true }
find_position = { fg = "#c4746e", bold = true, italic = true }

# Marker
marker_copied = { fg = "#c4b28a", bg = "#c4b28a" }
marker_cut = { fg = "#c5c9c5", bg = "#c5c9c5" }
marker_marked = { fg = "#7FB4CA", bg = "#7FB4CA" }
marker_selected = { fg = "#464444", bg = "#464444" }

# Count
count_copied = { fg = "#181616", bg = "#c5c9c5" }
count_cut = { fg = "#181616", bg = "#c5c9c5" }
count_selected = { fg = "#0d0c0c", bg = "#464444" }

# Border
border_symbol = " "
border_style = { fg = "#7FB4CA" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#7FB4CA" }
perm_read = { fg = "#c5c9c5" }
perm_write = { fg = "#464444" }
perm_exec = { fg = "#c4b28a" }
perm_sep = { fg = "#c5c9c5" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#7FB4CA", bg = "#181616" }
progress_error = { fg = "#c4b28a", bg = "#181616" }

[mode]
normal_main = { bg = "#7FB4CA", fg = "#0d0c0c", bold = true }
normal_alt  = { bg = "#181616", fg = "#c5c9c5" }

select_main = { bg = "#c5c9c5", fg = "#0d0c0c", bold = true }
select_alt  = { bg = "#181616", fg = "#c5c9c5" }

unset_main = { bg = "#464444", fg = "#0d0c0c", bold = true }
unset_alt  = { bg = "#181616", fg = "#c5c9c5" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#7FB4CA" }
active = { fg = "#464444", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#7FB4CA" }
value = { fg = "#c5c9c5" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#7FB4CA", bold = true, bg = "#181616" }
inactive = { fg = "#c5c9c5", bg = "#181616" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#7FB4CA", bg = "#a6a69c" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#7FB4CA" }
title = {}
hovered = { fg = "#c5c9c5", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#181616" }
cand = { fg = "#7FB4CA" }
rest = { fg = "#0d0c0c" }
desc = { fg = "#c5c9c5" }
separator = " ▶ "
separator_style = { fg = "#c5c9c5" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#c5c9c5" }
run = { fg = "#c5c9c5" }
footer = { fg = "#0d0c0c", bg = "#c5c9c5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#464444" }
title_warn = { fg = "#7FB4CA" }
title_error = { fg = "#c4b28a" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#464444" },
    { mime = "{audio,video}/*", fg = "#7FB4CA" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c5c9c5" },

    { mime = "application/{pdf,doc,rtf}", fg = "#c5c9c5" },

    { url = "*", is = "orphan", bg = "#c4b28a" },
    { url = "*", is = "exec", fg = "#c5c9c5" },

    { url = "*", fg = "#c5c9c5" },
    { url = "*/", fg = "#7FB4CA" },
]

# : ]]]
