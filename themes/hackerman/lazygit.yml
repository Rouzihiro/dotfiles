gui:
  theme:
    activeBorderColor:
      - '#004cf1'
      - bold
    inactiveBorderColor:
      - '#004030'
    optionsTextColor:
      - '#029790'
    selectedLineBgColor:
      - '#00231f'
    cherryPickedCommitBgColor:
      - '#00060f'
    cherryPickedCommitFgColor:
      - '#004cf1'
    unstagedChangesColor:
      - '#c00e0e'
    defaultFgColor:
      - '#00ca7d'
    searchingActiveBorderColor:
      - '#1a1b03'
  authorColors:
    '*': '#0059ff'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
