# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#00ca7d,bg=#00060f"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#004cf1"
set -g pane-border-style "fg=#004030"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#004030,bg=default]#[fg=#00ca7d,bg=#004030] #I:#W #[fg=#004030,bg=default]"

set -g window-status-current-format \
"#[fg=#004cf1,bg=default]#[fg=#00060f,bg=#004cf1] #I:#W #[fg=#004cf1,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#00060f,bg=#004cf1"
set -g message-command-style "fg=#00ca7d,bg=#00060f"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#00060f,bg=#004cf1"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#007b51,bg=#004030"
set -g copy-mode-current-match-style "fg=#00060f,bg=#004cf1"
