gui:
  theme:
    activeBorderColor:
      - '#8d6e63'
      - bold
    inactiveBorderColor:
      - '#3e2723'
    optionsTextColor:
      - '#bcaaa4'
    selectedLineBgColor:
      - '#3e2723'
    cherryPickedCommitBgColor:
      - '#3e2723'
    cherryPickedCommitFgColor:
      - '#8d6e63'
    unstagedChangesColor:
      - '#bcaaa4'
    defaultFgColor:
      - '#d7ccc8'
    searchingActiveBorderColor:
      - '#d7ccc8'

  authorColors:
    '*': '#d7ccc8'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
