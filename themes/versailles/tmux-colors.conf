# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#d7ccc8,bg=#3e2723"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#bcaaa4"
set -g pane-border-style "fg=#6b5854"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#6b5854,bg=default]#[fg=#d7ccc8,bg=#6b5854] #I:#W #[fg=#6b5854,bg=default]"

set -g window-status-current-format \
"#[fg=#bcaaa4,bg=default]#[fg=#3e2723,bg=#bcaaa4] #I:#W #[fg=#bcaaa4,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#3e2723,bg=#bcaaa4"
set -g message-command-style "fg=#d7ccc8,bg=#3e2723"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#3e2723,bg=#bcaaa4"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#998a86,bg=#6b5854"
set -g copy-mode-current-match-style "fg=#3e2723,bg=#bcaaa4"
