gui:
  theme:
    activeBorderColor:
      - '#957fb8'
      - bold
    inactiveBorderColor:
      - '#727169'
    optionsTextColor:
      - '#7e9cd8'
    selectedLineBgColor:
      - '#1f1f28'
    cherryPickedCommitBgColor:
      - '#16161d'
    cherryPickedCommitFgColor:
      - '#957fb8'
    unstagedChangesColor:
      - '#c34043'
    defaultFgColor:
      - '#dcd7ba'
    searchingActiveBorderColor:
      - '#c0a36e'

  authorColors:
    '*': '#76946a'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
