gui:
  theme:
    activeBorderColor:
      - '#7e9cd8'
      - bold
    inactiveBorderColor:
      - '#575653'
    optionsTextColor:
      - '#6a9589'
    selectedLineBgColor:
      - '#3b3a3d'
    cherryPickedCommitBgColor:
      - '#1f1f28'
    cherryPickedCommitFgColor:
      - '#7e9cd8'
    unstagedChangesColor:
      - '#c34043'
    defaultFgColor:
      - '#dcd7ba'
    searchingActiveBorderColor:
      - '#c0a36e'
  authorColors:
    '*': '#76946a'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
