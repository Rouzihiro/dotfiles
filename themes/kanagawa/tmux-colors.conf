# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#dcd7ba,bg=#1f1f28"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#7e9cd8"
set -g pane-border-style "fg=#575653"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#575653,bg=default]#[fg=#dcd7ba,bg=#575653] #I:#W #[fg=#575653,bg=default]"

set -g window-status-current-format \
"#[fg=#7e9cd8,bg=default]#[fg=#1f1f28,bg=#7e9cd8] #I:#W #[fg=#7e9cd8,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#1f1f28,bg=#7e9cd8"
set -g message-command-style "fg=#dcd7ba,bg=#1f1f28"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#1f1f28,bg=#7e9cd8"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#908d7f,bg=#575653"
set -g copy-mode-current-match-style "fg=#1f1f28,bg=#7e9cd8"
