# : Manager [[[

[mgr]
cwd = { fg = "#cdcecf" }

# Find
find_keyword = { fg = "#c94f6d", bold = true, italic = true, underline = true }
find_position = { fg = "#c94f6d", bold = true, italic = true }

# Marker
marker_copied = { fg = "#81b29a", bg = "#81b29a" }
marker_cut = { fg = "#e4e4e5", bg = "#e4e4e5" }
marker_marked = { fg = "#86abdc", bg = "#86abdc" }
marker_selected = { fg = "#78797f", bg = "#78797f" }

# Count
count_copied = { fg = "#192330", bg = "#e4e4e5" }
count_cut = { fg = "#192330", bg = "#e4e4e5" }
count_selected = { fg = "#393b44", bg = "#78797f" }

# Border
border_symbol = " "
border_style = { fg = "#86abdc" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }

# Permissions
perm_type = { fg = "#86abdc" }
perm_read = { fg = "#cdcecf" }
perm_write = { fg = "#78797f" }
perm_exec = { fg = "#81b29a" }
perm_sep = { fg = "#e4e4e5" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#86abdc", bg = "#575860" }
progress_error = { fg = "#81b29a", bg = "#575860" }

[mode]
normal_main = { bg = "#86abdc", fg = "#393b44", bold = true }
normal_alt  = { bg = "#575860", fg = "#cdcecf" }

select_main = { bg = "#e4e4e5", fg = "#393b44", bold = true }
select_alt  = { bg = "#575860", fg = "#cdcecf" }

unset_main = { bg = "#78797f", fg = "#393b44", bold = true }
unset_alt  = { bg = "#575860", fg = "#cdcecf" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#86abdc" }
active = { fg = "#78797f", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#86abdc" }
value = { fg = "#cdcecf" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#86abdc", bold = true, bg = "#192330" }
inactive = { fg = "#e4e4e5", bg = "#192330" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#86abdc", bg = "#575860" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#86abdc" }
title = {}
hovered = { fg = "#e4e4e5", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#575860" }
cand = { fg = "#86abdc" }
rest = { fg = "#393b44" }
desc = { fg = "#cdcecf" }
separator = " ▶ "
separator_style = { fg = "#cdcecf" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#cdcecf" }
run = { fg = "#cdcecf" }
footer = { fg = "#393b44", bg = "#e4e4e5" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#78797f" }
title_warn = { fg = "#86abdc" }
title_error = { fg = "#81b29a" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    { mime = "image/*", fg = "#78797f" },
    { mime = "{audio,video}/*", fg = "#86abdc" },

    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#e4e4e5" },

    { mime = "application/{pdf,doc,rtf}", fg = "#cdcecf" },

    { url = "*", is = "orphan", bg = "#81b29a" },
    { url = "*", is = "exec", fg = "#e4e4e5" },

    { url = "*", fg = "#cdcecf" },
    { url = "*/", fg = "#86abdc" },
]

# : ]]]
