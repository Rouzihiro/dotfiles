gui:
  theme:
    activeBorderColor:
      - '#9d79d6'
      - bold
    inactiveBorderColor:
      - '#575860'
    optionsTextColor:
      - '#719cd6'
    selectedLineBgColor:
      - '#192330'
    cherryPickedCommitBgColor:
      - '#393b44'
    cherryPickedCommitFgColor:
      - '#9d79d6'
    unstagedChangesColor:
      - '#c94f6d'
    defaultFgColor:
      - '#cdcecf'
    searchingActiveBorderColor:
      - '#dbc074'

  authorColors:
    '*': '#81b29a'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
