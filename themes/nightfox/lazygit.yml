gui:
  theme:
    activeBorderColor:
      - '#719cd6'
      - bold
    inactiveBorderColor:
      - '#4f565f'
    optionsTextColor:
      - '#63cdcf'
    selectedLineBgColor:
      - '#343c47'
    cherryPickedCommitBgColor:
      - '#192330'
    cherryPickedCommitFgColor:
      - '#719cd6'
    unstagedChangesColor:
      - '#c94f6d'
    defaultFgColor:
      - '#cdcecf'
    searchingActiveBorderColor:
      - '#dbc074'
  authorColors:
    '*': '#81b29a'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
