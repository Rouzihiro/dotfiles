# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#cdcecf,bg=#192330"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#719cd6"
set -g pane-border-style "fg=#4f565f"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4f565f,bg=default]#[fg=#cdcecf,bg=#4f565f] #I:#W #[fg=#4f565f,bg=default]"

set -g window-status-current-format \
"#[fg=#719cd6,bg=default]#[fg=#192330,bg=#719cd6] #I:#W #[fg=#719cd6,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#192330,bg=#719cd6"
set -g message-command-style "fg=#cdcecf,bg=#192330"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#192330,bg=#719cd6"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#85898f,bg=#4f565f"
set -g copy-mode-current-match-style "fg=#192330,bg=#719cd6"
