# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#ffcead,bg=#060B1E"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#7d82d9"
set -g pane-border-style "fg=#504548"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#504548,bg=default]#[fg=#ffcead,bg=#504548] #I:#W #[fg=#504548,bg=default]"

set -g window-status-current-format \
"#[fg=#7d82d9,bg=default]#[fg=#060B1E,bg=#7d82d9] #I:#W #[fg=#7d82d9,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#060B1E,bg=#7d82d9"
set -g message-command-style "fg=#ffcead,bg=#060B1E"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#060B1E,bg=#7d82d9"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#9b8073,bg=#504548"
set -g copy-mode-current-match-style "fg=#060B1E,bg=#7d82d9"
