# : Manager [[[

[mgr]
cwd = { fg = "#ffcead" }

# Tab
tab_active = { fg = "#3C486D", bg = "#E9BB4F", bold = true }
tab_inactive = { fg = "#ffcead", bg = "#6d7db6" }
tab_width = 1

# Find
find_keyword = { fg = "#ED5B5A", bold = true, italic = true, underline = true }
find_position = { fg = "#ED5B5A", bold = true, italic = true }

# Marker
marker_copied = { fg = "#92a593", bg = "#92a593" }
marker_cut = { fg = "#ffcead", bg = "#ffcead" }
marker_marked = { fg = "#E9BB4F", bg = "#E9BB4F" }
marker_selected = { fg = "#373b4b", bg = "#373b4b" }

# Count
count_copied = { fg = "#060B1E", bg = "#ffcead" }
count_cut = { fg = "#060B1E", bg = "#ffcead" }
count_selected = { fg = "#3C486D", bg = "#373b4b" }

# Border
border_symbol = " "
border_style  = { fg = "#E9BB4F" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#6d7db6", fg = "#E9BB4F" }

[mode]
# Mode
normal_main = { bg = "#E9BB4F", fg = "#3C486D", bold = true }
normal_alt  = { bg = "#060B1E", fg = "#ffcead" }

# Select mode
select_main = { bg = "#ffcead", fg = "#3C486D", bold = true }
select_alt  = { bg = "#060B1E", fg = "#ffcead" }

# Unset mode
unset_main = { bg = "#373b4b", fg = "#3C486D", bold = true }
unset_alt  = { bg = "#060B1E", fg = "#ffcead" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#E9BB4F", bg = "#060B1E" }
progress_error = { fg = "#92a593", bg = "#060B1E" }

# Permissions
permissions_t = { fg = "#E9BB4F" }
permissions_w = { fg = "#373b4b" }
permissions_x = { fg = "#92a593" }
permissions_r = { fg = "#ffcead" }
permissions_s = { fg = "#ffcead" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#E9BB4F" }
active = { fg = "#373b4b", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#E9BB4F" }
value = { fg = "#ffcead" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#E9BB4F", bold = true, bg = "#060B1E" }
inactive = { fg = "#ffcead", bg = "#060B1E" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#E9BB4F", bg = "#6d7db6" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#E9BB4F" }
title = {}
hovered = { fg = "#ffcead", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#060B1E" }
cand = { fg = "#E9BB4F" }
rest = { fg = "#3C486D" }
desc = { fg = "#ffcead" }
separator = " ▶ "
separator_style = { fg = "#ffcead" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#ffcead" }
run = { fg = "#ffcead" }
footer = { fg = "#3C486D", bg = "#ffcead" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#373b4b" }
title_warn = { fg = "#E9BB4F" }
title_error = { fg = "#92a593" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#373b4b" },

    # Media
    { mime = "{audio,video}/*", fg = "#E9BB4F" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ffcead" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#ffcead" },

    # Special files
    { name = "*", is = "orphan", bg = "#92a593" },
    { name = "*", is = "exec", fg = "#ffcead" },

    # Fallback
    { name = "*", fg = "#ffcead" },
    { name = "*/", fg = "#E9BB4F" },
]

# : ]]]
