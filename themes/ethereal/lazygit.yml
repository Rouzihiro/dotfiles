gui:
  theme:
    activeBorderColor:
      - '#c89dc1'
      - bold
    inactiveBorderColor:
      - '#6d7db6'
    optionsTextColor:
      - '#7d82d9'
    selectedLineBgColor:
      - '#060B1E'
    cherryPickedCommitBgColor:
      - '#3C486D'
    cherryPickedCommitFgColor:
      - '#c89dc1'
    unstagedChangesColor:
      - '#ED5B5A'
    defaultFgColor:
      - '#ffcead'
    searchingActiveBorderColor:
      - '#E9BB4F'

  authorColors:
    '*': '#92a593'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
