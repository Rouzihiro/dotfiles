gui:
  theme:
    activeBorderColor:
      - '#7d82d9'
      - bold
    inactiveBorderColor:
      - '#504548'
    optionsTextColor:
      - '#a3bfd1'
    selectedLineBgColor:
      - '#2b2833'
    cherryPickedCommitBgColor:
      - '#060B1E'
    cherryPickedCommitFgColor:
      - '#7d82d9'
    unstagedChangesColor:
      - '#ED5B5A'
    defaultFgColor:
      - '#ffcead'
    searchingActiveBorderColor:
      - '#E9BB4F'
  authorColors:
    '*': '#92a593'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
