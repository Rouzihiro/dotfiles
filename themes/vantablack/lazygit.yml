gui:
  theme:
    activeBorderColor:
      - '#8d8d8d'
      - bold
    inactiveBorderColor:
      - '#4c4c4c'
    optionsTextColor:
      - '#b0b0b0'
    selectedLineBgColor:
      - '#262626'
    cherryPickedCommitBgColor:
      - '#000000'
    cherryPickedCommitFgColor:
      - '#8d8d8d'
    unstagedChangesColor:
      - '#a4a4a4'
    defaultFgColor:
      - '#ffffff'
    searchingActiveBorderColor:
      - '#cecece'
  authorColors:
    '*': '#b6b6b6'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
