# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#ffffff,bg=#000000"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#8d8d8d"
set -g pane-border-style "fg=#4c4c4c"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#4c4c4c,bg=default]#[fg=#ffffff,bg=#4c4c4c] #I:#W #[fg=#4c4c4c,bg=default]"

set -g window-status-current-format \
"#[fg=#8d8d8d,bg=default]#[fg=#000000,bg=#8d8d8d] #I:#W #[fg=#8d8d8d,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#000000,bg=#8d8d8d"
set -g message-command-style "fg=#ffffff,bg=#000000"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#000000,bg=#8d8d8d"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#999999,bg=#4c4c4c"
set -g copy-mode-current-match-style "fg=#000000,bg=#8d8d8d"
