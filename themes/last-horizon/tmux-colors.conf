# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#FAFCFB,bg=#0c0b0c"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#b59790"
set -g pane-border-style "fg=#535353"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#535353,bg=default]#[fg=#FAFCFB,bg=#535353] #I:#W #[fg=#535353,bg=default]"

set -g window-status-current-format \
"#[fg=#b59790,bg=default]#[fg=#0c0b0c,bg=#b59790] #I:#W #[fg=#b59790,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#0c0b0c,bg=#b59790"
set -g message-command-style "fg=#FAFCFB,bg=#0c0b0c"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#0c0b0c,bg=#b59790"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#9a9b9b,bg=#535353"
set -g copy-mode-current-match-style "fg=#0c0b0c,bg=#b59790"
