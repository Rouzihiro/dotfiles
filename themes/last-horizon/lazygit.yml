gui:
  theme:
    activeBorderColor:
      - '#b59790'
      - bold
    inactiveBorderColor:
      - '#535353'
    optionsTextColor:
      - '#a5a0b6'
    selectedLineBgColor:
      - '#2f2f2f'
    cherryPickedCommitBgColor:
      - '#0c0b0c'
    cherryPickedCommitFgColor:
      - '#b59790'
    unstagedChangesColor:
      - '#c38b7b'
    defaultFgColor:
      - '#FAFCFB'
    searchingActiveBorderColor:
      - '#6B5E73'
  authorColors:
    '*': '#87a9b0'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
