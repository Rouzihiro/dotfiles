gui:
  theme:
    activeBorderColor:
      - '#D9A56C'
      - bold
    inactiveBorderColor:
      - '#51494d'
    optionsTextColor:
      - '#E8C099'
    selectedLineBgColor:
      - '#2f272b'
    cherryPickedCommitBgColor:
      - '#0d0509'
    cherryPickedCommitFgColor:
      - '#D9A56C'
    unstagedChangesColor:
      - '#E85F6F'
    defaultFgColor:
      - '#f0eaed'
    searchingActiveBorderColor:
      - '#D4A882'
  authorColors:
    '*': '#F29B9A'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
