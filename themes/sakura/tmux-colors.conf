# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#f0eaed,bg=#0d0509"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#D9A56C"
set -g pane-border-style "fg=#51494d"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#51494d,bg=default]#[fg=#f0eaed,bg=#51494d] #I:#W #[fg=#51494d,bg=default]"

set -g window-status-current-format \
"#[fg=#D9A56C,bg=default]#[fg=#0d0509,bg=#D9A56C] #I:#W #[fg=#D9A56C,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#0d0509,bg=#D9A56C"
set -g message-command-style "fg=#f0eaed,bg=#0d0509"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#0d0509,bg=#D9A56C"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#958e91,bg=#51494d"
set -g copy-mode-current-match-style "fg=#0d0509,bg=#D9A56C"
