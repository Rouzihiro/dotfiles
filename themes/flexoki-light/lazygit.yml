gui:
  theme:
    activeBorderColor:
      - '#CE5D97'
      - bold
    inactiveBorderColor:
      - '#6F6E69'
    optionsTextColor:
      - '#4385BE'
    selectedLineBgColor:
      - '#FFFCF0'
    cherryPickedCommitBgColor:
      - '#100F0F'
    cherryPickedCommitFgColor:
      - '#CE5D97'
    unstagedChangesColor:
      - '#D14D41'
    defaultFgColor:
      - '#100F0F'
    searchingActiveBorderColor:
      - '#D0A215'

  authorColors:
    '*': '#879A39'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
