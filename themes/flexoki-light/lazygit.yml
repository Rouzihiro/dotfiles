gui:
  theme:
    activeBorderColor:
      - '#4385BE'
      - bold
    inactiveBorderColor:
      - '#b7b4ac'
    optionsTextColor:
      - '#3AA99F'
    selectedLineBgColor:
      - '#dbd8ce'
    cherryPickedCommitBgColor:
      - '#FFFCF0'
    cherryPickedCommitFgColor:
      - '#4385BE'
    unstagedChangesColor:
      - '#D14D41'
    defaultFgColor:
      - '#100F0F'
    searchingActiveBorderColor:
      - '#D0A215'
  authorColors:
    '*': '#879A39'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
