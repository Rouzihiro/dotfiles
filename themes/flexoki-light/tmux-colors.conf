# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#100F0F,bg=#FFFCF0"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#4385BE"
set -g pane-border-style "fg=#b7b4ac"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#b7b4ac,bg=default]#[fg=#100F0F,bg=#b7b4ac] #I:#W #[fg=#b7b4ac,bg=default]"

set -g window-status-current-format \
"#[fg=#4385BE,bg=default]#[fg=#FFFCF0,bg=#4385BE] #I:#W #[fg=#4385BE,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#FFFCF0,bg=#4385BE"
set -g message-command-style "fg=#100F0F,bg=#FFFCF0"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#FFFCF0,bg=#4385BE"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#6f6d69,bg=#b7b4ac"
set -g copy-mode-current-match-style "fg=#FFFCF0,bg=#4385BE"
