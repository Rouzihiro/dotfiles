gui:
  theme:
    activeBorderColor:
      - '#458588'
      - bold
    inactiveBorderColor:
      - '#5b5549'
    optionsTextColor:
      - '#89b482'
    selectedLineBgColor:
      - '#413e38'
    cherryPickedCommitBgColor:
      - '#282828'
    cherryPickedCommitFgColor:
      - '#458588'
    unstagedChangesColor:
      - '#ea6962'
    defaultFgColor:
      - '#d4be98'
    searchingActiveBorderColor:
      - '#d8a657'
  authorColors:
    '*': '#a9b665'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
