[mgr]
cwd = { fg = "#d4be98" }
find_keyword = { fg = "#ea6962", bold = true, italic = true, underline = true }
find_position = { fg = "#ea6962", bold = true, italic = true }
marker_copied = { fg = "#d3869b", bg = "#d3869b" }
marker_cut = { fg = "#8f826b", bg = "#8f826b" }
marker_marked = { fg = "#458588", bg = "#458588" }
marker_selected = { fg = "#a9b665", bg = "#a9b665" }
count_copied = { fg = "#282828", bg = "#8f826b" }
count_cut = { fg = "#282828", bg = "#8f826b" }
count_selected = { fg = "#282828", bg = "#a9b665" }
border_symbol = " "
border_style = { fg = "#458588" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#458588" }
perm_read = { fg = "#d4be98" }
perm_write = { fg = "#a9b665" }
perm_exec = { fg = "#d3869b" }
perm_sep = { fg = "#8f826b" }
progress_label = { bold = true }
progress_normal = { fg = "#458588", bg = "#413e38" }
progress_error = { fg = "#d3869b", bg = "#413e38" }

[mode]
normal_main = { bg = "#458588", fg = "#282828", bold = true }
normal_alt  = { bg = "#413e38", fg = "#d4be98" }
select_main = { bg = "#8f826b", fg = "#282828", bold = true }
select_alt  = { bg = "#413e38", fg = "#d4be98" }
unset_main = { bg = "#a9b665", fg = "#282828", bold = true }
unset_alt  = { bg = "#413e38", fg = "#d4be98" }

[select]
border = { fg = "#458588" }
active = { fg = "#a9b665", bold = true }

[input]
border = { fg = "#458588" }
value = { fg = "#d4be98" }

[tabs]
active = { fg = "#458588", bold = true, bg = "#282828" }
inactive = { fg = "#8f826b", bg = "#282828" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#458588", bg = "#413e38" }

[tasks]
border = { fg = "#458588" }
title = {}
hovered = { fg = "#8f826b", underline = true }

[which]
cols = 3
mask = { bg = "#413e38" }
cand = { fg = "#458588" }
rest = { fg = "#282828" }
desc = { fg = "#d4be98" }
separator = " ▶ "
separator_style = { fg = "#d4be98" }

[help]
on = { fg = "#d4be98" }
run = { fg = "#d4be98" }
footer = { fg = "#282828", bg = "#8f826b" }

[notify]
title_info = { fg = "#a9b665" }
title_warn = { fg = "#458588" }
title_error = { fg = "#d3869b" }

[filetype]
rules = [
    { mime = "image/*", fg = "#a9b665" },
    { mime = "{audio,video}/*", fg = "#458588" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#8f826b" },
    { mime = "application/{pdf,doc,rtf}", fg = "#d4be98" },
    { url = "*", is = "orphan", bg = "#d3869b" },
    { url = "*", is = "exec", fg = "#8f826b" },
    { url = "*", fg = "#d4be98" },
    { url = "*/", fg = "#458588" },
]
