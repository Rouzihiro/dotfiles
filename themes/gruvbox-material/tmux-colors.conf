# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#d4be98,bg=#282828"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#458588"
set -g pane-border-style "fg=#5b5549"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#5b5549,bg=default]#[fg=#d4be98,bg=#5b5549] #I:#W #[fg=#5b5549,bg=default]"

set -g window-status-current-format \
"#[fg=#458588,bg=default]#[fg=#282828,bg=#458588] #I:#W #[fg=#458588,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#282828,bg=#458588"
set -g message-command-style "fg=#d4be98,bg=#282828"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#282828,bg=#458588"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#8f826b,bg=#5b5549"
set -g copy-mode-current-match-style "fg=#282828,bg=#458588"
