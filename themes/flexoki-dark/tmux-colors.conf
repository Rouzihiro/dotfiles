# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#CECDC3,bg=#100F0F"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#205EA6"
set -g pane-border-style "fg=#494845"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#494845,bg=default]#[fg=#CECDC3,bg=#494845] #I:#W #[fg=#494845,bg=default]"

set -g window-status-current-format \
"#[fg=#205EA6,bg=default]#[fg=#100F0F,bg=#205EA6] #I:#W #[fg=#205EA6,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#100F0F,bg=#205EA6"
set -g message-command-style "fg=#CECDC3,bg=#100F0F"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#100F0F,bg=#205EA6"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#82817b,bg=#494845"
set -g copy-mode-current-match-style "fg=#100F0F,bg=#205EA6"
