# : Manager [[[

[mgr]
cwd = { fg = "#CECDC3" }

# Tab
tab_active = { fg = "#CECDC3", bg = "#205EA6", bold = true }
tab_inactive = { fg = "#CECDC3", bg = "#6F6E69" }
tab_width = 1

# Find
find_keyword = { fg = "#AF3029", bold = true, italic = true, underline = true }
find_position = { fg = "#AF3029", bold = true, italic = true }

# Marker
marker_copied = { fg = "#AD8301", bg = "#AD8301" }
marker_cut = { fg = "#100F0F", bg = "#100F0F" }
marker_marked = { fg = "#205EA6", bg = "#205EA6" }
marker_selected = { fg = "#9f9d99", bg = "#9f9d99" }

# Count
count_copied = { fg = "#100F0F", bg = "#100F0F" }
count_cut = { fg = "#100F0F", bg = "#100F0F" }
count_selected = { fg = "#CECDC3", bg = "#9f9d99" }

# Border
border_symbol = " "
border_style  = { fg = "#205EA6" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#6F6E69", fg = "#205EA6" }

[mode]
# Mode
normal_main = { bg = "#205EA6", fg = "#CECDC3", bold = true }
normal_alt  = { bg = "#878580", fg = "#CECDC3" }

# Select mode
select_main = { bg = "#100F0F", fg = "#100F0F", bold = true }
select_alt  = { bg = "#878580", fg = "#CECDC3" }

# Unset mode
unset_main = { bg = "#9f9d99", fg = "#100F0F", bold = true }
unset_alt  = { bg = "#878580", fg = "#CECDC3" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#205EA6", bg = "#878580" }
progress_error = { fg = "#AD8301", bg = "#878580" }

# Permissions
permissions_t = { fg = "#205EA6" }
permissions_w = { fg = "#9f9d99" }
permissions_x = { fg = "#AD8301" }
permissions_r = { fg = "#CECDC3" }
permissions_s = { fg = "#100F0F" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#205EA6" }
active = { fg = "#9f9d99", bold = true }

# : ]]]


# : Input [[[

[input]
border = { fg = "#205EA6" }
value = { fg = "#CECDC3" }

# : ]]]

# : Tabs [[[

[tabs]
active = { fg = "#205EA6", bold = true, bg = "#100F0F" }
inactive = { fg = "#100F0F", bg = "#100F0F" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#205EA6", bg = "#6F6E69" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#205EA6" }
title = {}
hovered = { fg = "#100F0F", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#878580" }
cand = { fg = "#205EA6" }
rest = { fg = "#CECDC3" }
desc = { fg = "#CECDC3" }
separator = " ▶ "
separator_style = { fg = "#CECDC3" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#CECDC3" }
run = { fg = "#CECDC3" }
footer = { fg = "#100F0F", bg = "#100F0F" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#9f9d99" }
title_warn = { fg = "#205EA6" }
title_error = { fg = "#AD8301" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#9f9d99" },

    # Media
    { mime = "{audio,video}/*", fg = "#205EA6" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#100F0F" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#CECDC3" },

    # Special files
    { name = "*", is = "orphan", bg = "#AD8301" },
    { name = "*", is = "exec", fg = "#100F0F" },

    # Fallback
    { name = "*", fg = "#CECDC3" },
    { name = "*/", fg = "#205EA6" },
]

# : ]]]
