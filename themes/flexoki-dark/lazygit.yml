gui:
  theme:
    activeBorderColor:
      - '#205EA6'
      - bold
    inactiveBorderColor:
      - '#494845'
    optionsTextColor:
      - '#24837B'
    selectedLineBgColor:
      - '#2c2b2a'
    cherryPickedCommitBgColor:
      - '#100F0F'
    cherryPickedCommitFgColor:
      - '#205EA6'
    unstagedChangesColor:
      - '#AF3029'
    defaultFgColor:
      - '#CECDC3'
    searchingActiveBorderColor:
      - '#AD8301'
  authorColors:
    '*': '#66800B'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
