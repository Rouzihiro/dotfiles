gui:
  theme:
    activeBorderColor:
      - '#A02F6F'
      - bold
    inactiveBorderColor:
      - '#6F6E69'
    optionsTextColor:
      - '#205EA6'
    selectedLineBgColor:
      - '#100F0F'
    cherryPickedCommitBgColor:
      - '#100F0F'
    cherryPickedCommitFgColor:
      - '#A02F6F'
    unstagedChangesColor:
      - '#AF3029'
    defaultFgColor:
      - '#CECDC3'
    searchingActiveBorderColor:
      - '#AD8301'

  authorColors:
    '*': '#66800B'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
