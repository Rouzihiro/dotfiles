# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#bbc2cf,bg=#282c34"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#a9a1e1"
set -g pane-border-style "fg=#545962"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#545962,bg=default]#[fg=#bbc2cf,bg=#545962] #I:#W #[fg=#545962,bg=default]"

set -g window-status-current-format \
"#[fg=#a9a1e1,bg=default]#[fg=#282c34,bg=#a9a1e1] #I:#W #[fg=#a9a1e1,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#282c34,bg=#a9a1e1"
set -g message-command-style "fg=#bbc2cf,bg=#282c34"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#282c34,bg=#a9a1e1"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#808691,bg=#545962"
set -g copy-mode-current-match-style "fg=#282c34,bg=#a9a1e1"
