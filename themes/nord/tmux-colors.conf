# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=#D8DEE9,bg=#2E3440"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=#81A1C1"
set -g pane-border-style "fg=#616772"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=#616772,bg=default]#[fg=#D8DEE9,bg=#616772] #I:#W #[fg=#616772,bg=default]"

set -g window-status-current-format \
"#[fg=#81A1C1,bg=default]#[fg=#2E3440,bg=#81A1C1] #I:#W #[fg=#81A1C1,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=#2E3440,bg=#81A1C1"
set -g message-command-style "fg=#D8DEE9,bg=#2E3440"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=#2E3440,bg=#81A1C1"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=#949aa5,bg=#616772"
set -g copy-mode-current-match-style "fg=#2E3440,bg=#81A1C1"
