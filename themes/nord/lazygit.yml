gui:
  theme:
    activeBorderColor:
      - '#B48EAD'
      - bold
    inactiveBorderColor:
      - '#4C566A'
    optionsTextColor:
      - '#81A1C1'
    selectedLineBgColor:
      - '#2E3440'
    cherryPickedCommitBgColor:
      - '#3B4252'
    cherryPickedCommitFgColor:
      - '#B48EAD'
    unstagedChangesColor:
      - '#BF616A'
    defaultFgColor:
      - '#D8DEE9'
    searchingActiveBorderColor:
      - '#EBCB8B'

  authorColors:
    '*': '#A3BE8C'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
