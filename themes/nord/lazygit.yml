gui:
  theme:
    activeBorderColor:
      - '#81A1C1'
      - bold
    inactiveBorderColor:
      - '#616772'
    optionsTextColor:
      - '#88C0D0'
    selectedLineBgColor:
      - '#474d59'
    cherryPickedCommitBgColor:
      - '#2E3440'
    cherryPickedCommitFgColor:
      - '#81A1C1'
    unstagedChangesColor:
      - '#BF616A'
    defaultFgColor:
      - '#D8DEE9'
    searchingActiveBorderColor:
      - '#EBCB8B'
  authorColors:
    '*': '#A3BE8C'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
