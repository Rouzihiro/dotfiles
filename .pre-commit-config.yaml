repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        exclude: \.jsonc$|config/\.config/swaync/config\.json$
      - id: check-yaml
      - id: check-xml
      - id: check-toml
      - id: check-merge-conflict
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        args: [-ignore, 'shellcheck reported issue']
  - repo: local
    hooks:
      - id: json-jq
        name: validate json (jq)
        entry: bash -lc 'jq empty "$@"' --
        language: system
        files: \.json$
        exclude: \.jsonc$|config/\.config/swaync/config\.json$
      - id: jsonc-node
        name: validate jsonc (node)
        entry: node .hooks/validate-jsonc.js
        language: system
        files: \.jsonc$|config/\.config/swaync/config\.json$
        pass_filenames: true
      - id: desktop-file-validate
        name: validate .desktop files
        entry: desktop-file-validate
        language: system
        files: \.desktop$
      - id: zsh-syntax
        name: zsh syntax check
        entry: zsh -n
        language: system
        files: \.zsh$
exclude: |
  (?x)(
    \.git/|
    \.gnupg/|
    \.ssh/|
    .*\.gpg$|
    \.exported/|
    \.local/share/
  )
