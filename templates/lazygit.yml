gui:
  theme:
    activeBorderColor:
      - '{{accent}}'
      - bold
    inactiveBorderColor:
      - '{{bg_muted}}'
    optionsTextColor:
      - '{{color6}}'
    selectedLineBgColor:
      - '{{bg_subtle}}'
    cherryPickedCommitBgColor:
      - '{{bg}}'
    cherryPickedCommitFgColor:
      - '{{accent}}'
    unstagedChangesColor:
      - '{{error}}'
    defaultFgColor:
      - '{{fg}}'
    searchingActiveBorderColor:
      - '{{warning}}'
  authorColors:
    '*': '{{success}}'
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"
  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true
notARepository: "quit"
