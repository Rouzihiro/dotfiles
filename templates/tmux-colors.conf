# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg={{fg}},bg={{bg}}"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg={{accent}}"
set -g pane-border-style "fg={{bg_muted}}"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right "\
#(battery2 2>/dev/null || echo \"?%\") \
#(timer 2>/dev/null || date +'%H:%M:%S')"

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg={{bg_muted}},bg=default]#[fg={{fg}},bg={{bg_muted}}] #I:#W #[fg={{bg_muted}},bg=default]"

set -g window-status-current-format \
"#[fg={{accent}},bg=default]#[fg={{bg}},bg={{accent}}] #I:#W #[fg={{accent}},bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg={{bg}},bg={{accent}}"
set -g message-command-style "fg={{fg}},bg={{bg}}"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg={{bg}},bg={{accent}}"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg={{fg_dim}},bg={{bg_muted}}"
set -g copy-mode-current-match-style "fg={{bg}},bg={{accent}}"
