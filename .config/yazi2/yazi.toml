[mgr]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = true
linemode       = "none"

show_hidden    = true
show_symlink   = true
scrolloff      = 8

mouse_event    = ["click", "scroll", "touch", "move"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2

# Slightly more balanced for performance + quality
max_width       = 1600
max_height      = 1600

cache_dir       = ""
image_delay     = 60

# Better quality on modern GPUs (Mesa/Asahi friendly)
image_filter    = "catmull-rom"
image_quality   = 80

# safer default for HiDPI Wayland setups
ueberzug_scale  = 0.5
ueberzug_offset = [0, 0, 0, 0]

[tasks]
micro_workers    = 12
macro_workers    = 32

# reduce retry spam (prevents lag spikes)
bizarre_retry    = 3

# increase slightly for modern machines (you’re on M1 → fine)
image_alloc      = 805306368  # 768MB

image_bound      = [0, 0]
suppress_preload = false

[opener]
pdf_read = [
  { run = "evince %s", desc = "Read" },
]

pdf_annotate = [
  { run = "xournalpp %s", desc = "Annotate" },
]

[open]
rules = [
  { mime = "application/pdf", use = "pdf_read" },
]
