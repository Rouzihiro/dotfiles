"$schema" = 'https://starship.rs/config-schema.json'
palette = 'doom-one'

format = """
[](fg_dim)\
$os\
[](bg:fg_dim fg:fg_dim)\
$directory\
[](fg:fg_dim bg:accent)\
$git_branch\
$git_status\
$git_state\
$git_metrics\
[](fg:accent bg:bg_muted)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$python\
$package\
[](fg:bg_muted bg:fg_dim)\
$kubernetes\
$docker_context\
$conda\
[](fg:fg_dim)\
$cmd_duration\
$line_break$character"""

add_newline = false
right_format = """
[](fg_dim)\
$battery\
[](bg:fg_dim fg:fg_dim)\
$time\
[](fg:fg_dim)"""

scan_timeout = 35
command_timeout = 700

[time]
disabled = false
format = "[$time]($style)"
style = "bg:fg_dim fg:fg_on_accent"
time_format = "%H:%M"  # Use %I:%M %p for 12-hour format with AM/PM
# Add date if you want: time_format = "%b %d %H:%M" (e.g., "Jan 15 14:30")

[os]
disabled = false
style = "bg:fg_dim fg:fg_on_accent"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[directory]
style = "fg:fg bg:fg_dim"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = " "
truncate_to_repo = true
read_only = " "
read_only_style = "fg:fg bg:warning"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"Code" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:bg_subtle"
format = '[[ $symbol $branch ](fg:fg_on_accent bg:accent)]($style)'
truncation_length = 24

[git_status]
style = "bg:accent"
format = '[[($all_status$ahead_behind )](fg:fg_on_accent bg:accent)]($style)'

[git_state]
style = "bg:accent"
format = '[[ $state( $progress_current/$progress_total) ](fg:fg_on_accent bg:accent)]($style)'

[git_metrics]
disabled = false
added_style = "fg:fg_on_accent bg:accent"
deleted_style = "fg:fg_on_accent bg:accent"
format = '[[+$added]($added_style)/[-$deleted]($deleted_style) ](fg:fg_on_accent bg:accent)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "󰟓"
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol ](fg:color_fg0 bg:color_blue)]($style)'

[package]
disabled = false
symbol = "󰏗"
style = "bg:color_blue"
format = '[[ $symbol $version ](fg:color_fg0 bg:color_blue)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:success)'
error_symbol = '[](bold fg:error)'
vimcmd_symbol = '[](bold fg:color_bright_green)'
vimcmd_replace_one_symbol = '[](bold fg:warning)'
vimcmd_replace_symbol = '[](bold fg:warning)'
vimcmd_visual_symbol = '[](bold fg:warning)'

[status]
disabled = false
style = "bg:fg_dim"
format = '[[ ✖ $status ](fg:fg_on_accent bg:fg_dim)]($style)'
map_symbol = true
recognize_signal_code = true

[cmd_duration]
min_time = 2000
style = "bg:fg_dim"
format = '[[  $duration ](fg:fg_on_accent bg:fg_dim)]($style)'

[jobs]
threshold = 1
symbol = ""
style = "bg:accent"
format = '[[ $symbol $number ](fg:fg_on_accent bg:accent)]($style)'

[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '
unknown_symbol = '󰁽 '
empty_symbol = '󰂎 '
format = '[[$symbol$percentage ](fg:fg bg:fg_dim)]($style)'

[[battery.display]]
threshold = 15
style = "bg:accent fg:fg_on_accent"

[[battery.display]]
threshold = 30
style = "bg:accent fg:fg_on_accent"

[[battery.display]]
threshold = 100
style = "bg:accent fg:fg_on_accent"

