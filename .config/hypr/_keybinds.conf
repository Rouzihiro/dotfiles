########## launchers & system ##########
bind = $mod, Escape,      exec, rofi-power
bind = $mod, Return,      exec, $term
bind = $mod ALT, Return,  exec, $term2 -T 'floaty-medium'
bind = $mod SHIFT, Return, exec, $term2
bind = $mod, space,       exec, $launcher
bind = $mod ALT, space,   exec, quick-actions
bind = $mod CTRL, space,  exec, rofi-scripts

########## apps ##########
bind = $mod, A,           exec, $term2 -e btop
bind = $mod ALT, A,       exec, $term2 --title floaty-small -e sh -c ncdu
bind = $mod, B,           exec, $term2 --title floaty-tiny -e sh -c bookmarks
bind = $mod ALT, B,       exec, xdg-open https://
bind = $mod SHIFT, B,     exec, $term2 --title floaty-small -e sh -c bt
bind = $mod, D,           exec, rofi-aria
bind = $mod ALT, D,       exec, rofi-docs
bind = $mod SHIFT, D,     exec, bm-music-downloader
bind = $mod, E,           exec, $fm
bind = $mod ALT, E,       exec, $tfm
bind = $mod SHIFT, E,     exec, $files
bind = $mod, F,           fullscreen, 0
bind = $mod SHIFT, F,     togglefloating
bind = $mod, G,           exec, $term2 --title floaty-small -e sh -c fzf-keyhints-sway
bind = $mod ALT, G,       exec, $term2 --title floaty-medium -e zsh -ic "fzf-aliases; exec zsh"
bind = $mod, I,           exec, $term2 --title floaty-small -e sh -c fzf-wifi
bind = $mod ALT, I,       exec, rofi-wifi
bind = $mod ALT, L,       exec, $lockscreen
bind = $mod, M,           exec, rofi-mount-usb
bind = $mod ALT, M,       exec, rofi-monitor-switch
bind = $mod SHIFT, M,     exec, $term2 -T 'floaty-small' -e bash -c 'sudo ps_mem; echo ""; read -rp "Press Enter to close..."'
bind = $mod, N,           exec, $term2 --title floaty-small -e sh -c fzf-notes
bind = $mod ALT, N,       exec, $editor
bind = $mod SHIFT, N,     exec, rofi-notes
bind = $mod, O,           exec, ocr
bind = $mod ALT, O,       exec, sh -c text-picker

########## scratchpad ##########
bind = $mod, P,           togglespecialworkspace, magic
# $mod+Alt+P: handle via windowrulev2 (see note)
bind = $mod SHIFT, P,     exec, rofi-power-profile

########## session ##########
bind = $mod, Q,           killactive
bind = $mod CTRL, Q,      exec, hyprctl dispatch exit
bind = $mod, R,           exec, z-cmd-screenrecord
bind = $mod ALT, R,       exec, rofi-screenrecord
bind = $mod SHIFT, R,     exec, hyprctl reload
bind = $mod, S,           exec, rofi-screenshot
bind = $mod ALT, S,       exec, rofi-screenshot-fs
bind = $mod, T,           exec, rofi-theme-set
bind = $mod ALT, T,       exec, rofi-timewarrior
bind = $mod SHIFT, T,     exec, $term2 --app-id=runner_floating -e runner
bind = $mod, V,           exec, $term2 --title floaty-small -e sh fzf-video-play
bind = $mod ALT, V,       exec, $term2 --title floaty-tiny -e sh fzf-video-tool
bind = $mod SHIFT, V,     exec, rofi-video-tool
bind = $mod, W,           exec, rofi-wall
bind = $mod ALT, W,       exec, wall-random

########## voxtype (press/release) ##########
bind  = $mod, X, exec, voxtype record start
bindrt = $mod, X, exec, voxtype record stop

########## misc ##########
bind = $mod, Z,           exec, z-menu-keybindings-sway-soft
bind = $mod, grave,       exec, list-sway-window

########## screenshots ##########
# Full screenshot → $screenshot_dir
bind = , Print, exec, grim $screenshot_dir/$(date +'%F_%H-%M-%S').png
# Region select → swappy for annotation
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

