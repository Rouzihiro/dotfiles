gui:
  theme:
    activeBorderColor:
      - '87B0F9'
      - bold
    inactiveBorderColor:
      - '525569'
    optionsTextColor:
      - '94E2D5'
    selectedLineBgColor:
      - '38394b'
    cherryPickedCommitBgColor:
      - '1E1E2E'
    cherryPickedCommitFgColor:
      - '87B0F9'
    unstagedChangesColor:
      - 'F38BA8'
    defaultFgColor:
      - 'CDD6F4'
    searchingActiveBorderColor:
      - 'F9E2AF'

  authorColors:
    '*': 'A6E3A1'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
