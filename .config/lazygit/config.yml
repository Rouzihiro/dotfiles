gui:
  theme:
    activeBorderColor:
      - '6f8fa3'
      - bold
    inactiveBorderColor:
      - '514e46'
    optionsTextColor:
      - '7fa6a3'
    selectedLineBgColor:
      - '36342e'
    cherryPickedCommitBgColor:
      - '1b1a17'
    cherryPickedCommitFgColor:
      - '6f8fa3'
    unstagedChangesColor:
      - 'c26a4a'
    defaultFgColor:
      - 'd0c8b6'
    searchingActiveBorderColor:
      - 'c2a46a'

  authorColors:
    '*': '8a9a7b'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
