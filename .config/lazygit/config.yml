gui:
  theme:
    activeBorderColor:
      - 'bcaaa4'
      - bold
    inactiveBorderColor:
      - '6b5854'
    optionsTextColor:
      - '6d4c41'
    selectedLineBgColor:
      - '543f3b'
    cherryPickedCommitBgColor:
      - '3e2723'
    cherryPickedCommitFgColor:
      - 'bcaaa4'
    unstagedChangesColor:
      - 'bcaaa4'
    defaultFgColor:
      - 'd7ccc8'
    searchingActiveBorderColor:
      - 'd7ccc8'

  authorColors:
    '*': 'd7ccc8'

  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  skipRewordInEditorWarning: true
  expandFocusedSidePanel: true
  mouseEvents: true
  editor: "nvim"

  git:
    paging:
      colorArg: always
      pager: delta --dark --paging=never
    merging:
      manualCommit: false
    commit:
      signOff: false
    log:
      showGraph: true

notARepository: "quit"
