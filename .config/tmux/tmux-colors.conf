# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#4f4f4f"
set -g pane-active-border-style  "fg=#7ab0df"
set -g message-style             "bg=#7ab0df,fg=#121212"
set -g message-command-style     "bg=#7ab0df,fg=#121212"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#7ab0df"

# left bubble: session
set -g status-left "#[fg=#7ab0df]#[bg=#7ab0df]#[fg=#121212]#[bold]   #S #[nobold]#[fg=#7ab0df]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#303030]#[bg=#303030]#[fg=#e0e0e0]#[bold] ⏽ PREFIX #[nobold]#[fg=#303030]#[bg=default] ,}#[fg=#303030]#[bg=#303030]#[fg=#e0e0e0]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#303030]#[bg=default] #[fg=#4f4f4f]#[bg=#4f4f4f]#[fg=#e0e0e0] #H #[fg=#4f4f4f]#[bg=default] #[fg=#121212]#[bg=#121212]#[fg=#e0e0e0] %Y-%m-%d %H:%M #[fg=#121212]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#4f4f4f]#I #[fg=#e0e0e0]#W "
set -g window-status-current-format "#[fg=#7ab0df]#[bg=#7ab0df]#[fg=#121212]#[bold] #I: #W #[nobold]#[fg=#7ab0df]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
