# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#4f5d66"
set -g pane-active-border-style  "fg=#6fb8e3"
set -g message-style             "bg=#6fb8e3,fg=#16242d"
set -g message-command-style     "bg=#6fb8e3,fg=#16242d"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#6fb8e3"

# left bubble: session
set -g status-left "#[fg=#6fb8e3]#[bg=#6fb8e3]#[fg=#16242d]#[bold]   #S #[nobold]#[fg=#6fb8e3]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#324049]#[bg=#324049]#[fg=#d6e2ee]#[bold] ⏽ PREFIX #[nobold]#[fg=#324049]#[bg=default] ,}#[fg=#324049]#[bg=#324049]#[fg=#d6e2ee]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#324049]#[bg=default] #[fg=#4f5d66]#[bg=#4f5d66]#[fg=#d6e2ee] #H #[fg=#4f5d66]#[bg=default] #[fg=#16242d]#[bg=#16242d]#[fg=#d6e2ee] %Y-%m-%d %H:%M #[fg=#16242d]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#4f5d66]#I #[fg=#d6e2ee]#W "
set -g window-status-current-format "#[fg=#6fb8e3]#[bg=#6fb8e3]#[fg=#16242d]#[bold] #I: #W #[nobold]#[fg=#6fb8e3]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
