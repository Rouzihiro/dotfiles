# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#525569"
set -g pane-active-border-style  "fg=#CDD6F4"
set -g message-style             "bg=#CDD6F4,fg=#1E1E2E"
set -g message-command-style     "bg=#CDD6F4,fg=#1E1E2E"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#CDD6F4"

# left bubble: session
set -g status-left "#[fg=#CDD6F4]#[bg=#CDD6F4]#[fg=#1E1E2E]#[bold]   #S #[nobold]#[fg=#CDD6F4]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#38394b]#[bg=#38394b]#[fg=#CDD6F4]#[bold] ⏽ PREFIX #[nobold]#[fg=#38394b]#[bg=default] ,}#[fg=#38394b]#[bg=#38394b]#[fg=#CDD6F4]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#38394b]#[bg=default] #[fg=#525569]#[bg=#525569]#[fg=#CDD6F4] #H #[fg=#525569]#[bg=default] #[fg=#1E1E2E]#[bg=#1E1E2E]#[fg=#CDD6F4] %Y-%m-%d %H:%M #[fg=#1E1E2E]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#525569]#I #[fg=#CDD6F4]#W "
set -g window-status-current-format "#[fg=#CDD6F4]#[bg=#CDD6F4]#[fg=#1E1E2E]#[bold] #I: #W #[nobold]#[fg=#CDD6F4]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
