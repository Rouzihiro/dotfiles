# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#635b5b"
set -g pane-active-border-style  "fg=#f38d70"
set -g message-style             "bg=#f38d70,fg=#2c2525"
set -g message-command-style     "bg=#f38d70,fg=#2c2525"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#f38d70"

# left bubble: session
set -g status-left "#[fg=#f38d70]#[bg=#f38d70]#[fg=#2c2525]#[bold]   #S #[nobold]#[fg=#f38d70]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#474040]#[bg=#474040]#[fg=#e6d9db]#[bold] ⏽ PREFIX #[nobold]#[fg=#474040]#[bg=default] ,}#[fg=#474040]#[bg=#474040]#[fg=#e6d9db]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#474040]#[bg=default] #[fg=#635b5b]#[bg=#635b5b]#[fg=#e6d9db] #H #[fg=#635b5b]#[bg=default] #[fg=#2c2525]#[bg=#2c2525]#[fg=#e6d9db] %Y-%m-%d %H:%M #[fg=#2c2525]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#635b5b]#I #[fg=#e6d9db]#W "
set -g window-status-current-format "#[fg=#f38d70]#[bg=#f38d70]#[fg=#2c2525]#[bold] #I: #W #[nobold]#[fg=#f38d70]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
