# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#514e46"
set -g pane-active-border-style  "fg=#6f8fa3"
set -g message-style             "bg=#6f8fa3,fg=#1b1a17"
set -g message-command-style     "bg=#6f8fa3,fg=#1b1a17"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#6f8fa3"

# left bubble: session
set -g status-left "#[fg=#6f8fa3]#[bg=#6f8fa3]#[fg=#1b1a17]#[bold]   #S #[nobold]#[fg=#6f8fa3]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#36342e]#[bg=#36342e]#[fg=#d0c8b6]#[bold] ⏽ PREFIX #[nobold]#[fg=#36342e]#[bg=default] ,}#[fg=#36342e]#[bg=#36342e]#[fg=#d0c8b6]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#36342e]#[bg=default] #[fg=#514e46]#[bg=#514e46]#[fg=#d0c8b6] #H #[fg=#514e46]#[bg=default] #[fg=#1b1a17]#[bg=#1b1a17]#[fg=#d0c8b6] %Y-%m-%d %H:%M #[fg=#1b1a17]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#514e46]#I #[fg=#d0c8b6]#W "
set -g window-status-current-format "#[fg=#6f8fa3]#[bg=#6f8fa3]#[fg=#1b1a17]#[bold] #I: #W #[nobold]#[fg=#6f8fa3]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
