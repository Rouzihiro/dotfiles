# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#66676e"
set -g pane-active-border-style  "fg=#bd93f9"
set -g message-style             "bg=#bd93f9,fg=#282a36"
set -g message-command-style     "bg=#bd93f9,fg=#282a36"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#bd93f9"

# left bubble: session
set -g status-left "#[fg=#bd93f9]#[bg=#bd93f9]#[fg=#282a36]#[bold]   #S #[nobold]#[fg=#bd93f9]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#474852]#[bg=#474852]#[fg=#f8f8f2]#[bold] ⏽ PREFIX #[nobold]#[fg=#474852]#[bg=default] ,}#[fg=#474852]#[bg=#474852]#[fg=#f8f8f2]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#474852]#[bg=default] #[fg=#66676e]#[bg=#66676e]#[fg=#f8f8f2] #H #[fg=#66676e]#[bg=default] #[fg=#282a36]#[bg=#282a36]#[fg=#f8f8f2] %Y-%m-%d %H:%M #[fg=#282a36]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#66676e]#I #[fg=#f8f8f2]#W "
set -g window-status-current-format "#[fg=#bd93f9]#[bg=#bd93f9]#[fg=#282a36]#[bold] #I: #W #[nobold]#[fg=#bd93f9]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
