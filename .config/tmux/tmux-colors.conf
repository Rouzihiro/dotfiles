# ─────────────────────────────
# Basic setup
# ─────────────────────────────

set -g status-position top
set -g status-style "fg=CDD6F4,bg=1E1E2E"
set -g base-index 1
set -g renumber-windows on

# ─────────────────────────────
# Pane borders
# ─────────────────────────────

set -g pane-active-border-style "fg=87B0F9"
set -g pane-border-style "fg=525569"

# ─────────────────────────────
# Status bar
# ─────────────────────────────

set -g status-left ""
set -g status-right ""

# ─────────────────────────────
# Window tabs (PILL RESTORED)
# ─────────────────────────────

set -g window-status-separator " "

set -g window-status-format \
"#[fg=525569,bg=default]#[fg=CDD6F4,bg=525569] #I:#W #[fg=525569,bg=default]"

set -g window-status-current-format \
"#[fg=87B0F9,bg=default]#[fg=1E1E2E,bg=87B0F9] #I:#W #[fg=87B0F9,bg=default]"

# ─────────────────────────────
# Message styling
# ─────────────────────────────

set -g message-style "fg=1E1E2E,bg=87B0F9"
set -g message-command-style "fg=CDD6F4,bg=1E1E2E"

# ─────────────────────────────
# Mode styling
# ─────────────────────────────

set -g mode-style "fg=1E1E2E,bg=87B0F9"
set -g status-justify left

# ─────────────────────────────
# Copy mode
# ─────────────────────────────

set -g copy-mode-match-style "fg=878ca4,bg=525569"
set -g copy-mode-current-match-style "fg=1E1E2E,bg=87B0F9"
