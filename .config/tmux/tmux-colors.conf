# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#51494d"
set -g pane-active-border-style  "fg=#f0a8bc"
set -g message-style             "bg=#f0a8bc,fg=#080e18"
set -g message-command-style     "bg=#f0a8bc,fg=#080e18"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#f0a8bc"

# left bubble: session
set -g status-left "#[fg=#f0a8bc]#[bg=#f0a8bc]#[fg=#080e18]#[bold]   #S #[nobold]#[fg=#f0a8bc]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#2f272b]#[bg=#2f272b]#[fg=#f0eaed]#[bold] ⏽ PREFIX #[nobold]#[fg=#2f272b]#[bg=default] ,}#[fg=#2f272b]#[bg=#2f272b]#[fg=#f0eaed]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#2f272b]#[bg=default] #[fg=#51494d]#[bg=#51494d]#[fg=#f0eaed] #H #[fg=#51494d]#[bg=default] #[fg=#0d0509]#[bg=#0d0509]#[fg=#f0eaed] %Y-%m-%d %H:%M #[fg=#0d0509]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#51494d]#I #[fg=#f0eaed]#W "
set -g window-status-current-format "#[fg=#f0a8bc]#[bg=#f0a8bc]#[fg=#080e18]#[bold] #I: #W #[nobold]#[fg=#f0a8bc]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
