# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#274a52"
set -g pane-active-border-style  "fg=#268BD2"
set -g message-style             "bg=#268BD2,fg=#002B36"
set -g message-command-style     "bg=#268BD2,fg=#002B36"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#268BD2"

# left bubble: session
set -g status-left "#[fg=#268BD2]#[bg=#268BD2]#[fg=#002B36]#[bold]   #S #[nobold]#[fg=#268BD2]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#133a44]#[bg=#133a44]#[fg=#839496]#[bold] ⏽ PREFIX #[nobold]#[fg=#133a44]#[bg=default] ,}#[fg=#133a44]#[bg=#133a44]#[fg=#839496]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#133a44]#[bg=default] #[fg=#274a52]#[bg=#274a52]#[fg=#839496] #H #[fg=#274a52]#[bg=default] #[fg=#002B36]#[bg=#002B36]#[fg=#839496] %Y-%m-%d %H:%M #[fg=#002B36]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#274a52]#I #[fg=#839496]#W "
set -g window-status-current-format "#[fg=#268BD2]#[bg=#268BD2]#[fg=#002B36]#[bold] #I: #W #[nobold]#[fg=#268BD2]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
