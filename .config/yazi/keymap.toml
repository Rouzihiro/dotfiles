# ─────────────────────────────────────
# INPUT
# ─────────────────────────────────────
[input]

prepend_keymap = [
  { on = "<Esc>", run = "close", desc = "Cancel input" }
]

# ─────────────────────────────────────
# FILE MANAGER
# ─────────────────────────────────────
[mgr]

prepend_keymap = [

  # ───── NAVIGATION ─────
  { on = "j", run = "arrow 1", desc = "Down" },
  { on = "k", run = "arrow -1", desc = "Up" },

  { on = "<A-j>", run = "arrow 5", desc = "Down fast" },
  { on = "<A-k>", run = "arrow -5", desc = "Up fast" },

  # { on = "h", run = "leave", desc = "Parent dir" },
  # { on = "l", run = "enter", desc = "Enter dir / open file" },
  
  { on = "gg", run = "arrow top", desc = "Top" },
  { on = "G", run = "arrow bot", desc = "Bottom" },

  # ───── OPENING ─────
  { on = "<Enter>", run = "open", desc = "Open default app" },
  { on = "o", run = "open --interactive", desc = "Choose app" },
  { on = "O", run = "shell -- xournalpp %s", desc = "Xournal++ annotate" },

  # ───── SEARCH ─────
  { on = "<C-n>", run = "find_arrow", desc = "Next match" },
  { on = "<C-p>", run = "find_arrow --previous", desc = "Prev match" },

  # ───── PREVIEW ─────
  { on = "<C-j>", run = "seek 5", desc = "Preview down" },
  { on = "<C-k>", run = "seek -5", desc = "Preview up" },

  # ───── G NAVIGATION (FIXED SYNTAX) ─────
  { on = ["g", "h"], run = "cd ~", desc = "Home" },
  { on = ["g", "/"], run = "cd /", desc = "Root" },

  { on = ["g", "l"], run = "cd ~/Downloads", desc = "Downloads" },
  { on = ["g", "w"], run = "cd ~/Documents", desc = "Documents" },
  { on = ["g", "c"], run = "cd ~/.config", desc = "Config" },
  { on = ["g", "f"], run = "cd ~/dotfiles", desc = "Dotfiles" },
  { on = ["g", "v"], run = "cd ~/Videos", desc = "Videos" },
  { on = ["g", "p"], run = "cd ~/Pictures", desc = "Pictures" },
  { on = ["g", "g"], run = "cd ~/Games", desc = "Games" },
  { on = ["g", "t"], run = "cd ~/dotfiles/themes", desc = "Themes" },
  { on = ["g", "e"], run = "cd ~/Projects", desc = "Projects" },
  { on = ["g", "a"], run = "cd ~/assets", desc = "Assets" },
  { on = ["g", "m"], run = "cd ~/mount", desc = "Mount" },
  { on = ["g", "s"], run = "cd ~/.local", desc = "Local" },

  { on = ["g", "b"], run = "back", desc = "Back" },
  { on = ["g", "<Space>"], run = "cd --interactive", desc = "Interactive cd" },
]

# ─────────────────────────────────────
# OPERATIONS + TOOLS
# ─────────────────────────────────────
append_keymap = [

  # selection
  { on = "v", run = "visual_mode", desc = "Visual select" },
  { on = "<Space>", run = "toggle", desc = "Toggle select" },

  # copy/cut/paste
  { on = "y", run = "yank", desc = "Copy" },
  { on = "x", run = "yank --cut", desc = "Cut" },
  { on = "p", run = "paste", desc = "Paste" },
  { on = "yy", run = "yank", desc = "Copy (alt)" },

  # copy helpers
  { on = ["y", "p"], run = "copy path", desc = "Copy path" },
  { on = ["y", "d"], run = "copy dirname", desc = "Copy dir" },
  { on = ["y", "f"], run = "copy filename", desc = "Copy filename" },
  { on = ["y", "n"], run = "copy name_without_ext", desc = "Copy name no ext" },

  # delete
  { on = "D", run = "remove", desc = "Delete" },

  # links
  { on = "L", run = "link", desc = "Symlink absolute path" },

  # shell
  { on = "s", run = "shell --block -- $SHELL", desc = "Shell here" },
  { on = "e", run = "shell -- bash \"$@\"", desc = "Execute file" },

  # plugins
  { on = "f", run = "plugin fzf", desc = "Fuzzy jump" },

  # undo
  { on = "<Backspace>", run = "unyank", desc = "Unyank" },
  { on = "<Esc>", run = "escape", desc = "Escape state" },

  # misc plugins
  { on = "|", run = "plugin personal resize 0 1 2", desc = "Resize panes" },
  { on = "`", run = "plugin personal random", desc = "Random file" },

  { on = "J", run = "plugin personal move_parent 1", desc = "Parent down" },
  { on = "K", run = "plugin personal move_parent -1", desc = "Parent up" },

  { on = "<A-n>", run = "plugin personal new_dir", desc = "New dir" },
  { on = "<C-t>", run = "plugin personal directory_tab", desc = "Open tab" },

  { on = "<A-p>", run = "plugin personal chmod", desc = "Chmod" },
  { on = "<A-x>", run = "plugin personal chmodx", desc = "Make executable" },

  { on = "<A-s>", run = "plugin personal share", desc = "Share file" },

]
