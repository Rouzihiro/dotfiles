[mgr]
cwd = { fg = "#d6e2ee" }
find_keyword = { fg = "#4d86b0", bold = true, italic = true, underline = true }
find_position = { fg = "#4d86b0", bold = true, italic = true }
marker_copied = { fg = "#8bc9eb", bg = "#8bc9eb" }
marker_cut = { fg = "#8996a0", bg = "#8996a0" }
marker_marked = { fg = "#6fb8e3", bg = "#6fb8e3" }
marker_selected = { fg = "#5e95bc", bg = "#5e95bc" }
count_copied = { fg = "#16242d", bg = "#8996a0" }
count_cut = { fg = "#16242d", bg = "#8996a0" }
count_selected = { fg = "#16242d", bg = "#5e95bc" }
border_symbol = " "
border_style = { fg = "#6fb8e3" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#6fb8e3" }
perm_read = { fg = "#d6e2ee" }
perm_write = { fg = "#5e95bc" }
perm_exec = { fg = "#8bc9eb" }
perm_sep = { fg = "#8996a0" }
progress_label = { bold = true }
progress_normal = { fg = "#6fb8e3", bg = "#324049" }
progress_error = { fg = "#8bc9eb", bg = "#324049" }

[mode]
normal_main = { bg = "#6fb8e3", fg = "#16242d", bold = true }
normal_alt  = { bg = "#324049", fg = "#d6e2ee" }
select_main = { bg = "#8996a0", fg = "#16242d", bold = true }
select_alt  = { bg = "#324049", fg = "#d6e2ee" }
unset_main = { bg = "#5e95bc", fg = "#16242d", bold = true }
unset_alt  = { bg = "#324049", fg = "#d6e2ee" }

[select]
border = { fg = "#6fb8e3" }
active = { fg = "#5e95bc", bold = true }

[input]
border = { fg = "#6fb8e3" }
value = { fg = "#d6e2ee" }

[tabs]
active = { fg = "#6fb8e3", bold = true, bg = "#16242d" }
inactive = { fg = "#8996a0", bg = "#16242d" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#6fb8e3", bg = "#324049" }

[tasks]
border = { fg = "#6fb8e3" }
title = {}
hovered = { fg = "#8996a0", underline = true }

[which]
cols = 3
mask = { bg = "#324049" }
cand = { fg = "#6fb8e3" }
rest = { fg = "#16242d" }
desc = { fg = "#d6e2ee" }
separator = " ▶ "
separator_style = { fg = "#d6e2ee" }

[help]
on = { fg = "#d6e2ee" }
run = { fg = "#d6e2ee" }
footer = { fg = "#16242d", bg = "#8996a0" }

[notify]
title_info = { fg = "#5e95bc" }
title_warn = { fg = "#6fb8e3" }
title_error = { fg = "#8bc9eb" }

[filetype]
rules = [
    { mime = "image/*", fg = "#5e95bc" },
    { mime = "{audio,video}/*", fg = "#6fb8e3" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#8996a0" },
    { mime = "application/{pdf,doc,rtf}", fg = "#d6e2ee" },
    { url = "*", is = "orphan", bg = "#8bc9eb" },
    { url = "*", is = "exec", fg = "#8996a0" },
    { url = "*", fg = "#d6e2ee" },
    { url = "*/", fg = "#6fb8e3" },
]
