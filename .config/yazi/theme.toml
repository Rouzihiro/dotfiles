[mgr]
cwd = { fg = "#f8f8f2" }
find_keyword = { fg = "#ff5555", bold = true, italic = true, underline = true }
find_position = { fg = "#ff5555", bold = true, italic = true }
marker_copied = { fg = "#ff79c6", bg = "#ff79c6" }
marker_cut = { fg = "#a4a5a6", bg = "#a4a5a6" }
marker_marked = { fg = "#bd93f9", bg = "#bd93f9" }
marker_selected = { fg = "#50fa7b", bg = "#50fa7b" }
count_copied = { fg = "#282a36", bg = "#a4a5a6" }
count_cut = { fg = "#282a36", bg = "#a4a5a6" }
count_selected = { fg = "#282a36", bg = "#50fa7b" }
border_symbol = " "
border_style = { fg = "#bd93f9" }

[status]
sep_left = { open = "", close = "🭠" }
sep_right = { open = "🭁", close = "" }
perm_type = { fg = "#bd93f9" }
perm_read = { fg = "#f8f8f2" }
perm_write = { fg = "#50fa7b" }
perm_exec = { fg = "#ff79c6" }
perm_sep = { fg = "#a4a5a6" }
progress_label = { bold = true }
progress_normal = { fg = "#bd93f9", bg = "#474852" }
progress_error = { fg = "#ff79c6", bg = "#474852" }

[mode]
normal_main = { bg = "#bd93f9", fg = "#282a36", bold = true }
normal_alt  = { bg = "#474852", fg = "#f8f8f2" }
select_main = { bg = "#a4a5a6", fg = "#282a36", bold = true }
select_alt  = { bg = "#474852", fg = "#f8f8f2" }
unset_main = { bg = "#50fa7b", fg = "#282a36", bold = true }
unset_alt  = { bg = "#474852", fg = "#f8f8f2" }

[select]
border = { fg = "#bd93f9" }
active = { fg = "#50fa7b", bold = true }

[input]
border = { fg = "#bd93f9" }
value = { fg = "#f8f8f2" }

[tabs]
active = { fg = "#bd93f9", bold = true, bg = "#282a36" }
inactive = { fg = "#a4a5a6", bg = "#282a36" }
sep_inner = { open = "[", close = "]" }

[cmp]
border = { fg = "#bd93f9", bg = "#474852" }

[tasks]
border = { fg = "#bd93f9" }
title = {}
hovered = { fg = "#a4a5a6", underline = true }

[which]
cols = 3
mask = { bg = "#474852" }
cand = { fg = "#bd93f9" }
rest = { fg = "#282a36" }
desc = { fg = "#f8f8f2" }
separator = " ▶ "
separator_style = { fg = "#f8f8f2" }

[help]
on = { fg = "#f8f8f2" }
run = { fg = "#f8f8f2" }
footer = { fg = "#282a36", bg = "#a4a5a6" }

[notify]
title_info = { fg = "#50fa7b" }
title_warn = { fg = "#bd93f9" }
title_error = { fg = "#ff79c6" }

[filetype]
rules = [
    { mime = "image/*", fg = "#50fa7b" },
    { mime = "{audio,video}/*", fg = "#bd93f9" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#a4a5a6" },
    { mime = "application/{pdf,doc,rtf}", fg = "#f8f8f2" },
    { url = "*", is = "orphan", bg = "#ff79c6" },
    { url = "*", is = "exec", fg = "#a4a5a6" },
    { url = "*", fg = "#f8f8f2" },
    { url = "*/", fg = "#bd93f9" },
]
