conky.config = {
    background = true,
    cpu_avg_samples = 2,
    diskio_avg_samples = 10,
    double_buffer = true,
    if_up_strictness = 'address',
    net_avg_samples = 2,
    no_buffers = true,
    temperature_unit = 'fahrenheit',
    text_buffer_size = 2048,
    update_interval = 1,
    imlib_cache_size = 0,

    -- Changed alignment to left side
    alignment = 'bottom_left',
    gap_x = 42,
    gap_y = 0,

    -- Same size settings
    minimum_height = 200,
    minimum_width = 260,
    maximum_width = 260,

    -- Same graphical settings
    border_inner_margin = 5,
    border_outer_margin = 5,
    border_width = 0,
    default_bar_width = 260,
    default_bar_height = 10,
    default_gauge_height = 25,
    default_gauge_width = 40,
    default_graph_height = 40,
    default_graph_width = 153,
    default_shade_color = '#000000',
    default_outline_color = '#000000',
    draw_borders = false,
    draw_graph_borders = true,
    draw_shades = false,
    draw_outline = false,
    stippled_borders = 0,

    -- Same font settings
    font = 'JetBrains Mono Nerd Font:Bold:size=10',
    font2 = 'JetBrains Mono Nerd Font:Bold:size=30',
    font3 = 'JetBrains Mono Nerd Font:size=12',
    font4 = 'JetBrains Mono Nerd Font:Bold:size=9',
    
    -- Same text settings
    format_human_readable = true,
    max_text_width = 0,
    max_user_text = 16384,
    override_utf8_locale = true,
    short_units = true,
    top_name_width = 21,
    top_name_verbose = false,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xftalpha = 1,

    -- Same window settings
    own_window = true,
    own_window_argb_value = 150,
    own_window_argb_visual = true,
    own_window_class = 'Conky',
    own_window_colour = '#2E3440',
    own_window_transparent = true,
    own_window_title = 'qtile_conky_left',
    own_window_type = 'override',
    own_window_hints = 'undecorated,below,above,sticky,skip_taskbar,skip_pager',

    -- Same Nord colors
    color0 = '#B48EAD',
    color1 = '#D8DEE9',
    color2 = '#88C0D0',
    color3 = '#EBCB8B',
};

conky.text = [[
#${alignc}${color0}${font2}${time %H:%M}${font}
#${voffset 6}${alignc}${color0}${font3}${time %b %d, %Y}${font}${color}
${voffset 18}${goto 12}${color3}NETWORK${goto 50}
${color1}${hr}${color}
${goto 12}${color1}IP Address:${alignr}${color2}${addr wlp108s0}${color}
${goto 12}${color1}Wifi Signal:${alignr}${color2}${wireless_link_qual_perc wlp108s0}%${color}
${goto 12}${color1}Bitrate:${alignr}${color2}${wireless_bitrate wlp108s0}${color}

${goto 12}${color1}Upload Speed:${alignr}${color2}${upspeed wlp108s0}${color}
${goto 12}${color1}Total Up:${alignr}${color2}${totalup wlp108s0}${color}
${goto 12}${color2}${upspeedgraph wlp108s0 40,254 88C0D0 EBCB8B}${color}

${goto 12}${color1}Download Speed:${alignr}${color2}${downspeed wlp108s0}${color}
${goto 12}${color1}Total Down:${alignr}${color2}${totaldown wlp108s0}${color}
${goto 12}${color2}${downspeedgraph wlp108s0 40,254 88C0D0 EBCB8B}${color}

${voffset 10}${goto 12}${color3}BATTERY${color}
${color1}${hr}${color}
${goto 12}${color1}Status:${alignr}${color2}${battery_status}${color}
${goto 12}${color1}Percentage:${alignr}${color2}${battery_percent}%${color}
${color2}${goto 12}${battery_bar 8,254}${color}
${goto 12}${color1}Time Left:${alignr}${color2}${battery_time}${color}

${if_match "${battery_status}" == "charging"}
${goto 12}${color1}Time to Full:${alignr}${color2}${battery_time}${color}
${endif}
]];
