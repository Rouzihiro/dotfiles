conky.config = {
	background = true,
	use_xft = true,
	font = 'DejaVu Sans Mono:size=11',
	xftalpha = 1,
	update_interval = 1,
	total_run_times = 0,
	own_window = true,
	own_window_transparent = true,
--own_window_color 000000
own_window_argb_visual = true,
--own_window_argb_value = 250,
	own_window_type = 'normal',
	own_window_hints = 'undecorated,below,skip_taskbar,skip_pager',
	double_buffer = true,
	minimum_width = 300, minimum_height = 200,
        maximum_width = 300,
	text_buffer_size = 2048,
	draw_shades = false,
	draw_outline = false,
	draw_borders = false,
	draw_graph_borders = false,
	default_color = 'white',
	default_outline_color = 'white',
	alignment = 'top_left',
	gap_x = 70,
	gap_y = 850,
	no_buffers = true,
	uppercase = false,
	cpu_avg_samples = 2,
	override_utf8_locale = true,
imlib_cache_flush_interval = 60,
	imlib_cache_size = 10000,


-- Taille des pointillés
	stippled_borders = 5,

-- Couleurs
	default_color = '#ffffff',--ffd579
	default_shade_color = '#333333',
	default_outline_color = 'black',

--  lua_load = '~/.conky/lua/image.lua',
 -- lua_load = ' ~/.conky/calendrier-lua/calendrier.lua',
 -- lua_draw_hook_pre = 'conky_widgets',

color0 = '2777ff',
color1 = 'D2CBC1',
color2 = 'red',
color3 = 'blue',
color4 = 'B1ADA7',
color5 = '7B7870',
color6 = '2777ff',
color7 = '000000',
color9 = '2777ff', 
};

conky.text = [[
${color9}${hr 1 300}
${alignc}${color0}Hours of the World's Major Cities$color
${font : size=10}
${tztime US/Hawaii %A %d %B %Y}
${color6}${tztime NZ %A %d %B %Y}${color}
${goto 25}${if_match ${tztime Europe/Berlin %d} == ${tztime NZ %d}}${color6} Berlin                ${goto 160}${tztime Europe/Berlin %R}${color}${else} Berlin                ${goto 220}${tztime Europe/Berlin %R}${endif}
${goto 25}${if_match ${tztime Europe/London %d} == ${tztime NZ %d}}${color6} Londres             ${goto 160}${tztime Europe/London %R}${color}${else} Londres             ${goto 220}${tztime Europe/London %R}${endif}
${goto 25}${if_match ${tztime Europe/Rome %d} == ${tztime NZ %d}}${color6} Rome                  ${goto 160}${tztime Europe/Rome %R}${color}${else} Rome                  ${goto 220}${tztime Europe/Rome %R}${endif}
${goto 25}${if_match ${tztime US/Eastern %d} == ${tztime NZ %d}}${color6} Miami                  ${goto 160}${tztime US/Eastern %R}${color}${else} Miami                  ${goto 220}${tztime US/Eastern %R}${endif}
${goto 25}${if_match ${tztime America/Mexico_City %d} == ${tztime NZ %d}}${color6} Mexico        ${goto 160}${tztime America/Mexico_City %R}${color}${else} Mexico        ${goto 220}${tztime America/Mexico_City %R}${endif}
${goto 25}${if_match ${tztime America/Buenos_Aires %d} == ${tztime NZ %d}}${color6} Buenos Aires ${goto 160}${tztime America/Buenos_Aires %R}${color}${else} Buenos Aires ${goto 220}${tztime America/Buenos_Aires %R}${endif}
${goto 25}${if_match ${tztime US/Pacific %d} == ${tztime NZ %d}}${color6} Los Angeles            ${goto 160}${tztime US/Pacific %R}${color}${else} Los Angeles            ${goto 220}${tztime US/Pacific %R}${endif}
${goto 25}${if_match ${tztime US/Hawaii %d} == ${tztime NZ %d}}${color6} Honolulu                ${goto 160}${tztime US/Hawaii %R}${color}${else} Honolulu                ${goto 220}${tztime US/Hawaii %R}${endif}
${goto 25}${if_match ${tztime Asia/Tokyo %d} == ${tztime NZ %d}}${color6} Tokyo                  ${goto 160}${tztime Asia/Tokyo %R}${color}${else} Tokyo                  ${goto 220}${tztime Asia/Tokyo %R}${endif}
${goto 25}${if_match ${tztime Asia/Singapore %d} == ${tztime NZ %d}}${color6} Singapore          ${goto 160}${tztime Asia/Singapore %R}${color}${else} Singapore          ${goto 220}${tztime Asia/Singapore %R}${endif}
${goto 25}${if_match ${tztime GMT-5:30 %d} == ${tztime NZ %d}}${color6} New Delhi                ${goto 160}${tztime GMT-5:30 %R}${color}${else} New Delhi                ${goto 220}${tztime GMT-5:30 %R}${endif}
${goto 25}${if_match ${tztime Africa/Johannesburg %d} == ${tztime NZ %d}}${color6} Le Cap        ${goto 160}${tztime Africa/Johannesburg %R}${color}${else} Le Cap        ${goto 220}${tztime Africa/Johannesburg %R}${endif}


]];
