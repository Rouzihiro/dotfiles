-- Center Panel Configuration
conky.config = {
    -- Basic Settings
    update_interval = 1,
    double_buffer = true,
    text_buffer_size = 2048,
    net_avg_samples = 1,

    -- Font Settings
    use_xft = true,
    font = 'Caskaydia Cove Nerd Font:size=10',
    xftalpha = 0.9,

   -- Window Settings
own_window = true,
own_window_type = 'toolbar',  
own_window_transparent = false,
own_window_argb_visual = true,
own_window_argb_value = 100,
own_window_colour = '080721',
own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

-- Border Settings
draw_outline = false,
draw_shades = false,
draw_borders = false,
draw_graph_borders = true,
border_width = 1,
border_inner_margin = 8,

    -- Size Settings
    minimum_width = 840,
    maximum_width = 840,
    minimum_height = 1350,
    
    -- Graph Settings
    default_graph_height = 30,
    default_graph_width = 380,
    
    -- Colors
    default_color = 'white',
    color1 = 'FFB86C',  -- Orange
    color2 = '8BE9FD',  -- Light Blue
    color3 = '50FA7B',  -- Green
    color4 = 'BD93F9',  -- Purple
    color5 = 'FF5555',  -- Red
    color6 = 'FF79C6',  -- Pink
    color7 = '282A36',  -- Dark Background
    color8 = '44475A',  -- Light Background

    -- Units and Format
    short_units = true,
    temperature_unit = 'celsius',
    
    -- Text Settings
    uppercase = false,
    use_spacer = 'none',
    pad_percents = 2,
    
    -- Position
    alignment = 'top_left',
    gap_x = 865,
}

conky.text = [[

${voffset 100}${color2}${font Caskaydia Cove Nerd Font:bold:size=12}Power Management${goto 400}Backup Status${color8}${hr 1}
${if_existing /sys/class/power_supply/BAT0}
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${color2}${goto 15}${color2}• ${color}CPU Governor: ${execi 30 cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor}
${goto 15}${color2}• ${color}TDP Current: ${execi 30 sensors | grep "Package id" | cut -d ":" -f2 | cut -d "(" -f1 | tr -d " +W"}W
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${color2}• ${color}Time Remaining: ${battery_time BAT0}
${goto 15}${color2}• ${color}Power Draw: ${execi 30 cat /sys/class/power_supply/BAT0/power_now | awk '{printf "%.1f", $1/1000000}'}W
${goto 15}${color2}• ${color}Capacity: ${execi 30 cat /sys/class/power_supply/BAT0/energy_full | awk '{printf "%.1f", $1/1000000}'}Wh
${voffset 5}${goto 15}${if_match ${battery_percent BAT0}<=20}${color5}${else}${if_match ${battery_percent BAT0}<=50}${color1}${else}${color2}${endif}${endif}󰁹 ${color}Battery Status: ${battery_percent BAT0}%
${goto 15}${color8}${battery_bar 8,300 BAT0}${endif}
${voffset -120}${goto 400}${font Caskaydia Cove Nerd Font:size=10}${color2}󰆓 ${color}TimeShift
${goto 400}${color2}• ${color}Last Backup: ${execi 300 ls -l --time-style="+%Y-%m-%d %H:%M" /timeshift/snapshots 2>/dev/null | tail -n 1 | awk '{print $6, $7}' || echo "No backups"}
${goto 400}${color2}• ${color}Total Snapshots: ${execi 300 ls -1 /timeshift/snapshots 2>/dev/null | wc -l || echo "0"}
${goto 400}${color2}• ${color}Backup Space: ${execi 300 du -sh /timeshift/snapshots 2>/dev/null | cut -f1 || echo "N/A"}
${goto 400}${color2}󰢼 ${color}Rsync Status
${goto 400}${execpi 300 ps aux | grep [r]sync | awk '{print "${color2}• ${color}Active: " $11 " " $12 " " $13}' || echo "${color2}• ${color}No active syncs"}
${voffset 35}${font Caskaydia Cove Nerd Font:bold:size=12}${color2}▎System Updates${goto 420}▎Flatpak Updates${alignr}${color8}${hr 1}
${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color2}󰏖 ${color}Available: ${color2}${execi 3600 dnf check-update -q | grep -v "^$" | wc -l}${color}${goto 420}${color2}󰏗 ${color}Available: ${color2}${execi 3600 flatpak remote-ls --updates | grep -v "^$" | wc -l}${color}
${voffset 5}${font Caskaydia Cove Nerd Font:size=10}${execpi 3600 dnf check-update -q | head -n 5 | awk '
    NF>=3 {
        pkg=$1;
        ver=$2;
        repo=$3;
        printf "${goto 15}${color2}• ${color}%-25s ${color6}%s ${color2}(%s)${color}\n",
            pkg, ver, repo
    }
'}${voffset -75}${goto 420}${font Caskaydia Cove Nerd Font:size=10}${execpi 3600 flatpak remote-ls --updates | head -n 5 | awk '
    {
        split($0, parts, "\t");
        app=parts[1];
        ver=parts[2];
        printf "${goto 435}${color2}• ${color}%-40s ${color6}%s${color}\n",
            app, ver
    }
'}${voffset 30}
${voffset 5}${goto 15}${color2}󰃖 ${color}Last Check: ${color2}${execi 3600 date "+%H:%M"}${color}${goto 200}${color4}${color}Held Packages: ${execi 3600 dnf list held 2>/dev/null | grep -v "^$" | wc -l || echo "0"}${goto 420}${color2}󰃖 ${color}Last Check: ${color2}${execi 3600 date "+%H:%M"}${color}
${voffset 20}${font Caskaydia Cove Nerd Font:bold:size=12}${color5}▎Attention${alignr}${color8}${hr 1}
${if_match "${execi 60 systemctl --failed --no-pager | grep -c "failed"}">"0"}
${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color5}󰚌 ${color}Failed Services: ${color5}${execi 60 systemctl --failed --no-pager | grep -c "failed"}
${font Caskaydia Cove Nerd Font:size=10}${execpi 60 systemctl --failed --no-pager | grep "failed" | sed 's/^/${goto 15}${color5}• ${color}/' }${endif}
${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color5}󰇅 ${color}Critical System Events
${font Caskaydia Cove Nerd Font:size=10}${execpi 300 journalctl -p 0..2 --since "1 hour ago" --no-pager | tail -n 3 | sed 's/^/${goto 15}${color5}• ${color}/' }
${if_match ${fs_used_perc /}>90}${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color5}󰋊 ${color}Storage Warning: Root partition at ${color5}${fs_used_perc /}%${color}${endif}
${if_match ${fs_used_perc /home}>90}${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color5}󰋊 ${color}Storage Warning: Home partition at ${color5}${fs_used_perc /home}%${color}${endif}
${if_match ${memperc}>90}${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color5}󰍛 ${color}Memory Warning: Usage at ${color5}${memperc}%${color}${endif}
${voffset -35}${font Caskaydia Cove Nerd Font:bold:size=12}${color1}▎System Warnings${alignr}${color8}${hr 1}
${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color1}󰗖 ${color}Recent Events
${font Caskaydia Cove Nerd Font:size=10}${execpi 60 journalctl -p 4 --since "1 hour ago" --no-pager | tail -n 4 | sed 's/^/${goto 15}${color1}• ${color}/' }

${voffset 10}${font Caskaydia Cove Nerd Font:bold:size=12}${color3}▎Storage Health${alignr}${color8}${hr 1}
${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color3}󰋊 ${color}NVMe (${color3}/dev/nvme0n1${color})${goto 420}${color3}󰋊 ${color}SSD (${color3}/dev/sda${color})
${goto 15}${color3}• ${color}Model: ${color3}${execi 300 sudo nvme id-ctrl /dev/nvme0n1 | grep -i "mn" | cut -d ":" -f2 | xargs}${goto 420}${color3}• ${color}Model: ${color3}${execi 300 sudo smartctl -i /dev/sda | grep "Device Model" | cut -d ":" -f2 | xargs}
${goto 15}${color3}• ${color}Used Space: ${color3}${fs_used_perc /}% ${color}(${color3}${fs_used /}${color})${goto 420}${color3}• ${color}Used Space: ${color3}${fs_used_perc /home}% ${color}(${color3}${fs_used /home}${color})
${goto 15}${color3}• ${color}I/O Stats:${goto 420}${color3}• ${color}I/O Stats:
${goto 30}${color3}◦ ${color}Read: ${color3}${diskio_read nvme0n1}/s${goto 435}${color3}◦ ${color}Read: ${color3}${diskio_read sda}/s
${goto 30}${color3}◦ ${color}Write: ${color3}${diskio_write nvme0n1}/s${goto 435}${color3}◦ ${color}Write: ${color3}${diskio_write sda}/s
${voffset 15}${font Caskaydia Cove Nerd Font:size=11}${color3}󰨣 ${color}Total I/O Activity:
${goto 15}${color3}${diskiograph_read 30,380 50FA7B FF5555 -t} ${alignr}${color3}${diskiograph_write 30,380 50FA7B FF5555 -t}
${goto 15}${color}Read: ${color3}${diskio_read}/s ${alignr}${color}Write: ${color3}${diskio_write}/s
${font Caskaydia Cove Nerd Font:size=10}${execpi 300 sudo smartctl -A /dev/sda | grep "Reallocated_Sector_Ct\|Current_Pending_Sector\|Offline_Uncorrectable" | awk '{print " • "$2": "$10}' | sed 's/^/${color3}/' }${color}

${voffset 5}${font Caskaydia Cove Nerd Font:bold:size=12}${color4}▎Security Events${goto 260}${color6}▎System Errors${goto 500}${color8}▎Error Sources

${voffset 5}${font Caskaydia Cove Nerd Font:size=11}${color4}󰌋 ${color}Last 24h Events: ${color4}${execi 300 grep -iE 'auth|failure|failed|invalid|session|sudo|security|error|warning' /var/log/auth.log | wc -l}${goto 250}${voffset -5}${color6}󰛔 ${color}Last 24h Stats:
${goto 275}${color5}• ${color}Critical:${alignr 420}${color5}${execi 300 journalctl -p 0..2 --since "24 hours ago" | sort | uniq -c | wc -l}
${goto 275}${color6}• ${color}Errors:${alignr 420}${color6}${execi 300 journalctl -p 3 --since "24 hours ago" | sort | uniq -c | wc -l}
${goto 275}${color3}• ${color}Warnings:${alignr 420}${color3}${execi 300 journalctl -p 4 --since "24 hours ago" | sort | uniq -c | wc -l}
${goto 500}${voffset -50}${color6}• ${color}System:${alignr}${color6}${execi 300 journalctl -p 0..3 --since "24 hours ago" | grep -i "systemd" | grep -v "systemd-logind" | sort | uniq -c | wc -l}
${goto 500}${color6}• ${color}Network:${alignr}${color6}${execi 300 journalctl -p 0..3 --since "24 hours ago" | grep -iE "network|networkmanager|wpa_supplicant|dhcp" | sort | uniq -c | wc -l}
${goto 500}${color6}• ${color}Hardware:${alignr}${color6}${execi 300 journalctl -p 0..3 --since "24 hours ago" | grep -iE "hardware|acpi|usb|pci|thermal|driver|firmware|power|cpu|memory" | sort | uniq -c | wc -l}

${goto 15}${color4}󰃖 ${color}Last Update: ${color4}${execi 300 date "+%H:%M"}${goto 260}${color6}󰋗 ${color}Recent Events:
${goto 275}${execpi 300 (
    journalctl -p 0..4 -n 8 | awk '
    {
        time=$3;
        if ($0 ~ /CRIT|critical/) {severity="CRIT"; color5="true"}
        else if ($0 ~ /ERR|error/) {severity="ERR"; color6="true"}
        else if ($0 ~ /WARN|warning/) {severity="WARN"; color3="true"}
        else {severity="INFO"}
        
        service=$5;
        
        for(i=1; i<=5; i++) {
            $i="";
        }
        message=substr($0, 6);
        if (length(message) > 30) {
            message=substr(message, 1, 27) "...";
        }
        
        if (severity == "CRIT") {
            printf "${color5}• ${color}%-6s ${color6}%-10s${color}%s\n", severity, service, message;
        } else if (severity == "ERR") {
            printf "${color6}• ${color}%-6s ${color6}%-10s${color}%s\n", severity, service, message;
        } else {
            printf "${color3}• ${color}%-6s ${color6}%-10s${color}%s\n", severity, service, message;
        }
    }' | sed 's/\[.*\]//' | sed 's/://' | grep -v "sudo\|systemd-logind"
)}

]]
