-- Right Panel Configuration
conky.config = {
    -- Basic Settings
    update_interval = 1,
    double_buffer = true,
    text_buffer_size = 2048,
    net_avg_samples = 1,

    -- Font Settings
    use_xft = true,
    font = 'Caskaydia Cove Nerd Font:size=10',
    xftalpha = 0.9,

    -- Window Settings
own_window = true,
own_window_type = 'toolbar',  
own_window_transparent = false,
own_window_argb_visual = true,
own_window_argb_value = 100,
own_window_colour = '080721',
own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

-- Border Settings
draw_outline = false,
draw_shades = false,
draw_borders = false,
draw_graph_borders = true,
border_width = 1,
border_inner_margin = 8,


    -- Size Settings
    minimum_width = 828,
    maximum_width = 828,
    minimum_height = 1350,
    
    -- Colors (Dracula Theme)
    default_color = 'white',
    color1 = 'FFB86C',  -- Orange
    color2 = '8BE9FD',  -- Light Blue
    color3 = '50FA7B',  -- Green
    color4 = 'BD93F9',  -- Purple
    color5 = 'FF5555',  -- Red
    color6 = 'FF79C6',  -- Pink
    color7 = '282A36',  -- Dark Background
    color8 = '44475A',  -- Light Background
    
    -- Position
    alignment = 'top_left',
    gap_x = 1740,
}

conky.text = [[
${voffset 10}${font Caskaydia Cove Nerd Font:bold:size=14}${color6}MEDIA${hr 2}

${voffset 15}${font Caskaydia Cove Nerd Font:bold:size=12}${color4}Audio Visualizer${alignr}${color8}${hr 1}
${voffset 5}${goto 15}${color4}󰕾 ${color}Current Output: ${execi 5 pactl info | grep "Default Sink" | cut -d: -f2 | xargs}
${voffset 2}${goto 15}${color8}${execpi 1 cava-raw-parser}

${voffset 5}${goto 15}${color4}󰓃 ${color}Volume: ${execi 1 pamixer --get-volume}%${alignr}${if_match "${execi 1 pamixer --get-mute}"=="true"}${color5}󰖁 Muted${else}${color3}󰕾 Active${endif}
${goto 15}${color8}${execbar pamixer --get-volume}

${voffset 5}${goto 15}${font Caskaydia Cove Nerd Font:size=10}${color4}• ${color}Sample Rate: ${execi 5 pactl info | grep "Sample Spec" | cut -d: -f2 | awk '{print $1}'}
${goto 15}${color4}• ${color}Format: ${execi 5 pactl info | grep "Sample Spec" | cut -d: -f2 | awk '{print $2}'}
${goto 15}${color4}• ${color}Channels: ${execi 5 pactl info | grep "Sample Spec" | cut -d: -f2 | awk '{print $3}'}

${voffset 15}${font Caskaydia Cove Nerd Font:bold:size=12}${color6}Media Control${alignr}${color8}${hr 1}
${voffset 5}${goto 15}${color6}󰗃 ${color}Now Playing:${alignr}${color6}${execi 5 playerctl -a metadata --format '{{status}}' 2>/dev/null || echo "No Media"}
${if_match "${execi 5 playerctl -a metadata --format '{{status}}' 2>/dev/null}"!="No Media"}
${goto 15}${font Caskaydia Cove Nerd Font:size=11}${color}${execi 5 playerctl -a metadata --format '{{title}}' | cut -c 1-50}
${goto 15}${color8}${execibar 5 playerctl position --format '{{ duration(position) }}' 2>/dev/null}
${goto 15}${color6}${execi 5 playerctl position --format '{{ duration(position) }}'}${alignr}${execi 5 playerctl metadata --format '{{ duration(mpris:length) }}'}
${endif}

${if_running firefox}${voffset 5}${goto 15}${color6}󰈹 ${color}Firefox Media:
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${color6}• ${color}${execi 5 playerctl -p firefox metadata --format '{{title}}' 2>/dev/null | cut -c 1-50}
${goto 15}${color6}• ${color}Channel: ${execi 5 playerctl -p firefox metadata --format '{{xesam:url}}' 2>/dev/null | grep -o "channel/[^/]*" | cut -d/ -f2}${endif}

${if_running chromium}${voffset 5}${goto 15}${color6}󰊯 ${color}Chromium Media:
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${color6}• ${color}${execi 5 playerctl -p chromium metadata --format '{{title}}' 2>/dev/null | cut -c 1-50}
${goto 15}${color6}• ${color}Channel: ${execi 5 playerctl -p chromium metadata --format '{{xesam:url}}' 2>/dev/null | grep -o "channel/[^/]*" | cut -d/ -f2}${endif}

${voffset 15}${font Caskaydia Cove Nerd Font:bold:size=12}${color3}Audio Devices${alignr}${color8}${hr 1}
${voffset 5}${goto 15}${color3}󰋋 ${color}Output Devices:
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${execpi 5 pactl list sinks | grep "device.description" | cut -d= -f2 | sed 's/^/${color3}• ${color}/' }

${voffset 5}${goto 15}${color3}󰋎 ${color}Input Devices:
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${execpi 5 pactl list sources | grep "device.description" | cut -d= -f2 | sed 's/^/${color3}• ${color}/' }

${voffset 5}${goto 15}${color3}󰍰 ${color}Active Apps:
${goto 15}${font Caskaydia Cove Nerd Font:size=10}${execpi 5 pactl list sink-inputs | grep "application.name" | cut -d= -f2 | sed 's/^/${color3}• ${color}/' }
]]