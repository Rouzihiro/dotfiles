conky.config = {

-- conky setup

update_interval = 1,
update_interval_on_battery = 3,
background = true,
total_run_times = 0,
cpu_avg_samples = 4,
no_buffers = yes,
text_buffer_size = 1024,
temperature_unit = 'celsius',
override_utf8_locale = true,
top_name_width = 16,
short_units = true,
use_xft = true,
font = 'Liberation Sans:bold:italic:size=12',
uppercase = false,
lowercase = true,
default_bar_height = 7,
default_bar_width = 260,
draw_outline = false,
draw_graph_borders = false,
out_to_wayland = true,


-- set up window

alignment = 'top_left',
gap_x = 20,
gap_y = 50,
maximum_width = 260,
double_buffer = true,
background = true,
own_window = true,
own_window_transparent = true,
own_window_type = 'desktop',
own_window_class = 'conky',
own_window_argb_visual = true,
own_window_argb_value = 0,
own_window_hints = 'undecorated, below, sticky, skip_taskbar, skip_pager',
draw_borders = false,
draw_shades = false,
draw_outline = false,
out_to_wayland = true,

-- colors

color0 = '7c818c', -- bar/graph color
color1 = 'e3e3e3', -- text color
color2 = '000000', -- black
color3 = '62d994', -- light green
color4 = '8dddff', -- light blue

color7 = '32a964', -- green
color8 = 'dfdf00', -- yellow
color9 = 'ec7063', -- red

}

-- text 

conky.text = [[
#
# date - time
#
${font Liberation Sans:italic:size=24}${color1}${alignc}${time %l:%M %P}${font}
${font Liberation Sans:bold:italic:size=11}${alignc}${time %A}, ${time %B} ${time %e}${font}
#
# temperature
#
${voffset 12}${font Liberation Sans:bold:italic:size=13}\
temperature${alignr}${color3}${if_match ${hwmon 3 temp 1} > 75}${color8}${endif}${if_match ${hwmon 3 temp 1} > 90}${color9}${endif}${hwmon 3 temp 1}${color1}°
cpu load${alignr}${color3}${if_match ${cpu cpu0} >= 25}${color8}${endif}${if_match ${cpu cpu0} >= 75}${color9}${endif}${cpu cpu0}${color1}%
#
# 1/5/15m
#
${alignc}   ${font Liberation Sans:bold:italic:size=10}1m ${if_match ${loadavg 1} <= 25}${color4}${endif}\
${if_match ${loadavg 1} > 25}${color8}${endif}${if_match ${loadavg 1} > 75}${color9}${endif}${loadavg 1}\
${color1} 5m ${if_match ${loadavg 2} <=25}${color4}${endif}\
${if_match ${loadavg 2} > 25}${color8}${endif}${if_match ${loadavg 2} > 75}${color9}${endif}\
${loadavg 2}${color1} 15m ${if_match ${loadavg 3} <=25}${color4}${endif}\
${if_match ${loadavg 3} > 25}${color8}${endif}${if_match ${loadavg 3} > 75}${color9}${endif}\
${loadavg 3}${font}
#
# cpu speed
#
${color1}cpu clock${alignr}${freq 1}Mhz
#
# ram/swap
#
${image ~/.config/conky/images/colorbar.png -p 0,158 -s 260x3}\
${voffset 24}\
ram use${alignr}${mem} / ${memeasyfree}
swap${alignr}${swap} / ${swapfree}
${font Liberation Sans:bold:italic:size=9}buffers   ${buffers}${alignr}${offset 0}cached   ${cached}${font}
#
# wireless
#
${image ~/.config/conky/images/colorbar.png -p 0,241 -s 260x3}\
${voffset 24}\
wireless${alignr}${wireless_bitrate wlp2s0}
${font Liberation Sans:bold:italic:size=9}net down   ${downspeed wlp2s0}${alignr}up   ${upspeed wlp2s0}${font}
#
# disk
#
${image ~/.config/conky/images/colorbar.png -p 0,306 -s 260x3}\
${voffset 24}\
rootfs${goto 116}${fs_used /}${alignr}free   ${fs_free /}
${font Liberation Sans:bold:italic:size=9}disk read   ${diskio_read}${goto 183}write   ${alignr}${diskio_write}${font}
#
# battery
#
${image ~/.config/conky/images/colorbar.png -p 0,372 -s 260x3}\
${voffset 24}\
battery${alignr}${color3}${if_match ${battery_percent BAT0} < 51}${color8}${endif}${if_match ${battery_percent BAT0} <= 21}${color9}${endif}${battery_percent BAT0}${color1}%
${if_match ${battery_percent BAT0} < 95}${alignc}${color1}${font Liberation Sans:bold:italic:size=11}${color1}${battery_time BAT0}${font}${endif}${font}
#
# top
#
${image ~/.config/conky/images/colorbar.png -p 0,416 -s 260x3}\
top cpu${goto 140}pid${goto 182}cpu ${alignr}mem
# 
${font Liberation Sans:bold:italic:size=9}\
${color1}${top name 1}${goto 130}${top pid 1}${goto 182}${top cpu 1}${goto 228}${top mem 1}
${color4}${top name 2}${goto 130}${top pid 2}${goto 182}${top cpu 2}${goto 228}${top mem 2}
${color1}${top name 3}${goto 130}${top pid 3}${goto 182}${top cpu 3}${goto 228}${top mem 3}${font}
ram
${font Liberation Sans:bold:italic:size=9}\
${color4}${top_mem name 1}${goto 130}${top_mem pid 1}${goto 182}${top_mem cpu 1}${goto 228}${top_mem mem 1}
${color1}${top_mem name 2}${goto 130}${top_mem pid 2}${goto 182}${top_mem cpu 2}${goto 228}${top_mem mem 2}
${color4}${top_mem name 3}${goto 130}${top_mem pid 3}${goto 182}${top_mem cpu 3}${goto 228}${top_mem mem 3}${font}
${color1}disk
${font Liberation Sans:bold:italic:size=9}\
${color1}${top_io name 1}${goto 130}${top_io pid 1}${goto 182}${top_io cpu 1}${goto 228}${top_io mem 1}
${color4}${top_io name 2}${goto 130}${top_io pid 2}${goto 182}${top_io cpu 2}${goto 228}${top_io mem 2}
${color1}${top_io name 3}${goto 130}${top_io pid 3}${goto 182}${top_io cpu 3}${goto 228}${top_io mem 3}${font}
#
${font Liberation Sans:bold:italic:size=11}\
${voffset 6}${alignc}kernel  ${kernel}
${alignc}uptime  ${uptime}${font}

]]
