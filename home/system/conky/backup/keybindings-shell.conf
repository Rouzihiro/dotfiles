conky.text = [[
${voffset 20}${color1}Shell Keybindings:${color}
${voffset 6}${goto 12}${color3}tree2: ${color}eza -R
${goto 12}${color3}zsource: ${color}source ~/.zshrc
${goto 12}${color3}crp: ${color}rsync -ah --progress
${goto 12}${color3}h: ${color}history | fzf
${goto 12}${color3}fz: ${color}fzf --preview'
${goto 12}${color3}yt: ${color}yt-x
${goto 12}${color3}edithome: ${color}home.nix & packages2.nix
${goto 12}${color3}editsys: ${color}configuration.nix & flake.nix
${goto 12}${color3}editshell: ${color}zsh.nix & shell.nix
${goto 12}${color3}sc: ${color}browse-scripts
${goto 12}${color3}vid: ${color}browse-videos
${goto 12}${color3}startup: ${color}systemctl list services
${goto 12}${color3}clean: ${color}ncg
${goto 12}${color3}update: ${color}nix flake update
${goto 12}${color3}ns: ${color}nix-shell --command zsh -p
${goto 12}${color3}nd: ${color}nvim @ dotfiles
${goto 12}${color3}lg: ${color}lazygit @ dotfiles
]];

