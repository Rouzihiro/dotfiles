conky.config = {
    background = true,
    cpu_avg_samples = 2,
    diskio_avg_samples = 10,
    double_buffer = true,
    if_up_strictness = 'address',
    net_avg_samples = 2,
    no_buffers = true,
    temperature_unit = 'fahrenheit',
    text_buffer_size = 2048,
    update_interval = 1,
    imlib_cache_size = 0,

    -- Changed alignment to left side
    alignment = 'bottom_left',
    gap_x = 30,
    gap_y = 60,

    -- Increased width to avoid text and bar overlap
    minimum_height = 200,
    minimum_width = 450,  -- Increased width
    maximum_width = 900,  -- Increased width

    -- Same graphical settings
    border_inner_margin = 5,
    border_outer_margin = 5,
    border_width = 0,
    default_bar_width = 350,  -- Adjusted width for bars
    default_bar_height = 10,
    default_gauge_height = 25,
    default_gauge_width = 40,
    default_graph_height = 40,
    default_graph_width = 200,  -- Adjusted width for graphs
    default_shade_color = '#000000',
    default_outline_color = '#000000',
    draw_borders = false,
    draw_graph_borders = true,
    draw_shades = false,
    draw_outline = false,
    stippled_borders = 0,

    -- Same font settings
    font = 'JetBrains Mono Nerd Font:Bold:size=10',
    font2 = 'JetBrains Mono Nerd Font:Bold:size=30',
    font3 = 'JetBrains Mono Nerd Font:size=12',
    font4 = 'JetBrains Mono Nerd Font:Bold:size=9',
    
    -- Same text settings
    format_human_readable = true,
    max_text_width = 0,
    max_user_text = 16384,
    override_utf8_locale = true,
    short_units = true,
    top_name_width = 21,
    top_name_verbose = false,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xftalpha = 1,

    -- Same window settings
    own_window = true,
    own_window_argb_value = 150,
    own_window_argb_visual = true,
    own_window_class = 'Conky',
    own_window_colour = '#2E3440',
    own_window_transparent = true,
    own_window_title = 'qtile_conky_left',
    own_window_type = 'override',
    own_window_hints = 'undecorated,below,above,sticky,skip_taskbar,skip_pager',

    -- Same Nord colors
    color0 = '#B48EAD',
    color1 = '#D8DEE9',
    color2 = '#88C0D0',
    color3 = '#EBCB8B',
};

conky.text = [[
#${alignc}${color0}${font2}${time %H:%M}${font}
#${voffset 6}${alignc}${color0}${font3}${time %b %d, %Y}${font}${color}
${voffset 18}${goto 12}${color3}NETWORK${goto 100}
${color1}${hr}${color}
${goto 12}${color1}IP Address:${alignr}${color2}${addr wlp108s0}${color}
${goto 12}${color1}Wifi Signal:${alignr}${color2}${wireless_link_qual_perc wlp108s0}%${color}
${goto 12}${color1}Bitrate:${alignr}${color2}${wireless_bitrate wlp108s0}${color}

${goto 12}${color1}Upload Speed:${alignr}${color2}${upspeed wlp108s0}${color}
${goto 12}${color1}Total Up:${alignr}${color2}${totalup wlp108s0}${color}
${goto 12}${color2}${upspeedgraph wlp108s0 40,254 88C0D0 EBCB8B}${color}

${goto 12}${color1}Download Speed:${alignr}${color2}${downspeed wlp108s0}${color}
${goto 12}${color1}Total Down:${alignr}${color2}${totaldown wlp108s0}${color}
${goto 12}${color2}${downspeedgraph wlp108s0 40,254 88C0D0 EBCB8B}${color}

# Add Info1 here:
${voffset 10}${font Caskaydia Cove Nerd Font:bold:size=12}${color2}▎System Overview${alignr}${color6}
${voffset 5}${font Caskaydia Cove Nerd Font:size=10}${color2}󰍛 ${color}${execi 3600 lscpu | grep 'Model name' | cut -d':' -f2 | sed 's/Core(TM)//g' | sed 's/^[ \t]*//;s/[ \t]*$//'} ${color6}@${freq_g}GHz${color}
${goto 15}${color2}󰓅 Frequency: ${freq_g}GHz${goto 200}Load: ${cpu cpu0}%${goto 320}${color6}󰘚 ${color}RAM: ${color6}${memperc}%${color} of ${memmax} ${goto 500}${color2}󰏈 Tasks:${color} ${processes} (${running_processes} running)
${goto 15}${color8}${execibar 10 cat /proc/cpuinfo | grep "cpu MHz" | head -n1 | cut -d':' -f2 | tr -d ' ' | awk '{print ($1/3700)*100}'}
${goto 15}${color2}▎${color}Core Stats${alignr}${color6}▎Memory Distribution
${goto 15}Core 1: ${color2}${cpu cpu1}%${goto 160}${color8}${cpubar cpu1 6,80}${alignr}Used: ${color4}${mem}
${goto 15}Core 2: ${color2}${cpu cpu2}%${goto 160}${color8}${cpubar cpu2 6,80}${alignr}Free: ${color4}${memfree}
${goto 15}Core 3: ${color2}${cpu cpu3}%${goto 160}${color8}${cpubar cpu3 6,80}${alignr}Buffers: ${color4}${buffers}
${goto 15}Core 4: ${color2}${cpu cpu4}%${goto 160}${color8}${cpubar cpu4 6,80}${alignr}Cached: ${color4}${cached}
#${goto 15}${font Caskaydia Cove Nerd Font:size=10}${color}Core Temps: ${color2}${goto 160}1: ${execi 10 sensors | grep 'Core 0' | awk '{print $3}'}${goto 240}2: ${execi 10 sensors | grep 'Core 1' | awk '{print $3}'}${goto 320}3: ${execi 10 sensors | grep 'Core 2' | awk '{print $3}'}${goto 400}4: ${execi 10 sensors | grep 'Core 3' | awk '{print $3}'}${alignr}Active: ${color4}${exec free | grep Mem: | awk '{print $7}'}
${alignr}Inactive: ${color4}${memeasyfree}

${font Caskaydia Cove Nerd Font:bold:size=12}${color1}▎Storage${alignr}${goto 420}${color1}▎I/O Activity${font}
${voffset 2}${goto 15}${color1}󰋊 ${color}ROOT ${color2}[${color1}${fs_type /}${color2}]
${goto 15}${color8}${fs_bar 6,380 /}${goto 420}${color1}${diskiograph_read 20,180 50FA7B FF5555 -t} ${color1}${diskiograph_write 20,180 50FA7B FF5555 -t}
${goto 15}Used: ${color orange}${fs_used /}${color} / ${fs_size /}${goto 200}Free: ${color cyan}${fs_free /}${goto 420}${color1}󰁋 ${color}R: ${color cyan}${diskio_read}/s ${goto 600}${color1}󰁌 ${color}W: ${color cyan}${diskio_write}/s
${goto 15}Usage: ${color orange}${fs_used_perc /}%


#${voffset 2}${goto 15}${color1}󱂵 ${color}HOME ${color2}[${color1}${fs_type /home}${color2}]
#${goto 15}${color8}${fs_bar 6,380 /home}${goto 420}${color2}Top I/O: ${top_io name 1} ${alignr}${color orange}${top_io io_perc 1}%
#${goto 15}Used: ${color orange}${fs_used /home}${color} / ${fs_size /home}${goto 200}Free: ${color cyan}${fs_free /home}${goto 420}${color}${top_io name 2} ${alignr}${color orange}${top_io io_perc 2}%
#${goto 15}Usage: ${color orange}${fs_used_perc /home}%${goto 420}${color}${top_io name 3} ${alignr}${color orange}${top_io io_perc 3}%
]];


