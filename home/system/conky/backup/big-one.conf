${goto 15}${upspeedgraph wlp2s0 40,800 FF5555 50FA7B 0 -l}
${goto 15}${color2}â”” Network Load
${goto 15}${color2}َ°¯ژ${color} Packets Down: ${color2}${tcp_portmon 1 32767 count}${goto 200}${color2}  َ°¯ژ${color} Packets Up: ${color2}${tcp_portmon 32768 61000 count}
${goto 15}${color2}َ±ک–${color} Active Connections: ${color2}${tcp_portmon 1 65535 count}${goto 200}${color2}  َ°گ،${color} Interface: ${color2}wlp2s0

