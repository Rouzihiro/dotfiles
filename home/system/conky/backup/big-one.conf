-- Left Panel Configuration
conky.config = {
    -- Basic Settings
    update_interval = 1,
    double_buffer = true,
    text_buffer_size = 2048,
    net_avg_samples = 1,

    -- Font Settings
    use_xft = true,
    font = 'Caskaydia Cove Nerd Font:size=10',
    xftalpha = 0.9,

   -- Window Settings
own_window = true,
own_window_type = 'toolbar',  
own_window_transparent = false,
own_window_argb_visual = true,
own_window_argb_value = 100,
own_window_colour = '080721',
own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

-- Border Settings
draw_outline = false,
draw_shades = false,
draw_borders = false,
draw_graph_borders = true,
border_width = 1,
border_inner_margin = 8,

    -- Size Settings
    minimum_width = 840,
    maximum_width = 840,
    minimum_height = 1350,
    
    -- Graph Settings
    default_graph_height = 30,
    default_graph_width = 380,
    
    -- Colors
    default_color = 'white',
    color1 = 'FFB86C',  -- Orange
    color2 = '8BE9FD',  -- Light Blue
    color3 = '50FA7B',  -- Green
    color4 = 'BD93F9',  -- Purple
    color5 = 'FF5555',  -- Red
    color6 = 'FF79C6',  -- Pink
    color7 = '282A36',  -- Dark Background
    color8 = '44475A',  -- Light Background

    -- Units and Format
    short_units = true,
    temperature_unit = 'celsius',
    
    -- Text Settings
    uppercase = false,
    use_spacer = 'none',
    pad_percents = 2,
    
    -- Position
    alignment = 'top_left',
}

conky.text = [[
${voffset -10}${goto 15}${font Caskaydia Cove Nerd Font:bold:size=64}${color white}${time %H}${color1}:${time %M}${color white}:${time %S}
