${goto 15}${color4}َ°–ں ${color}Google DNS${goto 250}${color4}${execi 10 ping -c 1 8.8.8.8 | grep time= | cut -d'=' -f4}${alignr}${if_match ${execi 10 ping -c 1 8.8.8.8 | grep time= | cut -d'=' -f4 | cut -d'.' -f1} < 50}${color3}َ°“…${else}${if_match ${execi 10 ping -c 1 8.8.8.8 | grep time= | cut -d'=' -f4 | cut -d'.' -f1} < 100}${color6}َ°…‚${else}${color1}َ°…ƒ${endif}${endif}
${goto 15}${color4}َ°–ں ${color}Cloudflare${goto 250}${color4}${execi 10 ping -c 1 1.1.1.1 | grep time= | cut -d'=' -f4}${alignr}${if_match ${execi 10 ping -c 1 1.1.1.1 | grep time= | cut -d'=' -f4 | cut -d'.' -f1} < 50}${color3}َ°“…${else}${if_match ${execi 10 ping -c 1 1.1.1.1 | grep time= | cut -d'=' -f4 | cut -d'.' -f1} < 100}${color6}َ°…‚${else}${color1}َ°…ƒ${endif}${endif}

${goto 15}Down Total: ${color orange}${totaldown wlp2s0}${goto 250}Avg: ${color cyan}${execpi 10 printf "%.2f" $(echo "$(cat /sys/class/net/wlp2s0/statistics/rx_bytes) / 1024 / 1024 / $(cat /proc/uptime | cut -d' ' -f1)" | bc -l)} MB/s
${goto 15}Up Total: ${color orange}${totalup wlp2s0}${goto 250}Avg: ${color cyan}${execpi 10 printf "%.2f" $(echo "$(cat /sys/class/net/wlp2s0/statistics/tx_bytes) / 1024 / 1024 / $(cat /proc/uptime | cut -d' ' -f1)" | bc -l)} MB/s



