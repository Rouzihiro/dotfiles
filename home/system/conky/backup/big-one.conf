${goto 15}Used: ${color orange}${fs_used /}${color} / ${fs_size /}${goto 200}Free: ${color cyan}${fs_free /}${goto 420}${color1}َ°پ‹ ${color}R: ${color cyan}${diskio_read}/s ${goto 600}${color1}َ°پŒ ${color}W: ${color cyan}${diskio_write}/s
${goto 15}Usage: ${color orange}${fs_used_perc /}%


