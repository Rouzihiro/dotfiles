${goto 15}${top name 2}${goto 180}${top cpu 2}%${goto 320}${top_mem name 2}${goto 480}${top_mem mem 2}%${goto 620}${top_io name 2}${goto 780}${top_io io_perc 2}%
${goto 15}${top name 3}${goto 180}${top cpu 3}%${goto 320}${top_mem name 3}${goto 480}${top_mem mem 3}%${goto 620}${top_io name 3}${goto 780}${top_io io_perc 3}%
${goto 15}${color8}${top name 4}${goto 180}${top cpu 4}%${goto 320}${top_mem name 4}${goto 480}${top_mem mem 4}%${goto 620}${top_io name 4}${goto 780}${top_io io_perc 4}%${color}


${font Caskaydia Cove Nerd Font:bold:size=12}${color1}â–ژNetwork Stats${alignr}${goto 420}${color1}â–ژConnection Info${font}
${goto 15}${color2}َ°©ں ${color}${gw_iface} â€¢ ${color2}${addr wlp2s0}${goto 420}${color2}َ°¤¨ ${color}${execi 30 nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d':' -f2} ${alignr}${color orange}${execi 5 iw dev wlp2s0 link | grep signal | cut -d' ' -f2 | awk '{print int(($1 + 100) * 100/70)}'}%
${goto 15}${color2}َ°©ں ${color}Gateway: ${color2}${gw_ip}${goto 420}${color2}MAC Address: ${alignr}${execi 360 ip link show wlp2s0 | awk '/ether/ {print $2}'}
${goto 15}Public IP: ${color2}${execi 3600 curl -s ifconfig.me}${goto 420}${color2}${execbar printf 'â–ˆ%.0s' $(seq 1 $(expr ${wireless_link_qual_perc wlp2s0} / 10))}

${goto 15}${color2}â–¼ Download Activity${alignr}${color2}${downspeed wlp2s0}/s${color}
