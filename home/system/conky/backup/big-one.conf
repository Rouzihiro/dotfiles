${goto 15}${color2}َ°“… Frequency: ${freq_g}GHz${goto 200}Load: ${cpu cpu0}%${goto 320}${color6}َ°کڑ ${color}RAM: ${color6}${memperc}%${color} of ${memmax} ${goto 500}${color2}َ°ڈˆ Tasks:${color} ${processes} (${running_processes} running)
