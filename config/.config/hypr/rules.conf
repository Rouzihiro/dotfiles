# =============================================================================
# rules.conf — window rules
# Generic rules. Add app-specific overrides in _keybinds.conf or a _rules.conf
# if you need rules that depend on personal apps.
# =============================================================================

# Slight transparency for terminals
windowrulev2 = opacity 0.97, class:^(kitty)$
windowrulev2 = opacity 0.9, class:^(foot)$

########## per-app opacity ##########
windowrulev2 = opacity 0.9, title:^(JDownloader.*)$

# Forced opacity for focus-heavy apps, overrides both active and inactive
windowrulev2 = opacity 0.9 override 0.9 override, class:^(firefox)$
windowrulev2 = opacity 0.9 override 0.9 override, class:^(cursor)$
windowrulev2 = opacity 0.9 override 0.9 override, class:^(obsidian)$
windowrulev2 = opacity 0.9 override 0.9 override, class:^(neovim)$
windowrulev2 = opacity 0.9 override 0.9 override, class:^(nvim)$

windowrulev2 = float, title:^(floaty-scratchpad)$
windowrulev2 = size 1200 1000, title:^(floaty-scratchpad)$
windowrulev2 = move onscreen center, title:^(floaty-scratchpad)$
windowrulev2 = float, class:^(runner_floating)$

########## idle inhibit ##########
windowrulev2 = idleinhibit fullscreen, class:.*
windowrulev2 = idleinhibit focus, class:^(transmission-gtk)$

########## runner_floating ##########
windowrulev2 = float,         class:^(runner_floating)$
windowrulev2 = center,        class:^(runner_floating)$
windowrulev2 = size 800 600,  class:^(runner_floating)$
windowrulev2 = opacity 0.8,   class:^(runner_floating)$

########## floaty-small ##########
windowrulev2 = float,         title:^(floaty-small)$
windowrulev2 = center,        title:^(floaty-small)$
windowrulev2 = size 800 600,  title:^(floaty-small)$
windowrulev2 = opacity 0.8,   title:^(floaty-small)$

########## floaty-medium ##########
windowrulev2 = float,         title:^(floaty-medium)$
windowrulev2 = center,        title:^(floaty-medium)$
windowrulev2 = size 1000 800, title:^(floaty-medium)$
windowrulev2 = bordersize 2,  title:^(floaty-medium)$
windowrulev2 = opacity 0.8,   title:^(floaty-medium)$

########## floaty-tiny ##########
windowrulev2 = float,         title:^(floaty-tiny)$
windowrulev2 = center,        title:^(floaty-tiny)$
windowrulev2 = size 500 350,  title:^(floaty-tiny)$
windowrulev2 = opacity 0.8,   title:^(floaty-tiny)$

########## gaps and borders ##########
general {
    gaps_in  = 5
    gaps_out = 2
    border_size = 2
}

########## WoW Wine windows ##########
windowrulev2 = float,  title:^(Wow-SF-64\.exe - Wine Desktop)$
windowrulev2 = center, title:^(Wow-SF-64\.exe - Wine Desktop)$
windowrulev2 = float,  title:^(Wow-SF\.exe - Wine Desktop)$
windowrulev2 = center, title:^(Wow-SF\.exe - Wine Desktop)$

########## floating apps ##########
windowrulev2 = float, class:^(com\.saivert\.pwvucontrol)$

########## workspace assignments ##########
windowrulev2 = workspace 2, class:^(librewolf)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 4, title:^(JDownloader.*)$

windowrulev2 = float,       class:^(dashboard)$
windowrulev2 = size 1400 800, class:^(dashboard)$
windowrulev2 = center,      class:^(dashboard)$
windowrulev2 = stayfocused, class:^(dashboard)$
windowrulev2 = animation slide top, class:^(dashboard)$

animation = specialWorkspace, 1, 5, default, slide top
