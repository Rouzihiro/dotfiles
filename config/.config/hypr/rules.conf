# =============================================================================
# rules.conf — Hyprland 0.55.4
# =============================================================================
# Variables
$inFocusOpacity = 0.97
$notInFocusOpacity = 0.90

windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Default opacity for all windows
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:class .*

# Kitty fully opaque
# windowrule = opacity 1 1, match:class ^kitty$
#
# Browsers
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:class ^(firefox|brave|chromium|librewolf|qutebrowser|zen-browser)$

# Spotify / Discord / Telegram / VS Code / Thunar or Nemo by title
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:title .Spotify.
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:title .Discord.
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:title .Telegram.
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:title .Neovim.
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:title .neovim.
windowrule = opacity $inFocusOpacity $notInFocusOpacity, match:title .(Thunar|nemo).

# Lunar Client fullscreen (static effect)
windowrule = fullscreen on, match:class ^Lunar Client.*$
# -----------------------------------------------------------------------------
# Opacity
# -----------------------------------------------------------------------------
#
# windowrule = opacity 0.90, match:class ^(kitty)$
# windowrule = opacity 0.97, match:class ^(foot)$
#
windowrule = opacity 0.90, match:title ^(JDownloader.*)$

# windowrule = opacity 0.90 0.90 override, match:class ^(firefox)$
# windowrule = opacity 0.90 0.90 override, match:class ^(obsidian)$
# windowrule = opacity 0.90 0.90 override, match:class ^(neovim)$
# windowrule = opacity 0.90 0.90 override, match:class ^(nvim)$
#
# dashboard scratchpad
windowrule = float on, match:class ^(dashboard-calcurse)$
windowrule = size 1017 904, match:class ^(dashboard-calcurse)$
windowrule = move 1515 668, match:class ^(dashboard-calcurse)$

windowrule = float on, match:class ^(dashboard-termcal)$
windowrule = size 1420 906, match:class ^(dashboard-termcal)$
windowrule = move 50 668, match:class ^(dashboard-termcal)$

windowrule = float on, match:class ^(dashboard-git)$
windowrule = size 400 582, match:class ^(dashboard-git)$
windowrule = move 1900 800, match:class ^(dashboard-git)$

# -----------------------------------------------------------------------------
# Scratchpad
# -----------------------------------------------------------------------------

windowrule = float on, match:title ^(floaty-scratchpad)$
windowrule = size 1200 1000, match:title ^(floaty-scratchpad)$
windowrule = move onscreen center, match:title ^(floaty-scratchpad)$


# -----------------------------------------------------------------------------
# Idle inhibit
# -----------------------------------------------------------------------------

windowrule = idle_inhibit fullscreen, match:class .*
windowrule = idle_inhibit focus, match:class ^(transmission-gtk)$

# -----------------------------------------------------------------------------
# runner_floating
# -----------------------------------------------------------------------------

windowrule = float on, match:class ^(runner_floating)$
windowrule = center on, match:class ^(runner_floating)$
windowrule = size 800 600, match:class ^(runner_floating)$
windowrule = opacity 0.80, match:class ^(runner_floating)$

# -----------------------------------------------------------------------------
# floaty-small
# -----------------------------------------------------------------------------

windowrule = float on, match:title ^(floaty-small)$
windowrule = center on, match:title ^(floaty-small)$
windowrule = size 800 600, match:title ^(floaty-small)$
windowrule = opacity 0.80, match:title ^(floaty-small)$

# -----------------------------------------------------------------------------
# floaty-medium
# -----------------------------------------------------------------------------

windowrule = float on, match:title ^(floaty-medium)$
windowrule = center on, match:title ^(floaty-medium)$
windowrule = size 1000 800, match:title ^(floaty-medium)$
windowrule = opacity 0.80, match:title ^(floaty-medium)$


# -----------------------------------------------------------------------------
# floaty-tiny
# -----------------------------------------------------------------------------

windowrule = float on, match:title ^(floaty-tiny)$
windowrule = center on, match:title ^(floaty-tiny)$
windowrule = size 500 350, match:title ^(floaty-tiny)$
windowrule = opacity 0.80, match:title ^(floaty-tiny)$

# -----------------------------------------------------------------------------
# WoW Wine windows
# -----------------------------------------------------------------------------

windowrule = float on, match:title ^(Wow-SF-64\.exe - Wine Desktop)$
windowrule = center on, match:title ^(Wow-SF-64\.exe - Wine Desktop)$

windowrule = float on, match:title ^(Wow-SF\.exe - Wine Desktop)$
windowrule = center on, match:title ^(Wow-SF\.exe - Wine Desktop)$

# -----------------------------------------------------------------------------
# Floating apps
# -----------------------------------------------------------------------------

windowrule = float on, match:class ^(com\.saivert\.pwvucontrol)$

# -----------------------------------------------------------------------------
# Workspace assignments
# -----------------------------------------------------------------------------

windowrule = workspace 2, match:class ^(zen-browser)$
windowrule = workspace 4, match:title ^(JDownloader.*)$

# -----------------------------------------------------------------------------
# General layout
# -----------------------------------------------------------------------------

general {
    gaps_in = 5
    gaps_out = 2
    border_size = 2
}

# -----------------------------------------------------------------------------
# Animations
# -----------------------------------------------------------------------------

animation = specialWorkspace, 1, 5, default, slide top
