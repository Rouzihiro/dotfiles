########## launchers & system ##########
bind = $mod, Escape,       exec, uwsm app -- rofi-power
bind = $mod, Return,       exec, uwsm app -- $term2
bind = $mod ALT, Return,   exec, uwsm app -- $term2 -T 'floaty-medium'
bind = $mod SHIFT, Return, exec, uwsm app -- $term
bind = $mod, space,        exec, uwsm app -- $launcher
bind = $mod ALT, space,    exec, uwsm app -- quick-actions
bind = $mod CTRL, space,   exec, uwsm app -- rofi-scripts

bind = ALT, R, exec, zsh -ic 'themes rotate'

########## apps ##########
bind = $mod, A,            exec, uwsm app -- $term2 -e btop
bind = $mod ALT, A,        exec, uwsm app -- $term2 --title floaty-small -e sh -c ncdu
bind = $mod, B,            exec, uwsm app -- $term2 --title floaty-small -e sh -c bookmarks
bind = $mod ALT, B,        exec, uwsm app -- xdg-open https://
bind = $mod SHIFT, B,      exec, uwsm app -- $term2 --title floaty-small -e sh -c bt
bind = $mod, D,        		 exec, uwsm app -- rofi-search
bind = $mod ALT, D, 			 exec, ~/.config/hypr/scripts/dashboard-cal.sh
bind = $mod, E,            exec, uwsm app -- $tfm
bind = $mod ALT, E,        exec, uwsm app -- $fm
bind = $mod SHIFT, E,      exec, uwsm app -- $files
bind = $mod, F,            fullscreen, 0
bind = $mod SHIFT, F,      togglefloating
bind = $mod, G,            exec, ~/.config/hypr/scripts/dashboard-git.sh
bind = $mod ALT, G,        exec, uwsm app -- $term2 --title floaty-medium -e zsh -ic "fzf-aliases; exec zsh"
bind = $mod, I,            exec, uwsm app -- $term2 --title floaty-small -e sh -c fzf-wifi
bind = $mod ALT, I,        exec, uwsm app -- rofi-wifi
bind = $mod ALT, L,        exec, uwsm app -- $lockscreen
bind = $mod, M,            exec, uwsm app -- rofi-mount-usb
bind = $mod ALT, M,        exec, uwsm app -- rofi-monitor-switch
bind = $mod SHIFT, M,      exec, uwsm app -- $term2 -T 'floaty-small' -e bash -c 'sudo ps_mem; echo ""; read -rp "Press Enter to close..."'
bind = $mod, N,            exec, uwsm app -- $term2 --title floaty-small -e sh -c fzf-notes
bind = $mod ALT, N,        exec, uwsm app -- $editor
bind = $mod SHIFT, N,      exec, uwsm app -- rofi-notes
bind = $mod, O,            exec, uwsm app -- ocr
bind = $mod ALT, O,        exec, uwsm app -- sh -c text-picker

########## scratchpad ##########
bind = $mod, P,            togglespecialworkspace, scratch
bind = $mod ALT, P,        movetoworkspacesilent, special:scratch
bind = $mod SHIFT, P,      exec, uwsm app -- rofi-power-profile

########## session ##########
bind = $mod, Q,            killactive
bind = $mod CTRL, Q,       exec, uwsm app -- hyprctl dispatch exit
bind = $mod, R,            exec, uwsm app -- z-cmd-screenrecord
bind = $mod ALT, R,        exec, uwsm app -- rofi-screenrecord
bind = $mod SHIFT, R,      exec, uwsm app -- hyprctl reload
bind = $mod, S,            exec, uwsm app -- rofi-screenshot
bind = $mod ALT, S,        exec, uwsm app -- rofi-screenshot-fs
bind = $mod, T, 					 exec, uwsm app -- zsh -ic 'source ~/dotfiles/flavors/themes.zsh; _osyx_rofi_theme_picker'
bind = $mod ALT, T,        exec, uwsm app -- rofi-timewarrior
bind = $mod SHIFT, T,      exec, uwsm app -- $term2 --app-id=runner_floating -e runner
bind = $mod, V,            exec, uwsm app -- $term2 --title floaty-small -e sh fzf-video-play
bind = $mod ALT, V,        exec, uwsm app -- $term2 --title floaty-tiny -e sh fzf-video-tool
bind = $mod SHIFT, V,      exec, uwsm app -- rofi-video-tool
bind = $mod, W,            exec, uwsm app -- rofi-wall
bind = $mod ALT, W,        exec, uwsm app -- wall-random

bind = $mod, X, 					 exec, uwsm app -- asryx

########## misc ##########
bind = $mod, Tab, cyclenext
bind = $mod, Tab, bringactivetotop

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# bind = $mod, Z,            exec, uwsm app -- 
# bind = $mod, grave,        exec, uwsm app -- $term2 --title floaty-small -e sh -c fzf-keyhints-sway 

########## screenshots ##########
bind = , Print,            exec, uwsm app -- grim $screenshot_dir/$(date +'%F_%H-%M-%S').png
bind = $mod SHIFT, S,      exec, uwsm app -- grim -g "$(slurp)" - | swappy -f -

# Brightness controls
binde = , XF86MonBrightnessDown, exec, uwsm app -- $HOME/.local/bin/multimedia/brightness.sh down
binde = , XF86MonBrightnessUp,   exec, uwsm app -- $HOME/.local/bin/multimedia/brightness.sh up

# Volume controls
binde = , XF86AudioLowerVolume,  exec, uwsm app -- $HOME/.local/bin/multimedia/volume.sh down
binde = , XF86AudioRaiseVolume,  exec, uwsm app -- $HOME/.local/bin/multimedia/volume.sh up
bind =  , XF86AudioMute,         exec, uwsm app -- $HOME/.local/bin/multimedia/volume.sh mute
