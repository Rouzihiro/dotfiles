# ================= Theme =================

# borders and messages
set -g pane-border-style         "fg=#625d51"
set -g pane-active-border-style  "fg=#a89984"
set -g message-style             "bg=#a89984,fg=#282828"
set -g message-command-style     "bg=#a89984,fg=#282828"

# statusline base
set -g status on
set -g status-interval 1
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 160
set -g status-style "bg=default,fg=#a89984"

# left bubble: session
set -g status-left "#[fg=#a89984]#[bg=#a89984]#[fg=#282828]#[bold]   #S #[nobold]#[fg=#a89984]#[bg=default] "

# right bubbles: prefix, git branch, host, time
set -g status-right '#{?client_prefix,#[fg=#45423c]#[bg=#45423c]#[fg=#ebdbb2]#[bold] ⏽ PREFIX #[nobold]#[fg=#45423c]#[bg=default] ,}#[fg=#45423c]#[bg=#45423c]#[fg=#ebdbb2]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "-") #[fg=#45423c]#[bg=default] #[fg=#625d51]#[bg=#625d51]#[fg=#ebdbb2] #H #[fg=#625d51]#[bg=default] #[fg=#282828]#[bg=#282828]#[fg=#ebdbb2] %Y-%m-%d %H:%M #[fg=#282828]#[bg=default]'

# window tabs
set -g window-status-separator ""
set -g window-status-format         " #[fg=#625d51]#I #[fg=#ebdbb2]#W "
set -g window-status-current-format "#[fg=#a89984]#[bg=#a89984]#[fg=#282828]#[bold] #I: #W #[nobold]#[fg=#a89984]#[bg=default]"

# nuke the entire right side of the status bar, it's annoying with starship
set -g status-right ""
set -g status-right-length 0
